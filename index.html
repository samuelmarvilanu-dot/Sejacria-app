function metricasDe(faixa) {
  const m = {
    "Começando (<1k)": { seguidores: 600, alcance: 250, eng: 9.0 },
    "1k - 10k": { seguidores: 5200, alcance: 1800, eng: 7.5 },
    "10k - 100k": { seguidores: 42000, alcance: 11000, eng: 5.5 },
    "100k+": { seguidores: 320000, alcance: 68000, eng: 3.8 },
  };
  return m[faixa] || m["1k - 10k"];
}

function gerarPortfolio(nicho, plataformas) {
  const p = (plataformas && plataformas.length) ? plataformas : ["Instagram"];
  const base = nicho ? nicho : "conteúdo";
  const cores = ["linear-gradient(135deg,#ff9d3d,#e87420)", "linear-gradient(135deg,var(--green),#3d9d5a)", "linear-gradient(135deg,#ff6b6b,#c0392b)", "linear-gradient(135deg,#6b8bff,#3d50c0)"];
  const ideias = [`Tutorial: ${base}`, `Dicas rápidas de ${base}`, `Minha rotina de ${base}`, `Erros comuns em ${base}`];
  return ideias.slice(0, 3).map((tit, i) => ({
    id: `v${i}_${Date.now()}`,
    titulo: tit,
    views: [128000, 64000, 31000, 12000][i] || 9000,
    plataforma: p[i % p.length],
    cor: cores[i % cores.length],
  }));
}

const stepBtn = { width: 40, height: 40, borderRadius: 10, border: `1px solid ${C.line}`, background: C.soft, color: C.amber, fontSize: 20, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" };

// início da semana (domingo) como chave — usado pra contar usos e zerar a cada semana
function chaveSemana(d = new Date()) {
  const x = new Date(d); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - x.getDay());
  return x.toISOString().slice(0, 10);
}
// as 7 datas reais da semana atual (dom..sáb)
function datasDaSemana() {
  const x = new Date(); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - x.getDay());
  return [...Array(7)].map((_, i) => { const d = new Date(x); d.setDate(d.getDate() + i); return d; });
}

function iconeCena(t = "") {
  const s = (t || "").toLowerCase();
  if (s.includes("close") || s.includes("rosto") || s.includes("reaç") || s.includes("react")) return "😮";
  if (s.includes("game") || s.includes("tela") || s.includes("jogo") || s.includes("print")) return "🎮";
  if (s.includes("text") || s.includes("legenda")) return "🔤";
  if (s.includes("aç") || s.includes("moviment")) return "⚡";
  return "🎬";
}

function entregaTexto(e) {
  if (!e) return "";
  const p = [];
  if (e.reels) p.push(`${e.reels} Reels`);
  if (e.stories) p.push(`${e.stories} Stories`);
  if (e.longos) p.push(`${e.longos} Vídeo${e.longos > 1 ? "s" : ""} longo${e.longos > 1 ? "s" : ""}`);
  return p.join(" · ");
}

function idadeDe(nasc) {
  if (!nasc) return "";
  const d = new Date(nasc);
  if (isNaN(d)) return "";
  const hoje = new Date();
  let i = hoje.getFullYear() - d.getFullYear();
  const m = hoje.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && hoje.getDate() < d.getDate())) i--;
  return i;
}

function statusCampanha(of) {
  const cs = of.candidatos || [];
  const conc = cs.filter((c) => c.status === "concluido").length;
  const ativos = cs.filter((c) => ["aprovado", "entregue", "concluido"].includes(c.status)).length;
  if ((of.qtd || 1) <= conc) return { txt: "Concluída", cor: "var(--green)", bg: "rgba(62,224,163,.16)" };
  if (ativos > 0) return { txt: "Em andamento", cor: "var(--accent)", bg: "rgba(168,85,247,.16)" };
  return { txt: "Aberta", cor: "var(--mute)", bg: "rgba(154,144,191,.16)" };
}

function mediaNota(notas) {
  const v = notas.filter((n) => n > 0);
  if (!v.length) return 0;
  return Math.round((v.reduce((a, n) => a + n, 0) / v.length) * 10) / 10;
}

function StarRating({ value = 0, onRate, readOnly }) {
  return (
    <span style={{ display: "inline-flex", gap: 2 }}>
      {[1, 2, 3, 4, 5].map((n) => (
        <span key={n} onClick={() => !readOnly && onRate && onRate(n)} style={{ cursor: readOnly ? "default" : "pointer", fontSize: 16, lineHeight: 1, color: n <= Math.round(value) ? "#ffcf4d" : "#43392f" }}>★</span>
      ))}
    </span>
  );
}

function NotifBell({ items, para, open, setOpen, onRead }) {
  const meus = items.filter((i) => i.para === para);
  const naoLidas = meus.filter((i) => !i.lida).length;
  return (
    <div style={{ position: "relative" }}>

        <Icon name="bell" size={21} stroke={1.7} />

            <div style={{ maxHeight: 280, overflowY: "auto" }}>

function ChatThread({ msgs, onSend, eu }) {
  const [t, setT] = useState("");
  const send = () => { if (!t.trim()) return; onSend(t.trim()); setT(""); };
  return (
    <div style={{ marginTop: 10, padding: 10, borderRadius: 11, background: "var(--soft)", border: `1px solid ${C.line}` }}>

}

// ---------- tela de login ----------
function AuthScreen({ onAuth }) {
  const [tela, setTela] = useState("escolha"); // "escolha" | "login" | "cadastro"
  const [papel, setPapel] = useState(null);
  const [email, setEmail] = useState("");
  const [senha, setSenha] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState({ tipo: "", texto: "" });
  const sb = window._sb;

  async function entrarComGoogle() {
    const sb = window._sb;
    if (!sb) { setMsg({ tipo: "erro", texto: "Configure o Supabase primeiro." }); return; }
    const { error } = await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin } });
    if (error) setMsg({ tipo: "erro", texto: "Google não está habilitado ainda. Use e-mail por enquanto." });
  }
  async function entrarComFacebook() {
    const sb = window._sb;
    if (!sb) { setMsg({ tipo: "erro", texto: "Configure o Supabase primeiro." }); return; }
    await sb.auth.signInWithOAuth({ provider: "facebook", options: { redirectTo: window.location.origin } });
  }
  async function entrar() {
    if (!email.trim() || !senha) { setMsg({ tipo: "erro", texto: "Preencha e-mail e senha." }); return; }
    setLoading(true); setMsg({ tipo: "", texto: "" });
    if (!sb) { onAuth(papel || "criador"); return; }
    const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: senha });
    setLoading(false);
    if (error) setMsg({ tipo: "erro", texto: "E-mail ou senha incorretos." });
  }

  async function cadastrar() {
    if (!papel) { setMsg({ tipo: "erro", texto: "Escolha seu perfil antes." }); return; }
    if (!email.trim() || !senha) { setMsg({ tipo: "erro", texto: "Preencha e-mail e senha." }); return; }
    if (senha.length < 6) { setMsg({ tipo: "erro", texto: "Senha mínima: 6 caracteres." }); return; }
    if (senha !== confirmar) { setMsg({ tipo: "erro", texto: "As senhas não coincidem." }); return; }
    setLoading(true); setMsg({ tipo: "", texto: "" });
    if (!sb) { onAuth(papel); return; }
    const refCode = localStorage.getItem("cria_ref") || null;
    const { error } = await sb.auth.signUp({
      email: email.trim(), password: senha,
      options: {
        data: { papel, referido_por: refCode },
        emailRedirectTo: window.location.origin, // volta pro app após confirmar
      }
    });
    setLoading(false);
    if (error) setMsg({ tipo: "erro", texto: error.message });
    else setMsg({ tipo: "ok", texto: "📧 Enviamos um e-mail de confirmação. Clique no link e você entrará automaticamente!" });

      {texto}
    </button>
  );

  return (
    <div style={{ maxWidth: 420, margin: "0 auto", minHeight: "100dvh", display: "flex", flexDirection: "column", justifyContent: "center", padding: "30px 22px", backgroundImage: `radial-gradient(circle at 50% 0%, rgba(168,85,247,.18), transparent 55%)` }}>

        <p style={{ color: C.mute, fontSize: 14.5, margin: "8px 0 0" }}>Onde criador vira negócio. Bora? 🚀</p>
      </div>

      {/* ESCOLHA DE PERFIL */}
      {tela === "escolha" && (
        <>
          <p style={{ textAlign: "center", fontWeight: 700, fontSize: 15, color: C.ink, marginBottom: 14 }}>Como você vai usar o Cria?</p>
          {[["criador","🎬","Sou Criador de Conteúdo","Pautas, roteiros, colabs e campanhas com marcas"],["marca","🏢","Sou uma Marca / Empresa","Contratar criadores e divulgar meus produtos"]].map(([id,emoji,titulo,desc]) => (
            <button key={id} onClick={() => { setPapel(id); setTela("cadastro"); }}
              style={{ width:"100%", textAlign:"left", padding:"16px", borderRadius:14, marginBottom:10, cursor:"pointer", border:`1px solid ${C.line}`, background:C.card, fontFamily:"'DM Sans',sans-serif", display:"flex", gap:12, alignItems:"center" }}>
              <span style={{ fontSize:28, flexShrink:0 }}>{emoji}</span>
              <span>
                <span className="disp" style={{ display:"block", fontSize:15.5, fontWeight:700, color:C.ink }}>{titulo}</span>

              <span style={{ marginLeft:"auto", color:C.mute, fontSize:18 }}>›</span>

          <div style={{ display:"flex", alignItems:"center", gap:10, margin:"14px 0" }}>

        <>

          <div style={{ padding:"10px 14px", borderRadius:10, background:"rgba(168,85,247,.1)", border:`1px solid ${C.amber}`, marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>

            <span style={{ fontSize:13.5, fontWeight:700, color:C.amber }}>{papel==="criador"?"Criador de Conteúdo":"Marca / Empresa"}</span>
          </div>
          <GoogleBtn texto={`Cadastrar como ${papel==="criador"?"Criador":"Marca"} com Google`} />
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
            <div style={{ flex:1, height:1, background:C.line }}/><span style={{ color:C.mute, fontSize:12 }}>ou com e-mail</span><div style={{ flex:1, height:1, background:C.line }}/>
          </div>
          <input style={inp} type="email" placeholder="Seu e-mail" value={email} onChange={e => setEmail(e.target.value)} />

// leitor tolerante: lê o JSON; se vier cortado, salva o que chegou
function lerJSON(raw) {
  const limpo = raw.replace(/```json|```/g, "").trim();
  try { return JSON.parse(limpo.slice(limpo.indexOf("{"), limpo.lastIndexOf("}") + 1)); } catch (_) {}
  const posts = [];
  const a = limpo.indexOf("[");
  if (a !== -1) {
    let d = 0, s = -1;
    for (let i = a; i < limpo.length; i++) {
      const c = limpo[i];
      if (c === "{") { if (d === 0) s = i; d++; }
      else if (c === "}") { d--; if (d === 0 && s !== -1) { try { posts.push(JSON.parse(limpo.slice(s, i + 1))); } catch (_) {} s = -1; } }
    }
  }
  const foco = limpo.match(/"foco_do_dia"\s*:\s*"([^"]*)"/);
  return { foco_do_dia: foco ? foco[1] : "", posts };
}

async function chamarIA({ system, messages }) {
  const r = await fetch("/api/claude", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 1000, system, messages }),
  });
  const j = await r.json();
  if (j.type === "error") {
    const tipo = j.error?.type || "";
    if (tipo === "rate_limit_error") throw new Error("RATE_LIMIT");
    if (tipo === "overloaded_error") throw new Error("SOBRECARGA");
    throw new Error("Erro da IA: " + (j.error?.message || tipo).slice(0, 120));
  }
  const txt = (j.content || []).map((b) => (b.type === "text" ? b.text : "")).join("\n");
  if (!txt) throw new Error("Resposta vazia: " + JSON.stringify(j).slice(0, 120));
  return txt;
}

        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
        .rise{animation:rise .4s ease both}
        .disp{font-family:'Bricolage Grotesque',sans-serif}
        .noscroll::-webkit-scrollbar{display:none}
      `}</style>

      {(sbLoad || perfilLoad) ? (
        <div style={{ minHeight: "100dvh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "var(--bg)", gap: 16 }}>
          <div style={{ width: 40, height: 40, borderRadius: "50%", border: `3px solid ${C.line}`, borderTopColor: C.amber, animation: "spin .8s linear infinite" }} />
          <p style={{ color: C.mute, fontSize: 13 }}>Carregando...</p>
        </div>
      ) : !authed ? (
        <AuthScreen onAuth={(p) => { setAuthed(true); setPapel(p); if (p === "marca") setTab("marcas"); }} />
      ) : papel === "marca" ? (
        <BrandApp profile={profile} plano={plano} ofertas={ofertas} setOfertas={setOfertas} marcaProfile={marcaProfile} setMarcaProfile={setMarcaProfile} mensagens={mensagens} addMsg={addMsg} notify={notify} notificacoes={notificacoes} setNotificacoes={setNotificacoes} produtos={produtos} setProdutos={setProdutos} vendas={vendas} onSalvarLoja={salvarLojasSb} onTrocar={() => { window._sb?.auth.signOut(); setAuthed(false); setPapel(null); setMenuOpen(false); }} onSair={() => { window._sb?.auth.signOut(); setAuthed(false); setMenuOpen(false); }} />
      ) : !setupOk ? (
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "30px 18px 60px",
          backgroundImage: `radial-gradient(circle at 80% -5%, rgba(168,85,247,.12), transparent 50%)` }}>
          <Marca />
          <h2 className="disp" style={{ fontSize: 26, margin: "22px 0 4px", fontWeight: 700 }}>Bora montar seu perfil</h2>
          <Sub>É com isso que o app entrega tudo mastigado pra você.</Sub>
          <ProfileForm value={profile} onSave={(d) => { setProfile(d); salvarPerfilSb(d); setTab("dashboard"); }} modo="setup" />
        </div>
      ) : (
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "26px 18px 96px",
          backgroundImage: `radial-gradient(circle at 80% -5%, rgba(168,85,247,.12), transparent 50%)` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={() => setMenuOpen(true)} style={{ background: "none", border: "none", color: C.ink, fontSize: 24, cursor: "pointer", padding: "4px 6px 4px 0", lineHeight: 1 }}>☰</button>
              <Marca />
            </div>
            <NotifBell items={notificacoes} para="criador" open={notifOpen} setOpen={setNotifOpen} onRead={() => setNotificacoes((ns) => ns.map((x) => x.para === "criador" ? { ...x, lida: true } : x))} />
          </div>
          {menuOpen && (
            <>
              <div onClick={() => setMenuOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.55)", zIndex: 30 }} />
              <div className="rise" style={{ position: "fixed", top: 0, left: 0, bottom: 0, width: 260, maxWidth: "80%", zIndex: 31, background: "var(--bg)", borderRight: `1px solid ${C.line}`, padding: "22px 0", overflowY: "auto", boxShadow: "8px 0 30px rgba(0,0,0,.5)" }}>
                <div style={{ padding: "0 18px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <Marca />
                  <button onClick={() => setMenuOpen(false)} style={{ background: "none", border: "none", color: C.mute, fontSize: 22, cursor: "pointer", lineHeight: 1 }}>×</button>
                </div>
                <div onClick={() => { setTab("perfil"); setMenuOpen(false); }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "0 18px 14px", margin: "0 0 6px", cursor: "pointer", borderBottom: `1px solid ${C.line}` }}>
                  {profile.foto ? <img src={profile.foto} alt="" style={{ width: 42, height: 42, borderRadius: "50%", objectFit: "cover" }} />
                    : <div style={{ width: 42, height: 42, borderRadius: "50%", background: `linear-gradient(135deg, ${C.amber}, ${C.rose})`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif", fontSize: 18 }}>{(meuNome || "C").charAt(0).toUpperCase()}</div>}
                  <div style={{ minWidth: 0 }}>
                    <div className="disp" style={{ fontSize: 14.5, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{meuNome}</div>
                    <div style={{ fontSize: 11.5, color: C.amber }}>Ver perfil</div>
                  </div>
                </div>
                {[["dashboard", "Dashboard"], ["plano", "Plano"], ["chat", "Chat"], ["marcas", "Marcas"], ["colabs", "Colabs"], ["produtos", "Produtos"], ["carteira", "Carteira"], ["arquivados", "Arquivados"], ["perfil", "Perfil"], ["config", "Configurações"]].map(([id, lb]) => (
                  <button key={id} onClick={() => { setTab(id); setMenuOpen(false); }} style={{
                    display: "flex", alignItems: "center", gap: 13, width: "100%", textAlign: "left", padding: "13px 18px", background: tab === id ? "rgba(168,85,247,.12)" : "transparent",
                    border: "none", borderLeft: `3px solid ${tab === id ? C.amber : "transparent"}`, color: tab === id ? C.amber : C.ink, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                    <Icon name={id} size={19} color={tab === id ? "var(--accent)" : "var(--mute)"} />{lb}</button>
                ))}
                <button onClick={() => { window._sb?.auth.signOut(); setAuthed(false); setPapel(null); setMenuOpen(false); }} style={{
                  display: "flex", alignItems: "center", gap: 13, width: "100%", textAlign: "left", padding: "13px 18px", marginTop: 8, borderTop: `1px solid ${C.line}`, background: "transparent", border: "none", color: C.ink, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                  <Icon name="swap" size={19} color="var(--mute)" />Trocar de conta</button>
                <button onClick={() => { window._sb?.auth.signOut(); setAuthed(false); setMenuOpen(false); }} style={{
                  display: "flex", alignItems: "center", gap: 13, width: "100%", textAlign: "left", padding: "13px 18px", background: "transparent", border: "none", color: C.rose, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                  <Icon name="sair" size={19} color="var(--rose)" />Sair</button>
              </div>
            </>
          )}

          {tab === "dashboard" && (
            <DashboardScreen
              profile={profile} plano={plano} usosSemana={usosSemana} limiteSemana={limiteSemana}
              ganhoMarcas={ganhoLiberado} ganhoProdutos={ganhoProdutos} ganhoIndicacao={ganhoIndicacao}
              totalGanho={totalGanho} sacado={sacado} ganhoPendente={ganhoPendente}
              ofertas={ofertas} vendas={vendas} colabs={colabs} arquivados={arquivados} produtos={produtos}
              onIr={(t) => setTab(t)}
            />
          )}
          {tab === "plano" && (
            <div className="rise">
              <h2 className="disp" style={{ fontSize: 24, margin: "16px 0 2px", fontWeight: 700 }}>Sua semana</h2>
              <Sub>Toque num dia — o app gera a pauta completa dele na hora.</Sub>

              <div style={{ borderRadius: 16, padding: 16, marginBottom: 16, border: `1px solid ${C.line}`, background: `linear-gradient(135deg, rgba(168,85,247,.1), rgba(255,107,107,.06))` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span className="disp" style={{ fontSize: 17, fontWeight: 700 }}>⚡ Nível {nivel}</span>
                  <span style={{ fontSize: 12.5, color: C.amber, fontWeight: 600 }}>💰 {ganhoLiberado.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}</span>
                </div>
                <div style={{ height: 8, borderRadius: 8, background: C.line, marginTop: 10, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${xpNoNivel}%`, background: `linear-gradient(90deg, ${C.amber}, ${C.rose})`, transition: "width .4s" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 11.5, color: C.mute }}>
                  <span>{pautasGeradas} pautas · {bombouCount} bombaram</span>
                  <span>{xpNoNivel}/100 XP</span>
                </div>
                <p style={{ fontSize: 11, color: C.mute, margin: "10px 0 0", opacity: .75 }}>
                  {ganhoPendente > 0 ? `${ganhoPendente.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })} a receber (entregas em andamento).` : "Feche campanhas com marcas pra começar a faturar."}
                </p>
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 14px", borderRadius: 12, marginBottom: 14, background: C.card, border: `1px solid ${C.line}` }}>
                <span style={{ fontSize: 13, color: C.ink }}>Pautas desta semana <span style={{ color: C.mute }}>· plano {plano}</span></span>
                <span style={{ fontSize: 13.5, fontWeight: 700, color: usosSemana >= limiteSemana ? C.rose : C.green }}>{usosSemana}/{limiteSemana === Infinity ? "∞" : limiteSemana}</span>
              </div>

              {formatosTop.length > 0 && (
                <div style={{ padding: "10px 14px", borderRadius: 12, marginBottom: 14, background: "rgba(168,85,247,.08)", border: `1px solid ${C.line}` }}>
                  <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.amber, textTransform: "uppercase" }}>📊 Tá funcionando pra você</span>
                  <p style={{ margin: "5px 0 0", fontSize: 13.5, lineHeight: 1.4 }}>{formatosTop.join(", ")} — o app vai priorizar isso nas próximas pautas.</p>
                </div>
              )}

              {/* abas dos dias */}
              <div className="noscroll" style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 6, margin: "4px -2px 16px" }}>
                {DIAS.map((d, i) => {
                  const on = selectedDay === i;
                  const pronto = !!dias[d]?.data;
                  const passou = i < hoje;
                  return (
                    <button key={d} onClick={() => selecionarDia(i)} style={{
                      flex: "0 0 auto", padding: "8px 12px", borderRadius: 12, cursor: "pointer", position: "relative", textAlign: "center", minWidth: 50,
                      border: `1px solid ${on ? C.amber : C.line}`, fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 13,
                      background: on ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : "transparent",
                      color: on ? "var(--onAccent)" : C.ink, opacity: passou && !on ? .4 : 1,
                    }}>
                      <div>{ABREV[i]}</div>
                      <div style={{ fontSize: 11, fontWeight: 600, opacity: .8 }}>{datasSemana[i].getDate()}</div>
                      {i === hoje && <span style={{ position: "absolute", top: -6, right: -3, fontSize: 8, background: C.rose, color: "#fff", padding: "1px 4px", borderRadius: 6 }}>hoje</span>}
                      {pronto && i !== hoje && <span style={{ position: "absolute", top: 5, right: 6, width: 5, height: 5, borderRadius: 5, background: on ? "var(--onAccent)" : C.amber }} />}
                    </button>
                  );
                })}
              </div>

              <DiaConteudo
                dia={DIAS[selectedDay]}
                estado={dias[DIAS[selectedDay]]}
                onGerar={() => gerarDia(selectedDay)}
                onUpgrade={() => { setTab("config"); }}
                desempenho={desempenho}
                onRate={(idx, r) => setDesempenho((o) => {
                  const key = `${DIAS[selectedDay]}|${idx}`;
                  return { ...o, [key]: o[key] === r ? null : r };
                })}
              />
            </div>
          )}

          {tab === "chat" && (
            <ChatScreen
              chat={chat} setChat={setChat} perfilTexto={perfilTexto}
              ajustes={ajustes}
              addAjuste={(a) => setAjustes((p) => (p.includes(a) ? p : [...p, a]))}
              removeAjuste={(a) => setAjustes((p) => p.filter((x) => x !== a))}
              onNovoNicho={(n) => { setProfile((p) => ({ ...p, nicho: n })); setDias({}); setDesempenho({}); }}
            />
          )}

          {tab === "perfil" && (
            <div className="rise">
              <h2 className="disp" style={{ fontSize: 24, margin: "16px 0 2px", fontWeight: 700 }}>Seu perfil</h2>
              <Sub>Mudou de estratégia? Edite aqui — isso atualiza as próximas pautas.</Sub>
              <ProfileForm value={profile} onSave={(d) => { setProfile(d); salvarPerfilSb(d); setDias({}); }} modo="editar" />
            </div>
          )}

          {tab === "marcas" && (planoNivel >= 1 ? <MarcasScreen profile={profile} plano={plano} ofertas={ofertas} setOfertas={setOfertas} mensagens={mensagens} addMsg={addMsg} notify={notify} /> : <BloqueioPlano titulo="🔒 Apenas para assinantes" sub="As parcerias com marcas são exclusivas dos planos pagos. Assine pra se candidatar às campanhas e faturar." onIr={() => setTab("config")} />)}

          {tab === "carteira" && <CarteiraScreen disponivel={totalGanho - sacado} pendente={ganhoPendente} total={totalGanho} sacado={sacado} ganhoMarcas={ganhoLiberado} ganhoProdutos={ganhoProdutos} ganhoIndicacao={ganhoIndicacao} emAnalise={totalEmAnalise} holdDias={HOLD_DIAS} onSacar={(v) => setSacado((s) => s + v)} />}

          {tab === "produtos" && <LojaScreen profile={profile} produtos={produtos} setProdutos={setProdutos} vendas={vendas} setVendas={setVendas} />}

          {tab === "colabs" && (planoNivel >= 1 ? <ColabsScreen profile={profile} colabs={colabs} setColabs={setColabs} /> : <BloqueioPlano titulo="Colabs" sub="Disponível a partir do plano Criador. Faça upgrade pra colaborar com outros criadores." onIr={() => setTab("config")} />)}

          {tab === "arquivados" && <ArquivadosScreen itens={arquivados} />}

          {tab === "config" && <ConfigScreen profile={profile} plano={plano} setPlano={setPlanoComSync} usosSemana={usosSemana} limiteSemana={limiteSemana} indicados={indicados} setIndicados={setIndicados} />}
        </div>
      )}
    </div>
  );
}

// ---------- conteúdo do dia ----------
function DiaConteudo({ dia, estado, onGerar, desempenho, onRate, onUpgrade }) {
  const [verEx, setVerEx] = useState({});
  if (!estado) {
    return (
      <div style={{ textAlign: "center", padding: "40px 10px" }}>
        <p style={{ color: C.mute, fontSize: 14 }}>Nenhuma pauta gerada pra {dia} ainda.</p>
        <Botao onClick={onGerar} style={{ maxWidth: 240, margin: "16px auto 0" }}>⚡ Gerar pauta de {dia}</Botao>
      </div>
    );
  }
  if (estado.loading) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14, padding: "50px 0" }}>
        <div style={{ width: 34, height: 34, border: `3px solid ${C.line}`, borderTopColor: C.amber, borderRadius: "50%", animation: "spin .9s linear infinite" }} />
        <p style={{ color: C.amber, animation: "glow 2s ease infinite" }}>Montando a pauta de {dia}...</p>
      </div>
    );
  }
  if (estado.erro === "RATE_LIMIT") {
    return (
      <div style={{ padding: 18, borderRadius: 14, background: "rgba(255,180,0,.08)", border: "1px solid rgba(255,180,0,.35)", textAlign: "center" }}>
        <div style={{ fontSize: 30 }}>⏳</div>
        <strong className="disp" style={{ display: "block", fontSize: 16, marginTop: 6 }}>Muitas gerações simultâneas</strong>
        <p style={{ fontSize: 13, color: C.mute, margin: "8px 0 14px", lineHeight: 1.5 }}>O serviço de IA atingiu o limite de requisições por hora. Aguarde alguns minutos e tente de novo — seus outros dias não são afetados.</p>
        <Botao onClick={onGerar} style={{ maxWidth: 220, marginLeft: "auto", marginRight: "auto" }}>Tentar de novo</Botao>
      </div>
    );
  }
  if (estado.erro === "LIMITE") {
    return (
      <div style={{ padding: 18, borderRadius: 14, background: "rgba(168,85,247,.1)", border: "1px solid rgba(168,85,247,.4)", textAlign: "center" }}>
        <div style={{ fontSize: 30 }}>🔒</div>
        <strong className="disp" style={{ display: "block", fontSize: 17, marginTop: 6 }}>Você usou todas as pautas da semana</strong>
        <p style={{ fontSize: 13, color: C.mute, margin: "8px 0 0", lineHeight: 1.5 }}>Seu limite zera no próximo domingo. Pra gerar mais agora, faça upgrade do plano.</p>
        {onUpgrade && <Botao onClick={onUpgrade} style={{ marginTop: 14, maxWidth: 220, marginLeft: "auto", marginRight: "auto" }}>Ver planos</Botao>}
      </div>
    );
  }
  if (estado.erro) {
    return (
      <div style={{ padding: 14, borderRadius: 12, background: "#2a1414", border: "1px solid #4a2020" }}>
        <strong style={{ color: C.rose }}>Opa.</strong>
        <p style={{ fontSize: 12.5, color: "#ffb3b3", margin: "8px 0 0", wordBreak: "break-word" }}>{estado.erro}</p>
        <Botao onClick={onGerar} style={{ marginTop: 14 }}>Tentar de novo</Botao>
      </div>
    );
  }
  const { foco_do_dia, posts } = estado.data;
  return (
    <div className="rise">
      {foco_do_dia && (
        <div style={{ padding: "12px 15px", borderRadius: 12, marginBottom: 16, background: "rgba(168,85,247,.08)", borderLeft: `3px solid ${C.amber}` }}>
          <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.amber, textTransform: "uppercase" }}>Foco de {dia}</span>
          <p style={{ margin: "5px 0 0", fontSize: 14, lineHeight: 1.5 }}>{foco_do_dia}</p>
        </div>
      )}
      {posts.map((post, i) => (
        <div key={i} className="rise" style={{ animationDelay: `${i * 0.07}s`, marginBottom: 14, borderRadius: 16, border: `1px solid ${C.line}`, background: C.card, overflow: "hidden" }}>
          <div style={{ padding: "14px 16px 0", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: "var(--onAccent)", fontWeight: 700 }}>{post.formato}</span>
            {post.melhor_horario && <span style={{ fontSize: 12, color: C.mute }}>🕐 {post.melhor_horario}</span>}
          </div>
          <div style={{ padding: "8px 16px 16px" }}>
            <h3 className="disp" style={{ fontSize: 19, margin: "4px 0 0", lineHeight: 1.15, fontWeight: 700 }}>{post.tema}</h3>
            <Bloco rotulo="🪝 Gancho" texto={post.gancho} cor={C.amber} />
            {post.roteiro?.length > 0 && (
              <div style={{ marginTop: 11 }}>
                <Rot>🎬 Roteiro</Rot>
                <ol style={{ margin: "6px 0 0", padding: 0, listStyle: "none" }}>
                  {post.roteiro.map((b, k) => (
                    <li key={k} style={{ display: "flex", gap: 9, marginBottom: 6, fontSize: 13.5, lineHeight: 1.45 }}>
                      <span style={{ flex: "0 0 auto", width: 20, height: 20, borderRadius: 6, background: C.line, color: C.amber, fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>{k + 1}</span>
                      <span>{b}</span>
                    </li>
                  ))}
                </ol>
              </div>
            )}
            {post.storyboard?.length > 0 && (
              <div style={{ marginTop: 12 }}>
                <Rot>📱 Storyboard (o que filmar)</Rot>
                <div className="noscroll" style={{ display: "flex", gap: 8, overflowX: "auto", marginTop: 8, paddingBottom: 4 }}>
                  {post.storyboard.map((q, k) => (
                    <div key={k} style={{ flex: "0 0 auto", width: 124, borderRadius: 12, border: `1px solid ${C.line}`, background: C.soft, overflow: "hidden" }}>
                      <div style={{ height: 86, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 8, textAlign: "center", background: "linear-gradient(160deg, rgba(168,85,247,.12), rgba(255,107,107,.06))", position: "relative" }}>
                        <span style={{ position: "absolute", top: 5, left: 6, fontSize: 9, color: C.amber, fontWeight: 700 }}>{k + 1}</span>
                        <span style={{ fontSize: 18 }}>{iconeCena(q.tipo)}</span>
                        {q.texto_tela && <span style={{ fontSize: 9.5, color: C.ink, fontWeight: 700, marginTop: 4, lineHeight: 1.2 }}>"{q.texto_tela}"</span>}
                      </div>
                      <div style={{ padding: "7px 8px" }}>
                        <span style={{ fontSize: 9, color: C.amber, textTransform: "uppercase", letterSpacing: .5, fontWeight: 700 }}>{q.tipo}</span>
                        <p style={{ fontSize: 11, color: C.ink, margin: "3px 0 0", lineHeight: 1.3 }}>{q.cena}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {post.cta && (
              <div style={{ marginTop: 11, padding: "8px 12px", borderRadius: 9, background: "rgba(255,107,107,.1)", borderLeft: `3px solid ${C.rose}`, fontSize: 13 }}>
                <strong style={{ color: C.rose }}>CTA:</strong> {post.cta}
              </div>
            )}
            {post.hashtags?.length > 0 && (
              <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 6 }}>
                {post.hashtags.map((h, k) => <span key={k} style={{ fontSize: 11.5, color: C.amber, background: "rgba(168,85,247,.1)", padding: "2px 8px", borderRadius: 6 }}>{h}</span>)}
              </div>
            )}
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.line}`, display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
              <span style={{ fontSize: 11.5, color: C.mute }}>Já postou? Como foi?</span>
              {[["bombou", "🔥 Bombou"], ["medio", "👍 Médio"], ["fraco", "👎 Fraco"]].map(([v, lb]) => {
                const sel = desempenho[`${dia}|${i}`] === v;
                return (
                  <button key={v} onClick={() => onRate(i, v)} style={{
                    padding: "5px 10px", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
                    border: `1px solid ${sel ? C.amber : C.line}`, background: sel ? "rgba(168,85,247,.15)" : "transparent", color: sel ? C.amber : C.mute,
                  }}>{lb}</button>
                );
              })}
            </div>

            <button onClick={() => setVerEx((o) => ({ ...o, [i]: !o[i] }))} style={{
              width: "100%", marginTop: 10, padding: "9px", borderRadius: 9, cursor: "pointer", background: "transparent",
              border: `1px dashed ${C.line}`, color: C.amber, fontFamily: "'DM Sans', sans-serif", fontSize: 12.5, fontWeight: 600 }}>
              {verEx[i] ? "Ocultar exemplo visual" : "📱 Ver exemplo visual"}
            </button>
            {verEx[i] && (
              <div className="noscroll" style={{ display: "flex", gap: 8, overflowX: "auto", marginTop: 10, paddingBottom: 4 }}>

// ---------- chat / área de ajustes ----------
function ChatScreen({ chat, setChat, perfilTexto, ajustes, addAjuste, removeAjuste, onNovoNicho }) {
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);

  async function enviar() {
    const msg = input.trim();
    if (!msg || loading) return;
    const novo = [...chat, { role: "user", text: msg }];
    setChat(novo);
    setInput("");
    setLoading(true);
    try {
      const txt = await chamarIA({
        system: `Você é o assistente do Cria. Perfil atual do criador:
${perfilTexto()}
Ajustes já ativos: ${ajustes.length ? ajustes.join("; ") : "nenhum"}.

O criador pode pedir pra você dar mais ênfase em algo, mudar o foco do conteúdo, ou avisar que trocou de nicho. Quando ele pedir um ajuste, transforme em uma instrução curta e imperativa pra valer nas próximas pautas.

Responda SEMPRE apenas com JSON válido, sem markdown:
{
  "resposta": "resposta curta e prática (máx 3 frases), confirmando o que será ajustado",
  "ajuste": "instrução curta e imperativa pra guardar, OU null se não for um pedido de ajuste",
  "novo_nicho": "o novo nicho SE ele disse que mudou de nicho, senão null"
}`,
        messages: novo.map((m) => ({ role: m.role, content: m.text })),
      });

      // parse tolerante: se falhar, mostra o texto cru como resposta
      let resposta = txt.trim(), ajuste = null, novoNicho = null;
      try {
        const obj = JSON.parse(txt.slice(txt.indexOf("{"), txt.lastIndexOf("}") + 1));
        resposta = obj.resposta || resposta;
        ajuste = obj.ajuste && obj.ajuste !== "null" ? obj.ajuste : null;
        novoNicho = obj.novo_nicho && obj.novo_nicho !== "null" ? obj.novo_nicho : null;
      } catch (_) {}

      const extras = [];
      if (ajuste) { addAjuste(ajuste); extras.push({ role: "sys", text: `✓ Ajuste salvo: ${ajuste}` }); }
      if (novoNicho) { onNovoNicho(novoNicho); extras.push({ role: "sys", text: `🔄 Nicho atualizado para "${novoNicho}". As pautas foram resetadas.` }); }

      setChat([...novo, { role: "assistant", text: resposta }, ...extras]);
    } catch (e) {
      setChat([...novo, { role: "assistant", text: "Deu um erro aqui: " + String(e.message || e) }]);
    } finally { setLoading(false); }
  }

  return (
    <div className="rise">
      <h2 className="disp" style={{ fontSize: 24, margin: "16px 0 2px", fontWeight: 700 }}>Assistente</h2>
      <Sub>Peça melhorias ("dá mais ênfase em dribles") ou avise se mudou de nicho — o app aplica nas próximas pautas.</Sub>

      {ajustes.length > 0 && (
        <div style={{ marginBottom: 14, padding: "10px 12px", borderRadius: 12, border: `1px solid ${C.line}`, background: "rgba(168,85,247,.06)" }}>
          <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.amber, textTransform: "uppercase" }}>⚙️ Ajustes ativos</span>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
            {ajustes.map((a) => (
              <span key={a} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, background: C.card, border: `1px solid ${C.line}`, padding: "4px 6px 4px 10px", borderRadius: 8 }}>
                {a}
                <button onClick={() => removeAjuste(a)} style={{ background: "none", border: "none", color: C.mute, cursor: "pointer", fontSize: 14, lineHeight: 1 }}>×</button>
              </span>
            ))}
          </div>
        </div>
      )}

      <div style={{ minHeight: 180, display: "flex", flexDirection: "column", gap: 10, marginBottom: 14 }}>
        {chat.length === 0 && <p style={{ color: C.mute, fontSize: 13.5, textAlign: "center", padding: "26px 0" }}>Ex: "foca mais em vídeos curtos e dá ênfase em humor"</p>}
        {chat.map((m, i) => {
          if (m.role === "sys") return (
            <div key={i} style={{ alignSelf: "center", fontSize: 12, color: C.amber, background: "rgba(168,85,247,.1)", padding: "6px 12px", borderRadius: 10, textAlign: "center" }}>{m.text}</div>
          );
          return (
            <div key={i} style={{ alignSelf: m.role === "user" ? "flex-end" : "flex-start", maxWidth: "85%",
              padding: "10px 13px", borderRadius: 14, fontSize: 14, lineHeight: 1.5,
              background: m.role === "user" ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : C.card,
              color: m.role === "user" ? "var(--onAccent)" : C.ink, border: m.role === "user" ? "none" : `1px solid ${C.line}` }}>
              {m.text}
            </div>
          );
        })}
        {loading && <div style={{ alignSelf: "flex-start", color: C.mute, fontSize: 13, padding: "6px 4px" }}>digitando...</div>}
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && enviar()}
          placeholder="Peça uma melhoria..." style={{ flex: 1, padding: "13px 14px", borderRadius: 12, border: `1px solid ${C.line}`, background: C.soft, color: C.ink, fontSize: 14.5, fontFamily: "'DM Sans', sans-serif", outline: "none" }} />
        <button onClick={enviar} disabled={loading} style={{ padding: "0 18px", borderRadius: 12, border: "none", cursor: "pointer", fontSize: 18,
          background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: "var(--onAccent)" }}>↑</button>
      </div>
    </div>
  );
}

function MarcasScreen({ profile, ofertas, setOfertas, mensagens, addMsg }) {
  const [chatAberto, setChatAberto] = useState(null);
  const brl = (n) => Number(n || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  const meus = profile.metricas || { seguidores: 0, alcance: 0, eng: 0 };
  const nichoMatch = (of) => {
    const a = (of.nicho || "").toLowerCase().trim();
    const b = (profile.nicho || "").toLowerCase().trim();
    return !!a && !!b && (a.includes(b) || b.includes(a));
  };
  const combina = (of) => nichoMatch(of) && (!of.seguidoresMin || meus.seguidores >= of.seguidoresMin) && (!of.alcanceMin || meus.alcance >= of.alcanceMin);

  function candidatar(of) {
    if (!profile.verificado) return;
    setOfertas((arr) => arr.map((x) => {
      if (x.id !== of.id) return x;
      if ((x.candidatos || []).some((c) => c.nome === (profile.nome || "Criador"))) return x;
      const cand = { nome: profile.nome || "Criador", nicho: profile.nicho, seguidores: meus.seguidores, alcance: meus.alcance, eng: meus.eng, publico: profile.publico, plataformas: profile.plataformas, portfolio: profile.portfolio, status: "pendente" };
      return { ...x, candidatos: [...(x.candidatos || []), cand] };
    }));
    notify && notify("marca", `Novo candidato: ${profile.nome || "Criador"} se inscreveu em "${of.titulo}"`);
  }
  function enviarEntrega(of) {
    setOfertas((arr) => arr.map((x) => x.id !== of.id ? x : {
      ...x, candidatos: x.candidatos.map((c) => c.nome === (profile.nome || "Criador") ? { ...c, status: "entregue", entrega: "minha-entrega.mp4" } : c),
    }));
    notify && notify("marca", `${profile.nome || "Criador"} enviou a entrega de "${of.titulo}"`);
  }
  function avaliarMarca(of, n) {
    setOfertas((arr) => arr.map((x) => x.id !== of.id ? x : { ...x, candidatos: x.candidatos.map((c) => c.nome === (profile.nome || "Criador") ? { ...c, notaMarca: n } : c) }));
  }
  function responderConvite(of, aceitar) {
    setOfertas((arr) => arr.map((x) => x.id !== of.id ? x : { ...x, candidatos: x.candidatos.map((c) => c.nome === (profile.nome || "Criador") ? { ...c, status: aceitar ? "aprovado" : "recusado" } : c) }));
    notify && notify("marca", `${profile.nome || "Criador"} ${aceitar ? "aceitou" : "recusou"} o convite de "${of.titulo}"`);
  }
  const reputacaoMarca = (marca) => mediaNota(ofertas.filter((o) => o.marca === marca).flatMap((o) => (o.candidatos || []).map((c) => c.notaMarca || 0)));
  // Criadores só veem campanhas ativas (não as que aguardam depósito)
  const ofertasVisiveis = ofertas.filter(o => o.status !== "aguardando_deposito");

  return (
    <div className="rise">
      <h2 className="disp" style={{ fontSize: 24, margin: "16px 0 2px", fontWeight: 700 }}>Vagas de marcas</h2>
      <Sub>Candidate-se às campanhas das marcas. Os valores já são o que você recebe, limpo.</Sub>

      <div style={{ marginBottom: 14, padding: "11px 13px", borderRadius: 12, border: `1px solid ${C.line}`, background: profile.verificado ? "rgba(126,224,138,.08)" : "rgba(255,107,107,.07)" }}>
        {profile.verificado
          ? <p style={{ fontSize: 12.5, margin: 0, color: C.green }}>✓ Métricas verificadas: {meus.seguidores.toLocaleString("pt-BR")} seguidores · {meus.alcance.toLocaleString("pt-BR")} alcance · {meus.eng}% eng.</p>
          : <p style={{ fontSize: 12.5, margin: 0, color: C.rose }}>⚠ Conecte sua conta no Perfil pra verificar. Sem isso, você não pode se candidatar.</p>}
      </div>

      {ofertas.length === 0 ? (
        <p style={{ color: C.mute, fontSize: 13.5, textAlign: "center", padding: "30px 10px" }}>Nenhuma marca publicou campanha ainda. Entre como Marca (sair e logar) pra criar uma e testar.</p>
      ) : [...ofertas].sort((a, b) => (combina(b) ? 1 : 0) - (combina(a) ? 1 : 0)).map((of) => {
        const meu = (of.candidatos || []).find((c) => c.nome === (profile.nome || "Criador"));
        const bateSeg = !of.seguidoresMin || meus.seguidores >= of.seguidoresMin;
        const bateAlc = !of.alcanceMin || meus.alcance >= of.alcanceMin;
        return (
          <div key={of.id} style={{ borderRadius: 14, border: `1px solid ${combina(of) ? "rgba(126,224,138,.5)" : C.line}`, background: C.card, padding: 15, marginBottom: 12 }}>
            {combina(of) && <span style={{ display: "inline-block", marginBottom: 8, fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: "rgba(126,224,138,.16)", color: C.green }}>⭐ Combina com você</span>}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span className="disp" style={{ fontSize: 16, fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 20 }}>{of.logo || "🏢"}</span>{of.marca}{reputacaoMarca(of.marca) > 0 && <span style={{ fontSize: 11, color: "#ffcf4d" }}>★ {reputacaoMarca(of.marca)}</span>}</span>
              <span style={{ fontWeight: 700, color: C.amber }}>{brl(of.valor * (1 - TAXA_PLATAFORMA))}</span>
            </div>
            <p style={{ fontSize: 13.5, margin: "6px 0 0", lineHeight: 1.45 }}>{of.titulo}</p>
            {of.briefing && <p style={{ fontSize: 12.5, margin: "5px 0 0", lineHeight: 1.45, color: C.mute }}>{of.briefing}</p>}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
              {entregaTexto(of.entregaveis) && <Tag>{entregaTexto(of.entregaveis)}</Tag>}
              {(of.plataforma || []).map((p) => <Tag key={p}>{p}</Tag>)}
              {of.nicho && <Tag>{of.nicho}</Tag>}
              {of.prazo && <Tag>📅 {of.prazo}</Tag>}
              {of.meta > 0 && <Tag>🎯 {of.meta.toLocaleString("pt-BR")} views</Tag>}
              {of.anexo && <Tag>📎 {of.anexo}</Tag>}
            </div>
            {(of.seguidoresMin || of.alcanceMin) > 0 && (
              <div style={{ marginTop: 10, fontSize: 12, lineHeight: 1.7 }}>
                <span style={{ color: C.mute }}>Exigências: </span>
                {of.seguidoresMin > 0 && <span style={{ color: bateSeg ? C.green : C.rose }}>{bateSeg ? "✓" : "✗"} {of.seguidoresMin.toLocaleString("pt-BR")}+ seguidores  </span>}
                {of.alcanceMin > 0 && <span style={{ color: bateAlc ? C.green : C.rose }}>{bateAlc ? "✓" : "✗"} {of.alcanceMin.toLocaleString("pt-BR")}+ alcance</span>}

            <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.line}`, fontSize: 12.5, color: C.mute, lineHeight: 1.6 }}>
              Base garantida <strong style={{ color: C.green }}>{brl(of.valor * (1 - TAXA_PLATAFORMA))}</strong>
              {of.bonus > 0 && <> · bônus <strong style={{ color: C.amber }}>{brl(of.bonus * (1 - TAXA_PLATAFORMA))}</strong> se atingir {of.meta.toLocaleString("pt-BR")} views</>}
            </div>
            {!meu ? (
              <button onClick={() => candidatar(of)} disabled={!profile.verificado} style={{
                width: "100%", marginTop: 11, padding: "10px", borderRadius: 10, cursor: profile.verificado ? "pointer" : "default", border: "none",
                fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 13.5,
                background: profile.verificado ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : C.line, color: profile.verificado ? "var(--onAccent)" : C.mute }}>
                {profile.verificado ? "Candidatar-se" : "Verifique sua conta primeiro"}
              </button>
            ) : meu.status === "convidado" ? (
              <div style={{ marginTop: 11 }}>
                <div style={{ padding: "9px", borderRadius: 10, textAlign: "center", fontSize: 13, fontWeight: 700, background: "rgba(168,85,247,.16)", color: C.amber }}>📨 A marca te convidou pra essa campanha!</div>
                <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                  <button onClick={() => responderConvite(of, true)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13.5, fontFamily: "'DM Sans', sans-serif", background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: "var(--onAccent)" }}>Aceitar</button>
                  <button onClick={() => responderConvite(of, false)} style={{ flex: "0 0 auto", padding: "10px 14px", borderRadius: 10, border: `1px solid ${C.line}`, cursor: "pointer", fontWeight: 700, fontSize: 13.5, fontFamily: "'DM Sans', sans-serif", background: "transparent", color: C.rose }}>Recusar</button>
                </div>
              </div>
            ) : meu.status === "aprovado" ? (
              <div style={{ marginTop: 11 }}>
                <div style={{ padding: "9px", borderRadius: 10, textAlign: "center", fontSize: 13, fontWeight: 700, background: "rgba(126,224,138,.16)", color: C.green }}>✓ Aprovado! Envie sua entrega.</div>
                <button onClick={() => enviarEntrega(of)} style={{ width: "100%", marginTop: 8, padding: "10px", borderRadius: 10, border: "none", cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 13.5, background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: "var(--onAccent)" }}>📤 Enviar entrega</button>
              </div>
            ) : (
              <div style={{ marginTop: 11 }}>
                <div style={{ padding: "10px", borderRadius: 10, textAlign: "center", fontSize: 13.5, fontWeight: 700,
                  background: meu.status === "concluido" ? "rgba(126,224,138,.18)" : (meu.status === "recusado" || meu.status === "estornado" || meu.status === "disputa") ? "rgba(255,93,143,.15)" : C.line,
                  color: meu.status === "concluido" ? C.green : (meu.status === "recusado" || meu.status === "estornado" || meu.status === "disputa") ? C.rose : C.mute }}>
                  {meu.status === "concluido" ? `✓ Pago: base ${brl(of.valor * (1 - TAXA_PLATAFORMA))}${meu.bonusLiberado ? ` + bônus ${brl(of.bonus * (1 - TAXA_PLATAFORMA))} 🎉` : (of.meta > 0 ? " (bônus aguardando resultado)" : "")}`
                    : meu.status === "entregue" ? "📤 Entrega enviada — aguardando aprovação da marca"
                    : meu.status === "disputa" ? "⚠️ A marca contestou a entrega — em análise pela equipe Cria"
                    : meu.status === "estornado" ? "❌ Contestação aceita — você não recebeu por esta entrega"
                    : meu.status === "recusado" ? "Recusado"
                    : "Aguardando aprovação..."}
                </div>
                {meu.status === "concluido" && (
                  <div style={{ marginTop: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                    <span style={{ fontSize: 12, color: C.mute }}>Avalie a marca:</span>
                    <StarRating value={meu.notaMarca || 0} onRate={(n) => avaliarMarca(of, n)} />
                  </div>
                )}
              </div>
            )}
            {meu && (
              <div style={{ marginTop: 10 }}>
                <button onClick={() => setChatAberto(chatAberto === of.id ? null : of.id)} style={{ width: "100%", padding: "9px", borderRadius: 10, cursor: "pointer", background: "transparent", border: `1px solid ${C.line}`, color: C.mute, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 13 }}>
                  💬 {chatAberto === of.id ? "Fechar conversa" : "Falar com a marca"}
                </button>

                  <ChatThread eu="criador" msgs={mensagens[`${of.id}|${profile.nome || "Criador"}`]} onSend={(txt) => addMsg(of.id, profile.nome || "Criador", "criador", txt)} />
                )}
              </div>
            )}
          </div>
        );
      })}
      <p style={{ fontSize: 11, color: C.mute, textAlign: "center", marginTop: 16, opacity: .7, lineHeight: 1.5 }}>
        Simulação. No app real, pagamento e contrato rodam no backend de forma segura.
      </p>
    </div>
  );
}

// ---------- painel da MARCA ----------
function DashboardMarca({ marcaProfile, ofertas, produtos, vendas, onIr }) {
  const brl = (n) => Number(n || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  const mp = marcaProfile || {};
  const minhasCamp = (ofertas || []);
  const meusProd = (produtos || []).filter((p) => p.dono === (mp.nome || "Marca"));
  const vendasDeProd = (pid) => (vendas || []).filter((v) => v.produtoId === pid).length;

  // métricas de campanhas
  const totalCamp = minhasCamp.length;
  const abertas = minhasCamp.filter((c) => c.status !== "encerrada").length;
  const allCands = minhasCamp.flatMap((of) => (of.candidatos || []).map((c) => ({ ...c, campanha: of.titulo, valor: of.valor, bonus: of.bonus })));
  const nCandidatos = allCands.length;
  const nAprovados = allCands.filter((c) => c.status === "aprovado" || c.status === "entregue" || c.status === "concluido").length;
  const nConcluidos = allCands.filter((c) => c.status === "concluido").length;
  const nDisputa = allCands.filter((c) => c.status === "disputa").length;

  // financeiro
  const gastoTotal = allCands.filter((c) => c.status === "concluido").reduce((s, c) => s + (c.valor || 0), 0);
  const comprometido = allCands.filter((c) => ["aprovado","entregue"].includes(c.status)).reduce((s, c) => s + (c.valor || 0), 0);
  const taxaPlatTotal = gastoTotal * 0.20;

  // vendas de produtos
  const vendasTotal = meusProd.reduce((s, p) => s + vendasDeProd(p.id), 0);
  const receitaProd = meusProd.reduce((s, p) => s + vendasDeProd(p.id) * p.preco * (1 - 0.05), 0);

  // gráfico de investimento por campanha
  const barDataCamp = minhasCamp.slice(0, 6).map((c) => ({
    label: c.titulo.length > 8 ? c.titulo.slice(0, 7) + "…" : c.titulo,
    value: (c.candidatos || []).filter((cd) => cd.status === "concluido").length,
  }));

  // atividade recente
  const recente = [
    ...allCands.filter((c) => c.status === "concluido").slice(0, 3).map((c) => ({ icon: "✅", texto: `Entrega aprovada: ${c.nome} em "${c.campanha}"`, valor: c.valor })),
    ...allCands.filter((c) => c.status === "candidato").slice(0, 2).map((c) => ({ icon: "👤", texto: `Nova candidatura: ${c.nome}`, valor: null })),
    ...allCands.filter((c) => c.status === "disputa").slice(0, 2).map((c) => ({ icon: "⚠️", texto: `Contestação em análise: ${c.nome}`, valor: null })),
  ].slice(0, 5);

  // tendência de investimento semanal (simulada)
  const dias7 = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const hoje = new Date().getDay();
  const semana = [...Array(7)].map((_, i) => dias7[(hoje - 6 + i + 7) % 7]);
  const tendencia = semana.map((lb, i) => ({
    label: lb,
    value: parseFloat((gastoTotal * ((i + 1) / 7) * (0.7 + Math.sin(i * 0.8) * 0.15)).toFixed(2)),
  }));
  if (gastoTotal > 0) tendencia[6].value = gastoTotal;

  return (
    <div className="rise" style={{ paddingBottom: 24 }}>
      <h2 className="disp" style={{ fontSize: 22, fontWeight: 800, margin: "16px 0 2px" }}>
        Olá, {mp.nome || "Marca"}! 👋
      </h2>
      <p style={{ fontSize: 13.5, color: C.mute, margin: "0 0 18px" }}>
        Visão geral das suas campanhas e produtos.
      </p>

      {/* cards financeiros */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        {[
          { lb: "Investido", v: gastoTotal, cor: C.rose },
          { lb: "Comprometido", v: comprometido, cor: C.amber },
          { lb: "Taxa plataforma", v: taxaPlatTotal, cor: C.mute },
          { lb: "Receita produtos", v: receitaProd, cor: C.green },
        ].map(({ lb, v, cor }) => (
          <div key={lb} style={{ borderRadius: 13, border: `1px solid ${C.line}`, background: C.card, padding: "13px 14px" }}>
            <div style={{ fontSize: 11, color: C.mute, textTransform: "uppercase", letterSpacing: 1 }}>{lb}</div>
            <div className="disp" style={{ fontSize: 20, fontWeight: 800, color: cor, marginTop: 4 }}>{brl(v)}</div>
          </div>
        ))}
      </div>

      {/* gráfico de investimento semanal */}
      <div style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, padding: "14px 10px 6px", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 4px 8px" }}>
          <span className="disp" style={{ fontSize: 14, fontWeight: 700 }}>📈 Investimento na semana</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.rose }}>{brl(gastoTotal)}</span>
        </div>
        {gastoTotal > 0
          ? <LineChart data={tendencia} cor="var(--rose)" />
          : <div style={{ textAlign: "center", padding: "18px 0", color: C.mute, fontSize: 13 }}>Nenhum investimento ainda. Crie sua primeira campanha! 🚀</div>}
      </div>

      {/* métricas de campanhas */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
        {[
          { lb: "Campanhas", v: totalCamp, icon: "📣", acao: () => onIr("campanhas") },
          { lb: "Abertas", v: abertas, icon: "🟢", acao: () => onIr("campanhas") },
          { lb: "Candidatos", v: nCandidatos, icon: "👥", acao: () => onIr("campanhas") },
          { lb: "Aprovados", v: nAprovados, icon: "✅", acao: null },
          { lb: "Concluídos", v: nConcluidos, icon: "🏆", acao: null },
          { lb: nDisputa > 0 ? "Em disputa ⚠️" : "Disputas", v: nDisputa, icon: "⚠️", acao: nDisputa > 0 ? () => onIr("campanhas") : null },
        ].map(({ lb, v, icon, acao }) => (
          <div key={lb} onClick={acao || undefined} style={{ borderRadius: 12, border: `1px solid ${lb.includes("disputa") && v > 0 ? C.rose : C.line}`, background: C.card, padding: "11px 8px", textAlign: "center", cursor: acao ? "pointer" : "default" }}>
            <div style={{ fontSize: 20 }}>{icon}</div>
            <div className="disp" style={{ fontSize: 18, fontWeight: 800, color: lb.includes("disputa") && v > 0 ? C.rose : C.ink, marginTop: 2 }}>{v}</div>
            <div style={{ fontSize: 10.5, color: C.mute, marginTop: 2, lineHeight: 1.3 }}>{lb}</div>
          </div>
        ))}
      </div>

      {/* entregas por campanha */}
      {barDataCamp.some((d) => d.value > 0) && (
        <div style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, padding: "14px 10px 8px", marginBottom: 14 }}>
          <span className="disp" style={{ display: "block", fontSize: 14, fontWeight: 700, marginBottom: 10, padding: "0 4px" }}>🏁 Entregas concluídas por campanha</span>
          <BarChart data={barDataCamp} />
        </div>
      )}

      {/* produtos */}
      {meusProd.length > 0 && (
        <div style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, padding: "14px 10px 8px", marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 4px 8px" }}>
            <span className="disp" style={{ fontSize: 14, fontWeight: 700 }}>🛒 Vendas dos seus produtos</span>
            <span style={{ fontSize: 12, color: C.mute }}>{vendasTotal} venda{vendasTotal !== 1 ? "s" : ""} · {brl(receitaProd)}</span>
          </div>
          <BarChart data={meusProd.map((p) => ({ label: p.nome.length > 8 ? p.nome.slice(0, 7) + "…" : p.nome, value: vendasDeProd(p.id) }))} />
        </div>
      )}

      {/* atividade recente */}
      <div style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, padding: 14 }}>
        <span className="disp" style={{ display: "block", fontSize: 14, fontWeight: 700, marginBottom: 10 }}>🕐 Atividade recente</span>
        {recente.length === 0
          ? <p style={{ fontSize: 13, color: C.mute, margin: 0 }}>Nenhuma atividade ainda. Crie uma campanha ou adicione produtos à sua loja! 🚀</p>
          : recente.map((a, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: i < recente.length - 1 ? `1px solid ${C.line}` : "none" }}>
              <span style={{ fontSize: 13.5 }}>{a.icon} <span style={{ color: C.ink }}>{a.texto}</span></span>
              {a.valor != null && <span style={{ fontSize: 13, fontWeight: 700, color: C.rose, flexShrink: 0, marginLeft: 8 }}>{brl(a.valor)}</span>}
            </div>
          ))}
      </div>
    </div>
  );
}

function ModalProduto({ produto, categorias, onSalvar, onFechar }) {
  const init = produto || { nome:"", foto:"", preco:"", comissao:"40", categoria:"", descricao:"", ativo:true, privado:false, temAfiliados:true };
  const [d, setD] = useState(init);
  const set = (k,v) => setD(o => ({...o, [k]:v}));
  const ok = d.nome.trim() && d.preco;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:500,background:"var(--bg)",borderRadius:"20px 20px 0 0",padding:"22px 20px 36px",border:"1px solid var(--line)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span className="disp" style={{fontSize:18,fontWeight:800}}>{produto ? "Editar produto" : "Novo produto"}</span>
          <button onClick={onFechar} style={{background:"none",border:"none",color:"var(--mute)",fontSize:26,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <Label>Foto do produto</Label>
        <FotoUpload value={d.foto} onChange={v => set("foto",v)} rotulo="Adicionar foto" />
        <Label>Nome *</Label>
        <Input value={d.nome} onChange={v => set("nome",v)} placeholder="Nome do produto" />
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><Label>Preço (R$) *</Label><NumberField value={d.preco} onChange={v => set("preco",v)} placeholder="0,00" /></div>
          <div style={{flex:1}}><Label>Comissão (%)</Label><NumberField value={d.comissao} onChange={v => set("comissao",v)} placeholder="40" /></div>
        </div>
        {categorias.length > 0 && (
          <>
            <Label>Categoria</Label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {categorias.map(cat => (
                <button key={cat} onClick={() => set("categoria",cat)} style={{padding:"6px 12px",borderRadius:20,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:12.5,border:`1px solid ${d.categoria===cat ? "var(--accent)" : "var(--line)"}`,background:d.categoria===cat ? "rgba(168,85,247,.15)" : "transparent",color:d.categoria===cat ? "var(--accent)" : "var(--mute)"}}>{cat}</button>
              ))}
            </div>
          </>
        )}
        <Label>Descrição</Label>
        <Input value={d.descricao} onChange={v => set("descricao",v)} placeholder="Descreva o produto" />
        <div style={{marginTop:8,marginBottom:16}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13.5,color:"var(--ink)",marginBottom:8}}>
            <input type="checkbox" checked={d.temAfiliados!==false} onChange={e => set("temAfiliados",e.target.checked)} />
            Permitir afiliados (criadores podem vender e ganhar comissão)
          </label>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13.5,color:"var(--ink)",marginBottom:8}}>
            <input type="checkbox" checked={d.ativo!==false} onChange={e => set("ativo",e.target.checked)} />
            Produto ativo (visível na loja)
          </label>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13.5,color:"var(--ink)"}}>
            <input type="checkbox" checked={!!d.privado} onChange={e => set("privado",e.target.checked)} />
            Privado (só afiliados aprovados veem)
          </label>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onFechar} style={{flex:1,padding:"13px",borderRadius:12,border:"1px solid var(--line)",background:"transparent",color:"var(--mute)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:14}}>Cancelar</button>
          <button onClick={() => ok && onSalvar(d)} disabled={!ok} style={{flex:2,padding:"13px",borderRadius:12,border:"none",cursor:ok?"pointer":"default",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,background:ok ? `linear-gradient(135deg,var(--accent),var(--accent2))` : "var(--line)",color:ok ? "var(--onAccent)" : "var(--mute)"}}>
            {produto ? "Salvar alterações" : "Adicionar produto"}
          </button>
        </div>
      </div>
    </div>
  );
}

function LojaView({ marcaProfile, setMarcaProfile, produtos, setProdutos, meusProdutosMarca, vendasDeProd, brl, onSalvarLoja }) {
  const [aba, setAba] = useState("vitrine");
  const [modalProd, setModalProd] = useState(null);
  const [filtroStatus, setFiltroStatus] = useState("ativos");
  const [novaCategoria, setNovaCategoria] = useState("");
  const [salvando, setSalvando] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");
  const categorias = marcaProfile.categorias || [];

  async function salvarLoja() {
    setSalvando(true);
    if (onSalvarLoja) await onSalvarLoja({ ...marcaProfile, _produtos: meusProdutosMarca });
    setSalvando(false);
    setSavedMsg("✓ Salvo!");
    setTimeout(() => setSavedMsg(""), 2000);
  }

  function addProduto(d) {
    const novo = { id:"p"+Date.now(), dono:marcaProfile.nome||"Marca", nome:d.nome, foto:d.foto, preco:Number(d.preco), comissao:Number(d.comissao)||30, categoria:d.categoria||"Geral", descricao:d.descricao||"", ativo:d.ativo!==false, privado:!!d.privado, temAfiliados:d.temAfiliados!==false, promotores:[] };
    setProdutos(a => [novo,...a]);
    setModalProd(null);
    // Auto-save imediato
    setTimeout(() => onSalvarLoja && onSalvarLoja({ ...marcaProfile, _produtos: [novo, ...meusProdutosMarca] }), 500);
  }
  function editProduto(d) {
    const atualizado = {...d, preco:Number(d.preco), comissao:Number(d.comissao)||30};
    setProdutos(a => a.map(p => p.id===d.id ? {...p,...atualizado} : p));
    setModalProd(null);
    setTimeout(() => onSalvarLoja && onSalvarLoja({ ...marcaProfile, _produtos: meusProdutosMarca.map(p => p.id===d.id?{...p,...atualizado}:p) }), 500);
  }
  function toggleProd(id, campo) {
    setProdutos(a => a.map(p => p.id===id ? {...p,[campo]:!p[campo]} : p));
  }
  function deleteProd(id) {
    if (!window.confirm("Excluir este produto?")) return;
    setProdutos(a => a.filter(p => p.id!==id));
    setTimeout(() => onSalvarLoja && onSalvarLoja({ ...marcaProfile, _produtos: meusProdutosMarca.filter(p=>p.id!==id) }), 500);
  }

  const prodsFiltrados = meusProdutosMarca.filter(p =>
    filtroStatus==="todos" ? true :
    filtroStatus==="ativos" ? p.ativo!==false :
    filtroStatus==="inativos" ? p.ativo===false :
    filtroStatus==="privados" ? p.privado : true
  );

  // Agrupar por categoria para vitrine
  const categoriasCom = categorias.filter(cat => meusProdutosMarca.some(p => p.categoria===cat && p.ativo!==false && !p.privado));
  const semCategoria = meusProdutosMarca.filter(p => p.ativo!==false && !p.privado && !categorias.includes(p.categoria));

  return (
    <div style={{marginTop:8}}>
      {modalProd && <ModalProduto produto={modalProd==="novo"?null:modalProd} categorias={categorias} onSalvar={modalProd==="novo"?addProduto:editProduto} onFechar={() => setModalProd(null)} />}

      <div style={{display:"flex",background:"var(--soft)",borderRadius:12,padding:4,marginBottom:16}}>
        {[["vitrine","🏪 Vitrine"],["produtos","📦 Produtos"]].map(([v,lb]) => (
          <button key={v} onClick={() => setAba(v)} style={{flex:1,padding:"9px 4px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,background:aba===v?"var(--card)":"transparent",color:aba===v?"var(--ink)":"var(--mute)"}}>
            {lb}
          </button>
        ))}
      </div>

      {/* VITRINE */}
      {aba==="vitrine" && (
        <div>
          <div style={{borderRadius:14,overflow:"hidden",background:"var(--card)"}}>
            {marcaProfile.banner ? <img src={marcaProfile.banner} alt="" style={{width:"100%",height:140,objectFit:"cover"}} />

                            <div style={{fontSize:13.5,fontWeight:800,color:"var(--accent)"}}>{brl(p.preco)}</div>

                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      {semCategoria.map(p => (
                        <div key={p.id} style={{borderRadius:12,border:"1px solid var(--line)",background:"var(--card)",overflow:"hidden"}}>
                          {p.foto ? <img src={p.foto} alt="" style={{width:"100%",height:100,objectFit:"cover"}} /> : <div style={{height:80,background:"var(--soft)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🛍️</div>}
                          <div style={{padding:"8px 10px 10px"}}>
                            <div style={{fontSize:13,fontWeight:700,lineHeight:1.3}}>{p.nome}</div>
                            <div style={{fontSize:14,fontWeight:800,color:"var(--accent)",marginTop:4}}>{brl(p.preco)}</div>
                            {p.temAfiliados!==false && <div style={{fontSize:10.5,color:"var(--green)",marginTop:3}}>✓ Afiliados · {p.comissao}%</div>}

            + Adicionar produto
          </button>

          {/* Gerenciar categorias */}
          <div style={{borderRadius:12,border:"1px solid var(--line)",background:"var(--card)",padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:12.5,fontWeight:700,color:"var(--mute)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Categorias da loja</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={novaCategoria} onChange={e => setNovaCategoria(e.target.value)} onKeyDown={e => { if(e.key==="Enter"&&novaCategoria.trim()){setMarcaProfile(o=>({...o,categorias:[...(o.categorias||[]),novaCategoria.trim()]}));setNovaCategoria("");}}}
                placeholder="Nova categoria..." style={{flex:1,padding:"9px 12px",borderRadius:9,border:"1px solid var(--line)",background:"var(--soft)",color:"var(--ink)",fontSize:13.5,fontFamily:"'DM Sans',sans-serif",outline:"none"}} />
              <button onClick={() => {if(!novaCategoria.trim())return;setMarcaProfile(o=>({...o,categorias:[...(o.categorias||[]),novaCategoria.trim()]}));setNovaCategoria("");}}

            </div>
            {categorias.length>0 && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
