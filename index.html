;\n  const codigo = (profile?.nome || \"criador\").toLowerCase().replace(/[^a-z0-9]/g, \"\").slice(0, 10) || \"criador\";\n  const ganhoPorPro = 99.9 * COMISSAO;\n  return (\n    <div className=\"rise\">\n      <h2 className=\"disp\" style={{ fontSize: 24, margin: \"16px 0 2px\", fontWeight: 700 }}>Configura\u00e7\u00f5es</h2>\n      <Sub>Seu plano atual: <strong style={{ color: C.amber }}>{plano}</strong></Sub>\n      {modalPlano && <PagamentoModal plano={modalPlano} onFechar={() => setModalPlano(null)} onConfirmar={(id) => { setPendente(id); setAviso(`Pagamento registrado! Plano ${id} ativado em at\u00e9 1 hora ap\u00f3s confirma\u00e7\u00e3o.`); }} />}\n      {PLANOS.map((pl) => {\n        const atual = pl.id === plano;\n        const aguardando = pendente === pl.id;\n        return (\n          <div key={pl.id} style={{ marginBottom: 12, padding: 16, borderRadius: 14, border: `1px solid ${atual ? pl.cor : C.line}`, background: atual ? \"rgba(168,85,247,.06)\" : C.card }}>\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"baseline\" }}>\n              <span className=\"disp\" style={{ fontSize: 18, fontWeight: 700, color: pl.cor }}>{pl.id}</span>\n              <span style={{ fontWeight: 700 }}>{pl.preco}</span>\n            </div>\n            <p style={{ color: C.mute, fontSize: 13, margin: \"6px 0 12px\" }}>{pl.linha}</p>\n            {atual ? (\n              <span style={{ fontSize: 12.5, color: C.amber, fontWeight: 600 }}>\u2713 Plano atual</span>\n            ) : aguardando ? (\n              <span style={{ fontSize: 12.5, color: C.green, fontWeight: 600 }}>\u23f3 Aguardando ativa\u00e7\u00e3o</span>\n            ) : pl.id !== \"Gr\u00e1tis\" ? (\n              <button onClick={() => setModalPlano(pl)} style={{ padding: \"10px 18px\", borderRadius: 10, border: \"none\", cursor: \"pointer\", fontFamily: \"'DM Sans', sans-serif\", fontWeight: 700, fontSize: 13.5, background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: \"var(--onAccent)\" }}>\n                Assinar {pl.id}\n              </button>\n            ) : null}\n          </div>\n        );\n      })}\n      {plano !== \"Gr\u00e1tis\" && (\n        <button onClick={() => { setPlano(\"Gr\u00e1tis\"); setAviso(\"Plano cancelado. Voc\u00ea voltou pro Gr\u00e1tis.\"); }} style={{ width: \"100%\", padding: \"12px\", borderRadius: 12, border: `1px solid ${C.line}`, background: \"transparent\", color: C.rose, fontFamily: \"'DM Sans', sans-serif\", fontWeight: 600, fontSize: 14, cursor: \"pointer\", marginTop: 4 }}>Cancelar assinatura</button>\n      )}\n      {aviso && <p style={{ marginTop: 14, fontSize: 13, color: C.amber, textAlign: \"center\" }}>{aviso}</p>}\n\n      <h2 className=\"disp\" style={{ fontSize: 18, fontWeight: 700, margin: \"26px 0 4px\" }}>\ud83c\udf81 Indique e ganhe</h2>\n      <p style={{ color: C.mute, fontSize: 13, margin: \"0 0 12px\", lineHeight: 1.5 }}>\n        Ganhe <strong style={{ color: C.amber }}>40% do primeiro pagamento</strong> de cada pessoa que assinar pela sua indica\u00e7\u00e3o.\n      </p>\n      <div style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, padding: 15 }}>\n        <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.amber, textTransform: \"uppercase\" }}>Seu link de convite</span>\n        <div style={{ marginTop: 8, display: \"flex\", gap: 8, alignItems: \"center\" }}>\n          <div style={{ flex: 1, padding: \"10px 12px\", borderRadius: 9, background: C.soft, border: `1px solid ${C.line}`, fontSize: 12.5, color: C.ink, wordBreak: \"break-all\" }}>\n            {window.location.origin}/?ref={codigo}\n          </div>\n          <button onClick={() => { navigator.clipboard?.writeText(`${window.location.origin}/?ref=${codigo}`); setAviso(\"Link copiado!\"); setTimeout(() => setAviso(\"\"), 2000); }}\n            style={{ flexShrink: 0, padding: \"10px 14px\", borderRadius: 9, border: `1px solid ${C.amber}`, background: \"transparent\", color: C.amber, cursor: \"pointer\", fontFamily: \"'DM Sans',sans-serif\", fontWeight: 700, fontSize: 13 }}>\n            Copiar\n          </button>\n        </div>\n        <div style={{ marginTop: 14, padding: \"12px 14px\", borderRadius: 10, background: \"rgba(126,224,138,.1)\", border: \"1px solid rgba(126,224,138,.35)\" }}>\n          <span style={{ fontSize: 11, color: C.mute, textTransform: \"uppercase\", letterSpacing: 1 }}>Indica\u00e7\u00f5es confirmadas</span>\n          <div className=\"disp\" style={{ fontSize: 26, fontWeight: 800, color: C.green, marginTop: 2 }}>\n            {indicados} \u00d7 {ganhoPorPro.toLocaleString(\"pt-BR\", { style: \"currency\", currency: \"BRL\" })} = {(indicados * ganhoPorPro).toLocaleString(\"pt-BR\", { style: \"currency\", currency: \"BRL\" })}\n          </div>\n          <p style={{ fontSize: 11.5, color: C.mute, margin: \"4px 0 0\" }}>40% de R$ 99,90 por assinatura confirmada</p>\n        </div>\n        <p style={{ fontSize: 11.5, color: C.mute, margin: \"10px 0 0\", lineHeight: 1.5 }}>Quando algu\u00e9m assinar pelo seu link, a comiss\u00e3o \u00e9 adicionada \u00e0 sua carteira ap\u00f3s confirma\u00e7\u00e3o do pagamento.</p>\n      </div>\n\n      <p style={{ fontSize: 11, color: C.mute, textAlign: \"center\", marginTop: 18, opacity: .7, lineHeight: 1.5 }}>\n        \n      </p>\n    </div>\n  );\n}\n\n// ---------- \u00e1rea de marcas (marketplace simulado) ----------\n// ---------- vagas para o CRIADOR (candidatar-se) ----------\nfunction MarcasScreen({ profile, ofertas, setOfertas, mensagens, addMsg }) {\n  const [chatAberto, setChatAberto] = useState(null);\n  const brl = (n) => Number(n || 0).toLocaleString(\"pt-BR\", { style: \"currency\", currency: \"BRL\" });\n  const meus = profile.metricas || { seguidores: 0, alcance: 0, eng: 0 };\n  const nichoMatch = (of) => {\n    const a = (of.nicho || \"\").toLowerCase().trim();\n    const b = (profile.nicho || \"\").toLowerCase().trim();\n    return !!a && !!b && (a.includes(b) || b.includes(a));\n  };\n  const combina = (of) => nichoMatch(of) && (!of.seguidoresMin || meus.seguidores >= of.seguidoresMin) && (!of.alcanceMin || meus.alcance >= of.alcanceMin);\n\n  function candidatar(of) {\n    if (!profile.verificado) return;\n    setOfertas((arr) => arr.map((x) => {\n      if (x.id !== of.id) return x;\n      if ((x.candidatos || []).some((c) => c.nome === (profile.nome || \"Criador\"))) return x;\n      const cand = { nome: profile.nome || \"Criador\", nicho: profile.nicho, seguidores: meus.seguidores, alcance: meus.alcance, eng: meus.eng, publico: profile.publico, plataformas: profile.plataformas, portfolio: profile.portfolio, status: \"pendente\" };\n      return { ...x, candidatos: [...(x.candidatos || []), cand] };\n    }));\n    notify && notify(\"marca\", `Novo candidato: ${profile.nome || \"Criador\"} se inscreveu em \"${of.titulo}\"`);\n  }\n  function enviarEntrega(of) {\n    setOfertas((arr) => arr.map((x) => x.id !== of.id ? x : {\n      ...x, candidatos: x.candidatos.map((c) => c.nome === (profile.nome || \"Criador\") ? { ...c, status: \"entregue\", entrega: \"minha-entrega.mp4\" } : c),\n    }));\n    notify && notify(\"marca\", `${profile.nome || \"Criador\"} enviou a entrega de \"${of.titulo}\"`);\n  }\n  function avaliarMarca(of, n) {\n    setOfertas((arr) => arr.map((x) => x.id !== of.id ? x : { ...x, candidatos: x.candidatos.map((c) => c.nome === (profile.nome || \"Criador\") ? { ...c, notaMarca: n } : c) }));\n  }\n  function responderConvite(of, aceitar) {\n    setOfertas((arr) => arr.map((x) => x.id !== of.id ? x : { ...x, candidatos: x.candidatos.map((c) => c.nome === (profile.nome || \"Criador\") ? { ...c, status: aceitar ? \"aprovado\" : \"recusado\" } : c) }));\n    notify && notify(\"marca\", `${profile.nome || \"Criador\"} ${aceitar ? \"aceitou\" : \"recusou\"} o convite de \"${of.titulo}\"`);\n  }\n  const reputacaoMarca = (marca) => mediaNota(ofertas.filter((o) => o.marca === marca).flatMap((o) => (o.candidatos || []).map((c) => c.notaMarca || 0)));\n  // Criadores s\u00f3 veem campanhas ativas (n\u00e3o as que aguardam dep\u00f3sito)\n  const ofertasVisiveis = ofertas.filter(o => o.status !== \"aguardando_deposito\");\n\n  return (\n    <div className=\"rise\">\n      <h2 className=\"disp\" style={{ fontSize: 24, margin: \"16px 0 2px\", fontWeight: 700 }}>Vagas de marcas</h2>\n      <Sub>Candidate-se \u00e0s campanhas das marcas. Os valores j\u00e1 s\u00e3o o que voc\u00ea recebe, limpo.</Sub>\n\n      <div style={{ marginBottom: 14, padding: \"11px 13px\", borderRadius: 12, border: `1px solid ${C.line}`, background: profile.verificado ? \"rgba(126,224,138,.08)\" : \"rgba(255,107,107,.07)\" }}>\n        {profile.verificado\n          ? <p style={{ fontSize: 12.5, margin: 0, color: C.green }}>\u2713 M\u00e9tricas verificadas: {meus.seguidores.toLocaleString(\"pt-BR\")} seguidores \u00b7 {meus.alcance.toLocaleString(\"pt-BR\")} alcance \u00b7 {meus.eng}% eng.</p>\n          : <p style={{ fontSize: 12.5, margin: 0, color: C.rose }}>\u26a0 Conecte sua conta no Perfil pra verificar. Sem isso, voc\u00ea n\u00e3o pode se candidatar.</p>}\n      </div>\n\n      {ofertas.length === 0 ? (\n        <p style={{ color: C.mute, fontSize: 13.5, textAlign: \"center\", padding: \"30px 10px\" }}>Nenhuma marca publicou campanha ainda. Entre como Marca (sair e logar) pra criar uma e testar.</p>\n      ) : [...ofertas].sort((a, b) => (combina(b) ? 1 : 0) - (combina(a) ? 1 : 0)).map((of) => {\n        const meu = (of.candidatos || []).find((c) => c.nome === (profile.nome || \"Criador\"));\n        const bateSeg = !of.seguidoresMin || meus.seguidores >= of.seguidoresMin;\n        const bateAlc = !of.alcanceMin || meus.alcance >= of.alcanceMin;\n        return (\n          <div key={of.id} style={{ borderRadius: 14, border: `1px solid ${combina(of) ? \"rgba(126,224,138,.5)\" : C.line}`, background: C.card, padding: 15, marginBottom: 12 }}>\n            {combina(of) && <span style={{ display: \"inline-block\", marginBottom: 8, fontSize: 11, fontWeight: 700, padding: \"3px 10px\", borderRadius: 20, background: \"rgba(126,224,138,.16)\", color: C.green }}>\u2b50 Combina com voc\u00ea</span>}\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\" }}>\n              <span className=\"disp\" style={{ fontSize: 16, fontWeight: 700, display: \"flex\", alignItems: \"center\", gap: 8 }}><span style={{ fontSize: 20 }}>{of.logo || \"\ud83c\udfe2\"}</span>{of.marca}{reputacaoMarca(of.marca) > 0 && <span style={{ fontSize: 11, color: \"#ffcf4d\" }}>\u2605 {reputacaoMarca(of.marca)}</span>}</span>\n              <span style={{ fontWeight: 700, color: C.amber }}>{brl(of.valor * (1 - TAXA_PLATAFORMA))}</span>\n            </div>\n            <p style={{ fontSize: 13.5, margin: \"6px 0 0\", lineHeight: 1.45 }}>{of.titulo}</p>\n            {of.briefing && <p style={{ fontSize: 12.5, margin: \"5px 0 0\", lineHeight: 1.45, color: C.mute }}>{of.briefing}</p>}\n            <div style={{ display: \"flex\", flexWrap: \"wrap\", gap: 6, marginTop: 8 }}>\n              {entregaTexto(of.entregaveis) && <Tag>{entregaTexto(of.entregaveis)}</Tag>}\n              {(of.plataforma || []).map((p) => <Tag key={p}>{p}</Tag>)}\n              {of.nicho && <Tag>{of.nicho}</Tag>}\n              {of.prazo && <Tag>\ud83d\udcc5 {of.prazo}</Tag>}\n              {of.meta > 0 && <Tag>\ud83c\udfaf {of.meta.toLocaleString(\"pt-BR\")} views</Tag>}\n              {of.anexo && <Tag>\ud83d\udcce {of.anexo}</Tag>}\n            </div>\n            {(of.seguidoresMin || of.alcanceMin) > 0 && (\n              <div style={{ marginTop: 10, fontSize: 12, lineHeight: 1.7 }}>\n                <span style={{ color: C.mute }}>Exig\u00eancias: </span>\n                {of.seguidoresMin > 0 && <span style={{ color: bateSeg ? C.green : C.rose }}>{bateSeg ? \"\u2713\" : \"\u2717\"} {of.seguidoresMin.toLocaleString(\"pt-BR\")}+ seguidores  </span>}\n                {of.alcanceMin > 0 && <span style={{ color: bateAlc ? C.green : C.rose }}>{bateAlc ? \"\u2713\" : \"\u2717\"} {of.alcanceMin.toLocaleString(\"pt-BR\")}+ alcance</span>}\n              </div>\n            )}\n            <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.line}`, fontSize: 12.5, color: C.mute, lineHeight: 1.6 }}>\n              Base garantida <strong style={{ color: C.green }}>{brl(of.valor * (1 - TAXA_PLATAFORMA))}</strong>\n              {of.bonus > 0 && <> \u00b7 b\u00f4nus <strong style={{ color: C.amber }}>{brl(of.bonus * (1 - TAXA_PLATAFORMA))}</strong> se atingir {of.meta.toLocaleString(\"pt-BR\")} views</>}\n            </div>\n            {!meu ? (\n              <button onClick={() => candidatar(of)} disabled={!profile.verificado} style={{\n                width: \"100%\", marginTop: 11, padding: \"10px\", borderRadius: 10, cursor: profile.verificado ? \"pointer\" : \"default\", border: \"none\",\n                fontFamily: \"'DM Sans', sans-serif\", fontWeight: 700, fontSize: 13.5,\n                background: profile.verificado ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : C.line, color: profile.verificado ? \"var(--onAccent)\" : C.mute }}>\n                {profile.verificado ? \"Candidatar-se\" : \"Verifique sua conta primeiro\"}\n              </button>\n            ) : meu.status === \"convidado\" ? (\n              <div style={{ marginTop: 11 }}>\n                <div style={{ padding: \"9px\", borderRadius: 10, textAlign: \"center\", fontSize: 13, fontWeight: 700, background: \"rgba(168,85,247,.16)\", color: C.amber }}>\ud83d\udce8 A marca te convidou pra essa campanha!</div>\n                <div style={{ display: \"flex\", gap: 8, marginTop: 8 }}>\n                  <button onClick={() => responderConvite(of, true)} style={{ flex: 1, padding: \"10px\", borderRadius: 10, border: \"none\", cursor: \"pointer\", fontWeight: 700, fontSize: 13.5, fontFamily: \"'DM Sans', sans-serif\", background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: \"var(--onAccent)\" }}>Aceitar</button>\n                  <button onClick={() => responderConvite(of, false)} style={{ flex: \"0 0 auto\", padding: \"10px 14px\", borderRadius: 10, border: `1px solid ${C.line}`, cursor: \"pointer\", fontWeight: 700, fontSize: 13.5, fontFamily: \"'DM Sans', sans-serif\", background: \"transparent\", color: C.rose }}>Recusar</button>\n                </div>\n              </div>\n            ) : meu.status === \"aprovado\" ? (\n              <div style={{ marginTop: 11 }}>\n                <div style={{ padding: \"9px\", borderRadius: 10, textAlign: \"center\", fontSize: 13, fontWeight: 700, background: \"rgba(126,224,138,.16)\", color: C.green }}>\u2713 Aprovado! Envie sua entrega.</div>\n                <button onClick={() => enviarEntrega(of)} style={{ width: \"100%\", marginTop: 8, padding: \"10px\", borderRadius: 10, border: \"none\", cursor: \"pointer\",\n                  fontFamily: \"'DM Sans', sans-serif\", fontWeight: 700, fontSize: 13.5, background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: \"var(--onAccent)\" }}>\ud83d\udce4 Enviar entrega</button>\n              </div>\n            ) : (\n              <div style={{ marginTop: 11 }}>\n                <div style={{ padding: \"10px\", borderRadius: 10, textAlign: \"center\", fontSize: 13.5, fontWeight: 700,\n                  background: meu.status === \"concluido\" ? \"rgba(126,224,138,.18)\" : (meu.status === \"recusado\" || meu.status === \"estornado\" || meu.status === \"disputa\") ? \"rgba(255,93,143,.15)\" : C.line,\n                  color: meu.status === \"concluido\" ? C.green : (meu.status === \"recusado\" || meu.status === \"estornado\" || meu.status === \"disputa\") ? C.rose : C.mute }}>\n                  {meu.status === \"concluido\" ? `\u2713 Pago: base ${brl(of.valor * (1 - TAXA_PLATAFORMA))}${meu.bonusLiberado ? ` + b\u00f4nus ${brl(of.bonus * (1 - TAXA_PLATAFORMA))} \ud83c\udf89` : (of.meta > 0 ? \" (b\u00f4nus aguardando resultado)\" : \"\")}`\n                    : meu.status === \"entregue\" ? \"\ud83d\udce4 Entrega enviada \u2014 aguardando aprova\u00e7\u00e3o da marca\"\n                    : meu.status === \"disputa\" ? \"\u26a0\ufe0f A marca contestou a entrega \u2014 em an\u00e1lise pela equipe Cria\"\n                    : meu.status === \"estornado\" ? \"\u274c Contesta\u00e7\u00e3o aceita \u2014 voc\u00ea n\u00e3o recebeu por esta entrega\"\n                    : meu.status === \"recusado\" ? \"Recusado\"\n                    : \"Aguardando aprova\u00e7\u00e3o...\"}\n                </div>\n                {meu.status === \"concluido\" && (\n                  <div style={{ marginTop: 8, display: \"flex\", alignItems: \"center\", justifyContent: \"center\", gap: 8 }}>\n                    <span style={{ fontSize: 12, color: C.mute }}>Avalie a marca:</span>\n                    <StarRating value={meu.notaMarca || 0} onRat
