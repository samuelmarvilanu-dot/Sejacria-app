}

    window._sb = supabase.createClient("https://faydgottylbbuylowlxg.supabase.co", "sb_publishable_Ixoymjk7YFspX5n003zzFw_h8uZxxYF");

    var jsx = "import React, { useState } from \"react\";\n\n// ============================================================\n//  CREATOR STUDIO \u2014 prot\u00f3tipo completo\n//  \u2022 7 abas (Dom\u2192S\u00e1b): clicou no dia, gera a pauta DAQUELE dia\n//  \u2022 Pauta do dia = tudo que postar (reels, story, v\u00eddeo longo...)\n//  \u2022 Chat, Perfil edit\u00e1vel (multi-rede), Configura\u00e7\u00f5es de plano\n// ============================================================\n\nconst C = {\n  bg: \"var(--bg)\", ink: \"var(--ink)\", mute: \"var(--mute)\",\n  amber: \"var(--accent)\", amberDeep: \"var(--accent2)\", rose: \"var(--rose)\",\n  green: \"var(--green)\", line: \"var(--line)\", card: \"var(--card)\", soft: \"var(--soft)\",\n  onAccent: \"var(--onAccent)\",\n};\n\nconst DIAS = [\"Domingo\", \"Segunda\", \"Ter\u00e7a\", \"Quarta\", \"Quinta\", \"Sexta\", \"S\u00e1bado\"];\nconst ABREV = [\"Dom\", \"Seg\", \"Ter\", \"Qua\", \"Qui\", \"Sex\", \"S\u00e1b\"];\nconst PLATAFORMAS = [\"YouTube\", \"TikTok\", \"Instagram\", \"Twitch\", \"Kwai\"];\nconst FORMATOS = [\"Live\", \"V\u00eddeo longo\", \"V\u00eddeo curto\", \"Carrossel / Post\"];\nconst OBJETIVOS = [\"Crescer audi\u00eancia\", \"Vender / converter\", \"Engajamento\", \"Autoridade\"];\nconst TONS = [\"Hype / energia\", \"Did\u00e1tico\", \"Humor\", \"Inspiracional\"];\nconst FREQ = [\"1-2x semana\", \"3-4x semana\", \"Todo dia\"];\nconst SEGUIDORES = [\"Come\u00e7ando (<1k)\", \"1k - 10k\", \"10k - 100k\", \"100k+\"];\nconst PUBLICO = [\"13-17\", \"18-24\", \"25-34\", \"35+\"];\nconst ENTREGAS = [\"1 Reels\", \"3 Stories\", \"1 V\u00eddeo longo\", \"Combo (Reels + Stories)\"];\nconst LOGOS = [\"\ud83c\udfe2\", \"\ud83c\udfae\", \"\u26bd\", \"\ud83d\udd25\", \"\ud83d\udc8e\", \"\ud83d\uded2\", \"\ud83c\udfaf\", \"\ud83d\udcf1\"];\nconst CRIADORES_EXEMPLO = []; // sem exemplos \u2014 s\u00f3 criadores reais cadastrados\nconst IDADE = [\"Menor de 18\", \"18-24\", \"25-34\", \"35-44\", \"45+\"];\nconst TAXA_PLATAFORMA = 0.20; // % que a plataforma fica nos contratos com marcas\nconst TAXA_PRODUTO = 0.05;    // 5% sobre cada venda de produto \u2014 abaixo de todas as concorrentes\n\nfunction metricasDe(faixa) {\n  const m = {\n    \"Come\u00e7ando (<1k)\": { seguidores: 600, alcance: 250, eng: 9.0 },\n    \"1k - 10k\": { seguidores: 5200, alcance: 1800, eng: 7.5 },\n    \"10k - 100k\": { seguidores: 42000, alcance: 11000, eng: 5.5 },\n    \"100k+\": { seguidores: 320000, alcance: 68000, eng: 3.8 },\n  };\n  return m[faixa] || m[\"1k - 10k\"];\n}\n\nfunction gerarPortfolio(nicho, plataformas) {\n  const p = (plataformas && plataformas.length) ? plataformas : [\"Instagram\"];\n  const base = nicho ? nicho : \"conte\u00fado\";\n  const cores = [\"linear-gradient(135deg,#ff9d3d,#e87420)\", \"linear-gradient(135deg,var(--green),#3d9d5a)\", \"linear-gradient(135deg,#ff6b6b,#c0392b)\", \"linear-gradient(135deg,#6b8bff,#3d50c0)\"];\n  const ideias = [`Tutorial: ${base}`, `Dicas r\u00e1pidas de ${base}`, `Minha rotina de ${base}`, `Erros comuns em ${base}`];\n  return ideias.slice(0, 3).map((tit, i) => ({\n    id: `v${i}_${Date.now()}`,\n    titulo: tit,\n    views: [128000, 64000, 31000, 12000][i] || 9000,\n    plataforma: p[i % p.length],\n    cor: cores[i % cores.length],\n  }));\n}\n\nconst stepBtn = { width: 40, height: 40, borderRadius: 10, border: `1px solid ${C.line}`, background: C.soft, color: C.amber, fontSize: 20, fontWeight: 700, cursor: \"pointer\", fontFamily: \"'DM Sans', sans-serif\" };\n\n// in\u00edcio da semana (domingo) como chave \u2014 usado pra contar usos e zerar a cada semana\nfunction chaveSemana(d = new Date()) {\n  const x = new Date(d); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - x.getDay());\n  return x.toISOString().slice(0, 10);\n}\n// as 7 datas reais da semana atual (dom..s\u00e1b)\nfunction datasDaSemana() {\n  const x = new Date(); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - x.getDay());\n  return [...Array(7)].map((_, i) => { const d = new Date(x); d.setDate(d.getDate() + i); return d; });\n}\n\nfunction iconeCena(t = \"\") {\n  const s = (t || \"\").toLowerCase();\n  if (s.includes(\"close\") || s.includes(\"rosto\") || s.includes(\"rea\u00e7\") || s.includes(\"react\")) return \"\ud83d\ude2e\";\n  if (s.includes(\"game\") || s.includes(\"tela\") || s.includes(\"jogo\") || s.includes(\"print\")) return \"\ud83c\udfae\";\n  if (s.includes(\"text\") || s.includes(\"legenda\")) return \"\ud83d\udd24\";\n  if (s.includes(\"a\u00e7\") || s.includes(\"moviment\")) return \"\u26a1\";\n  return \"\ud83c\udfac\";\n}\n\nfunction entregaTexto(e) {\n  if (!e) return \"\";\n  const p = [];\n  if (e.reels) p.push(`${e.reels} Reels`);\n  if (e.stories) p.push(`${e.stories} Stories`);\n  if (e.longos) p.push(`${e.longos} V\u00eddeo${e.longos > 1 ? \"s\" : \"\"} longo${e.longos > 1 ? \"s\" : \"\"}`);\n  return p.join(\" \u00b7 \");\n}\n\nfunction idadeDe(nasc) {\n  if (!nasc) return \"\";\n  const d = new Date(nasc);\n  if (isNaN(d)) return \"\";\n  const hoje = new Date();\n  let i = hoje.getFullYear() - d.getFullYear();\n  const m = hoje.getMonth() - d.getMonth();\n  if (m < 0 || (m === 0 && hoje.getDate() < d.getDate())) i--;\n  return i;\n}\n\nfunction statusCampanha(of) {\n  const cs = of.candidatos || [];\n  const conc = cs.filter((c) => c.status === \"concluido\").length;\n  const ativos = cs.filter((c) => [\"aprovado\", \"entregue\", \"concluido\"].includes(c.status)).length;\n  if ((of.qtd || 1) <= conc) return { txt: \"Conclu\u00edda\", cor: \"var(--green)\", bg: \"rgba(62,224,163,.16)\" };\n  if (ativos > 0) return { txt: \"Em andamento\", cor: \"var(--accent)\", bg: \"rgba(168,85,247,.16)\" };\n  return { txt: \"Aberta\", cor: \"var(--mute)\", bg: \"rgba(154,144,191,.16)\" };\n}\n\nfunction mediaNota(notas) {\n  const v = notas.filter((n) => n > 0);\n  if (!v.length) return 0;\n  return Math.round((v.reduce((a, n) => a + n, 0) / v.length) * 10) / 10;\n}\n\nfunction StarRating({ value = 0, onRate, adding: \"18px 14px\", color: C.mute, fontSize: 13, textAlign: \"center\", margin: 0 }}>Nada por aqui ainda.</p>\n              ) : meus.map((n) => (\n                <div key={n.id} style={{ padding: \"11px 14px\", borderBottom: `1px solid ${C.line}`, fontSize: 13, color: C.ink, lineHeight: 1.4 }}>{n.text}</div>\n              ))}\n            </div>\n          </div>\n        </>\n      )}\n    </div>\n  );\n}\n\nfunction PortfolioStrip({ videos }) {\n  if (!videos || !videos.length) return null;\n  return (\n    <div style={{ display: \"flex\", gap: 8, overflowX: \"auto\", marginTop: 10, paddingBottom: 4 }}>\n      {videos.map((v) => (\n        <div key={v.id} style={{ flex: \"0 0 auto\", width: 104 }}>\n          <div style={{ height: 64, borderRadius: 9, background: v.cor || \"linear-gradient(135deg,#ff9d3d,#e87420)\", display: \"flex\", alignItems: \"center\", justifyContent: \"center\", fontSize: 22, color: \"#fff\", position: \"relative\" }}>\n            \u25b6<span style={{ position: \"absolute\", bottom: 4, right: 6, fontSize: 9, background: \"rgba(0,0,0,.45)\", padding: \"1px 5px\", borderRadius: 5 }}>{v.plataforma}</span>\n          </div>\n          <p style={{ fontSize: 10.5, color: C.ink, margin: \"4px 0 0\", lineHeight: 1.25, height: 26, overflow: \"hidden\" }}>{v.titulo}</p>\n          <p style={{ fontSize: 10, color: C.mute, margin: 0 }}>{(v.views || 0).toLocaleString(\"pt-BR\")} views</p>\n        </div>\n      ))}\n    </div>\n  );\n}\n\nfunction ChatThread({ msgs, onSend, eu }) {\n  const [t, setT] = useState(\"\");\n  const send = () => { if (!t.trim()) return; onSend(t.trim()); setT(\"\"); };\n  return (\n    <div style={{ marginTop: 10, padding: 10, borderRadius: 11, background: \"var(--soft)\", border: `1px solid ${C.line}` }}>\n      <div style={{ maxHeight: 150, overflowY: \"auto\", display: \"flex\", flexDirection: \"column\", gap: 6, marginBottom: 8 }}>\n        {(!msgs || msgs.length === 0) && <p style={{ fontSize: 12, color: C.mute, textAlign: \"center\", margin: \"8px 0\" }}>Sem mensagens. Diga ol\u00e1 \ud83d\udc4b</p>}\n        {(msgs || []).map((m, i) => (\n          <div key={i} style={{ alignSelf: m.from === eu ? \"flex-end\" : \"flex-start\", maxWidth: \"82%\", padding: \"7px 10px\", borderRadius: 11, fontSize: 13, lineHeight: 1.4,\n            background: m.from === eu ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : C.card, color: m.from === eu ? \"var(--onAccent)\" : C.ink, border: m.from === eu ? \"none\" : `1px solid ${C.line}` }}>\n            {m.text}\n          </div>\n        ))}\n      </div>\n      <div style={{ display: \"flex\", gap: 6 }}>\n        <input value={t} onChange={(e) => setT(e.target.value)} onKeyDown={(e) => e.key === \"Enter\" && send()} placeholder=\"Mensagem...\"\n          style={{ flex: 1, padding: \"10px 12px\", borderRadius: 9, border: `1px solid ${C.line}`, background: C.soft, color: C.ink, fontSize: 13.5, outline: \"none\", fontFamily: \"'DM Sans', sans-serif\" }} />\n        <button onClick={send} style={{ padding: \"0 14px\", borderRadius: 9, border: \"none\", cursor: \"pointer\", fontSize: 16, background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: \"var(--onAccent)\" }}>\u2191</button>\n      </div>\n    </div>\n  );\n}\n\n// ---------- tela de login ----------\nfunction AuthScreen({ onAuth }) {\n  const [tela, setTela] = useState(\"escolha\"); // \"escolha\" | \"login\" | \"cadastro\"\n  const [papel, setPapel] = useState(null);\n  const [email, setEmail] = useState(\"\");\n  const [senha, setSenha] = useState(\"\");\n  const [confirmar, setConfirmar] = useState(\"\");\n  const [loading, setLoading] = useState(false);\n  const [msg, setMsg] = useState({ tipo: \"\", texto: \"\" });\n  const sb = window._sb;\n\n  async function entrarComGoogle() {\n    const sb = window._sb;\n    if (!sb) { setMsg({ tipo: \"erro\", texto: \"Configure o Supabase primeiro.\" }); return; }\n    const { error } = await sb.auth.signInWithOAuth({ provider: \"google\", options: { redirectTo: window.location.origin } });\n    if (error) setMsg({ tipo: \"erro\", texto: \"Google n\u00e3o est\u00e1 habilitado ainda. Use e-mail por enquanto.\" });\n  }\n  async function entrarComFacebook() {\n    const sb = window._sb;\n    if (!sb) { setMsg({ tipo: \"erro\", texto: \"Configure o Supabase primeiro.\" }); return; }\n    await sb.auth.signInWithOAuth({ provider: \"facebook\", options: { redirectTo: window.location.origin } });\n  }\n  async function entrar() {\n    if (!email.trim() || !senha) { setMsg({ tipo: \"erro\", texto: \"Preencha e-mail e senha.\" }); return; }\n    setLoading(true); setMsg({ tipo: \"\", texto: \"\" });\n    if (!sb) { onAuth(papel || \"criador\"); return; }\n    const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: senha });\n    setLoading(false);\n    if (error) setMsg({ tipo: \"erro\", texto: \"E-mail ou senha incorretos.\" });\n  }\n\n  async function cadastrar() {\n    if (!papel) { setMsg({ tipo: \"erro\", texto: \"Escolha seu perfil antes.\" }); return; }\n    if (!email.trim() || !senha) { setMsg({ tipo: \"erro\", texto: \"Preencha e-mail e senha.\" }); return; }\n    if (senha.length < 6) { setMsg({ tipo: \"erro\", texto: \"Senha m\u00ednima: 6 caracteres.\" }); return; }\n    if (senha !== confirmar) { setMsg({ tipo: \"erro\", texto: \"As senhas n\u00e3o coincidem.\" }); return; }\n    setLoading(true); setMsg({ tipo: \"\", texto: \"\" });\n    if (!sb) { onAuth(papel); return; }\n    const refCode = localStorage.getItem(\"cria_ref\") || null;\n    const { error } = await sb.auth.signUp({\n      email: email.trim(), password: senha,\n      options: {\n        data: { papel, referido_por: refCode },\n        emailRedirectTo: window.location.origin, // volta pro app ap\u00f3s confirmar\n      }\n    });\n    setLoading(false);\n    if (error) setMsg({ tipo: \"erro\", texto: error.message });\n    else setMsg({ tipo: \"ok\", texto: \"\ud83d\udce7 Enviamos um e-mail de confirma\u00e7\u00e3o. Clique no link e voc\u00ea entrar\u00e1 automaticamente!\" });\n  }\n\n  const inp = { width: \"100%\", padding: \"13px 14px\", borderRadius: 11, border: `1px solid ${C.line}`, background: C.soft, color: C.ink, fontSize: 15, fontFamily: \"'DM Sans', sans-serif\", outline: \"none\", boxSizing: \"border-box\", marginBottom: 10 };\n  const GoogleBtn = ({ texto }) => (\n    <button onClick={entrarComGoogle} style={{ width: \"100%\", padding: \"13px\", borderRadius: 12, border: \"1px solid #dadce0\", cursor: \"pointer\", background: \"#fff\", color: \"#1a1a1a\", fontFamily: \"'DM Sans', sans-serif\", fontWeight: 700, fontSize: 14.5, display: \"flex\", alignItems: \"center\", justifyContent: \"center\", gap: 10, marginBottom: 12 }}>\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\"><path fill=\"#4285F4\" d=\"M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z\"/><path fill=\"#34A853\" d=\"M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z\"/><path fill=\"#FBBC05\" d=\"M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z\"/><path fill=\"#EA4335\" d=\"M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z\"/></svg>\n      {texto}\n    </button>\n  );\n\n  return (\n    <div style={{ maxWidth: 420, margin: \"0 auto\", minHeight: \"100dvh\", display: \"flex\", flexDirection: \"column\", justifyContent: \"center\", padding: \"30px 22px\", backgroundImage: `radial-gradient(circle at 50% 0%, rgba(168,85,247,.18), transparent 55%)` }}>\n      <div style={{ textAlign: \"center\", marginBottom: 26 }}>\n        <div style={{ width: 66, height: 66, margin: \"0 auto 16px\", filter: \"drop-shadow(0 10px 26px rgba(168,85,247,.45))\" }}><LogoMark size={66} /></div>\n        <Wordmark size={42} gradient />\n        <p style={{ color: C.mute, fontSize: 14.5, margin: \"8px 0 0\" }}>Onde criador vira neg\u00f3cio. Bora? \ud83d\ude80</p>\n      </div>\n\n      {/* ESCOLHA DE PERFIL */}\n      {tela === \"escolha\" && (\n        <>\n          <p style={{ textAlign: \"center\", fontWeight: 700, fontSize: 15, color: C.ink, marginBottom: 14 }}>Como voc\u00ea vai usar o Cria?</p>\n          {[[\"criador\",\"\ud83c\udfac\",\"Sou Criador de Conte\u00fado\",\"Pautas, roteiros, colabs e campanhas com marcas\"],[\"marca\",\"\ud83c\udfe2\",\"Sou uma Marca / Empresa\",\"Contratar criadores e divulgar meus produtos\"]].map(([id,emoji,titulo,desc]) => (\n            <button key={id} onClick={() => { setPapel(id); setTela(\"cadastro\"); }}\n              style={{ width:\"100%\", textAlign:\"left\", padding:\"16px\", borderRadius:14, marginBottom:10, cursor:\"pointer\", border:`1px solid ${C.line}`, background:C.card, fontFamily:\"'DM Sans',sans-serif\", display:\"flex\", gap:12, alignItems:\"center\" }}>\n              <span style={{ fontSize:28, flexShrink:0 }}>{emoji}</span>\n              <span>\n                <span className=\"disp\" style={{ display:\"block\", fontSize:15.5, fontWeight:700, color:C.ink }}>{titulo}</span>\n                <span style={{ display:\"block\", fontSize:12.5, color:C.mute, marginTop:2 }}>{desc}</span>\n              </span>\n              <span style={{ marginLeft:\"auto\", color:C.mute, fontSize:18 }}>\u203a</span>\n            </button>\n          ))}\n          <div style={{ display:\"flex\", alignItems:\"center\", gap:10, margin:\"14px 0\" }}>\n            <div style={{ flex:1, height:1, background:C.line }}/><span style={{ color:C.mute, fontSize:12 }}>j\u00e1 tenho conta</span><div style={{ flex:1, height:1, background:C.line }}/>\n          </div>\n          <button onClick={() => setTela(\"login\")} style={{ width:\"100%\", padding:\"13px\", borderRadius:12, border:`1px solid ${C.line}`, cursor:\"pointer\", background:\"transparent\", color:C.ink, fontFamily:\"'DM Sans',sans-serif\", fontWeight:700, fontSize:14.5 }}>Entrar na minha conta</button>\n        </>\n      )}\n\n      {/* CADASTRO \u2014 ap\u00f3s escolher papel */}\n      {tela === \"cadastro\" && (\n        <>\n          <button onClick={() => { setTela(\"escolha\"); setMsg({ tipo:\"\", texto:\"\" }); }} style={{ background:\"none\", border:\"none\", color:C.mute, fontSize:13, cursor:\"pointer\", padding:\"0 0 14px\", alignSelf:\"flex-start\" }}>\u2190 Voltar</button>\n          <div style={{ padding:\"10px 14px\", borderRadius:10, background:\"rgba(168,85,247,.1)\", border:`1px solid ${C.amber}`, marginBottom:16, display:\"flex\", alignItems:\"center\", gap:10 }}>\n            <span style={{ fontSize:22 }}>{papel===\"criador\"?\"\ud83c\udfac\":\"\ud83c\udfe2\"}</span>\n            <span style={{ fontSize:13.5, fontWeight:700, color:C.amber }}>{papel===\"criador\"?\"Criador de Conte\u00fado\":\"Marca / Empresa\"}</span>\n          </div>\n          <GoogleBtn texto={`Cadastrar como ${papel===\"criador\"?\"Criador\":\"Marca\"} com Google`} />\n          <div style={{ display:\"flex\", alignItems:\"center\", gap:10, marginBottom:12 }}>\n            <div style={{ flex:1, height:1, background:C.line }}/><span style={{ color:C.mute, fontSize:12 }}>ou com e-mail</span><div style={{ flex:1, height:1, background:C.line }}/>\n          </div>\n          <input style={inp} type=\"email\" placeholder=\"Seu e-mail\" value={email} onChange={e => setEmail(e.target.value)} />\n          <input style={inp} type=\"password\" placeholder=\"Senha (m\u00edn. 6 caracteres)\" value={senha} onChange={e => setSenha(e.target.value)} />\n          <input style={inp} type=\"password\" placeholder=\"Confirmar senha\" value={confirmar} onChange={e => setConfirmar(e.target.value)} />\n          {msg.texto && <p style={{ fontSize:13, color:msg.tipo===\"ok\"?C.green:C.rose, margin:\"0 0 12px\", lineHeight:1.5 }}>{msg.texto}</p>}\n          <button onClick={cadastrar} disabled={loading} style={{ width:\"100%\", padding:\"14px\", borderRadius:12, border:\"none\", cursor:loading?\"default\":\"pointer\", background:loading?C.mute:`linear-gradient(135deg,${C.amber},${C.amberDeep})`, color:\"var(--onAccent)\", fontFamily:\"'DM Sans',sans-serif\", fontWeight:700, fontSize:14.5 }}>\n            {loading ? \"Criando conta...\" : \"Criar conta\"}\n          </button>\n          <p style={{ textAlign:\"center\", marginTop:14, fontSize:13.5, color:C.mute }}>J\u00e1 tem conta? <button onClick={() => setTela(\"login\")} style={{ background:\"none\", border:\"none\", color:C.amber, cursor:\"pointer\", fontWeight:700, fontSize:13.5, padding:0 }}>Entrar</button></p>\n        </>\n      )}\n\n      {/* LOGIN */}\n      {tela === \"login\" && (\n        <>\n          <button onClick={() => { setTela(\"escolha\"); setMsg({ tipo:\"\", texto:\"\" }); }} style={{ background:\"none\", border:\"none\", color:C.mute, fontSize:13, cursor:\"pointer\", padding:\"0 0 14px\", alignSelf:\"flex-start\" }}>\u2190 Voltar</button>\n          <GoogleBtn texto=\"Entrar com Google\" />\n          <div style={{ display:\"flex\", alignItems:\"center\", gap:10, marginBottom:12 }}>\n            <div style={{ flex:1, height:1, background:C.line }}/><span style={{ color:C.mute, fontSize:12 }}>ou com e-mail</span><div style={{ flex:1, height:1, background:C.line }}/>\n          </div>\n          <input style={inp} type=\"email\" placeholder=\"Seu e-mail\" value={email} onChange={e => setEmail(e.target.value)} />\n          <input style={inp} type=\"password\" placeholder=\"Sua senha\" value={senha} onChange={e => setSenha(e.target.value)} />\n          {msg.texto && <p style={{ fontSize:13, color:msg.tipo===\"ok\"?C.green:C.rose, margin:\"0 0 12px\", lineHeight:1.5 }}>{msg.texto}</p>}\n          <button onClick={entrar} disabled={loading} style={{ width:\"100%\", padding:\"14px\", borderRadius:12, border:\"none\", cursor:loading?\"default\":\"pointer\", background:loading?C.mute:`linear-gradient(135deg,${C.amber},${C.amberDeep})`, color:\"var(--onAccent)\", fontFamily:\"'DM Sans',sans-serif\", fontWeight:700, fontSize:14.5 }}>\n            {loading ? \"Entrando...\" : \"Entrar\"}\n          </button>\n          <p style={{ textAlign:\"center\", marginTop:14, fontSize:13.5, color:C.mute }}>N\u00e3o tem conta? <button onClick={() => setTela(\"escolha\")} style={{ background:\"none\", border:\"none\", color:C.amber, cursor:\"pointer\", fontWeight:700, fontSize:13.5, padding:0 }}>Cadastrar</button></p>\n        </>\n      )}\n    </div>\n  );\n}\n\nconst PLANOS = [\n  { id: \"Gr\u00e1tis\", preco: \"R$ 0\", linha: \"2 pautas por semana\", cor: C.mute, limiteSemana: 2, nivel: 0 },\n  { id: \"Criador\", preco: \"R$ 59,90/m\u00eas\", linha: \"4 pautas/semana \u00b7 roteiros extras \u00b7 colab, produtos e parcerias com marcas\", cor: C.amber, limiteSemana: 4, nivel: 1 },\n  { id: \"Pro\", preco: \"R$ 99,90/m\u00eas\", linha: \"7 pautas/semana \u00b7 roteiros e dicas extras \u00b7 destaque pras marcas (aparece primeiro) + tudo liberado\", cor: C.rose, limiteSemana: 7, nivel: 2 },\n];\n\n// leitor tolerante: l\u00ea o JSON; se vier cortado, salva o que chegou\nfunction lerJSON(raw) {\n  const limpo = raw.replace(/```json|```/g, \"\").trim();\n  try { return JSON.parse(limpo.slice(limpo.indexOf(\"{\"), limpo.lastIndexOf(\"}\") + 1)); } catch (_) {}\n  const posts = [];\n  const a = limpo.indexOf(\"[\");\n  if (a !== -1) {\n    let d = 0, s = -1;\n    for (let i = a; i < limpo.length; i++) {\n      const c = limpo[i];\n      if (c === \"{\") { if (d === 0) s = i; d++; }\n      else if (c === \"}\") { d--; if (d === 0 && s !== -1) { try { posts.push(JSON.parse(limpo.slice(s, i + 1))); } catch (_) {} s = -1; } }\n    }\n  }\n  const foco = limpo.match(/\"foco_do_dia\"\\s*:\\s*\"([^\"]*)\"/);\n  return { foco_do_dia: foco ? foco[1] : \"\", posts };\n}\n\nasync function chamarIA({ system, messages }) {\n  const r = await fetch(\"/api/claude\", {\n    method: \"POST\", headers: { \"Content-Type\": \"application/json\" },\n    body: JSON.stringify({ model: \"claude-haiku-4-5-20251001\", max_tokens: 1000, system, messages }),\n  });\n  const j = await r.json();\n  if (j.type === \"error\") {\n    const tipo = j.error?.type || \"\";\n    if (tipo === \"rate_limit_error\") throw new Error(\"RATE_LIMIT\");\n    if (tipo === \"overloaded_error\") throw new Error(\"SOBRECARGA\");\n    throw new Error(\"Erro da IA: \" + (j.error?.message || tipo).slice(0, 120));\n  }\n  const txt = (j.content || []).map((b) => (b.type === \"text\" ? b.text : \"\")).join(\"\\n\");\n  if (!txt) throw new Error(\"Resposta vazia: \" + JSON.stringify(j).slice(0, 120));\n  return txt;\n}\n\nconst HOLD_DIAS = 7; // dias de reten\u00e7\u00e3o (CDC: 7 dias de arrependimento para compras online)\n\nfunction App() {\n  const [profile, setProfile] = useState({ nome: \"\", foto: \"\", genero: \"\", nascimento: \"\", nicho: \"\", plataformas: [], formato: [], objetivo: [], tom: [], freq: \"\", seguidores: \"\", publico: \"\", handles: {}, portfolio_links: [], loja_banner: \"\", loja_descricao: \"\" });\n  const setupOk = profile.nome && profile.nascimento && profile.nicho && profile.plataformas.length && profile.formato.length && profile.objetivo.length && profile.tom.length && profile.freq && profile.seguidores;\n\n  const [tab, setTab] = useState(\"dashboard\");\n  const [selectedDay, setSelectedDay] = useState(new Date().getDay());\n  const [dias, setDias] = useState({}); // { [nomeDia]: {loading, erro, data} }\n  const [chat, setChat] = useState([]);\n  const [desempenho, setDesempenho] = useState({}); // { \"Dia|idx\": \"bombou\" | \"medio\" | \"fraco\" }\n  const [ajustes, setAjustes] = useState([]); // instru\u00e7\u00f5es permanentes pedidas no chat\n  const [ofertas, setOfertas] = useState([]); // campanhas publicadas por marcas\n  const [mensagens, setMensagens] = useState({}); // { \"ofId|nomeCriador\": [{from, text, t}] }\n  const addMsg = (ofId, nome, from, text) => setMensagens((m) => {\n    const k = `${ofId}|${nome}`;\n    return { ...m, [k]: [...(m[k] || []), { from, text, t: Date.now() }] };\n  });\n  const [notificacoes, setNotificacoes] = useState([]); // { id, para: 'criador'|'marca', text, lida }\n  const [notifOpen, setNotifOpen] = useState(false);\n  const notify = (para, text) => setNotificacoes((n) => [{ id: Date.now() + Math.random(), para, text, lida: false }, ...n]);\n  const [marcaProfile, setMarcaProfile] = useState({ logo: \"\", banner: \"\", nome: \"\", segmento: \"\", sobre: \"\", site: \"\", categorias: [] });\n  const [authed, setAuthed] = useState(false);\n  const [papel, setPapel] = useState(\"criador\");\n  const [sbUid, setSbUid] = useState(null);\n  const [sbLoad, setSbLoad] = useState(false);\n  const [profileLoading, setProfileLoading] = useState(false);\n  const [perfilLoad, setPerfilLoad] = useState(false);\n\n  // AUTO-SAVE produtos da marca no Supabase\n  useEffect(() => {\n    if (papel !== \"marca\" || !sbUid || !marcaProfile.nome) return;\n    const meusProd = produtos.filter(p => p.dono === marcaProfile.nome);\n    const timer = setTimeout(() => {\n      const dadosLoja = { ...marcaProfile, _produtos: meusProd };\n      salvarLojasSb(dadosLoja);\n    }, 1500);\n    return () => clearTimeout(timer);\n  }, [produtos, papel, sbUid]);\n\n  // AUTO-SAVE rascunhos no localStorage\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      try {\n        localStorage.setItem(\"cria_draft_profile\", JSON.stringify(profile));\n        if (papel === \"marca\") localStorage.setItem(\"cria_draft_marca\", JSON.stringify(marcaProfile));\n      } catch(e) {}\n    }, 1500); // debounce de 1.5s\n    return () => clearTimeout(timer);\n  }, [profile, marcaProfile, papel]);\n\n  // RESTAURAR rascunho se perfil n\u00e3o est\u00e1 salvo no banco ainda\n  useEffect(() => {\n    if (!authed || !window._sb) return;\n    const draftProfile = localStorage.getItem(\"cria_draft_profile\");\n    const draftMarca = localStorage.getItem(\"cria_draft_marca\");\n    if (draftProfile && !profile.nome) {\n      try { setProfile(JSON.parse(draftProfile)); } catch(e) {}\n    }\n    if (draftMarca && papel === \"marca\" && !marcaProfile.nome) {\n      try { setMarcaProfile(JSON.parse(draftMarca)); } catch(e) {}\n    }\n  }, [authed]);\n  useEffect(() => {\n    const ref = new URLSearchParams(window.location.search).get(\"ref\");\n    if (ref) localStorage.setItem(\"cria_ref\", ref);\n  }, []);\n\n  // Sess\u00e3o Supabase \u2014 checa login salvo e escuta mudan\u00e7as\n  useEffect(() => {\n    const sb = window._sb;\n    if (!sb) { setSbLoad(false); setPerfilLoad(false); return; }\n\n    // Timeout de seguran\u00e7a: SEMPRE para o loading ap\u00f3s 4s, n\u00e3o importa o que aconte\u00e7a\n    const timeout = setTimeout(() => {\n      console.warn(\"Timeout: for\u00e7ando loading=false\");\n      setSbLoad(false);\n      setPerfilLoad(false);\n    }, 4000);\n\n    sb.auth.getSession().then(function(res) {\n      var session = res && res.data && res.data.session;\n      clearTimeout(timeout);\n      if (session) {\n        setAuthed(true);\n        setSbUid(session.user.id);\n        var p = (session.user.user_metadata && session.user.user_metadata.papel) || \"criador\";\n        setPapel(p);\n        carregarPerfilSb(session.user.id);\n      } else {\n        setPerfilLoad(false);\n      }\n      setSbLoad(false);\n    }).catch(function(err) {\n      console.error(\"getSession erro:\", err);\n      clearTimeout(timeout);\n      setSbLoad(false);\n      setPerfilLoad(false);\n    });\n    var sub = sb.auth.onAuthStateChange(function(event, session) {\n      if (event === \"SIGNED_IN\") {\n        setAuthed(true);\n        if (session) {\n          setSbUid(session.user.id);\n          var p = (session.user.user_metadata && session.user.user_metadata.papel) || \"criador\";\n          setPapel(p);\n          carregarPerfilSb(session.user.id);\n        }\n      } else if (event === \"TOKEN_REFRESHED\" && session) {\n        setAuthed(true);\n        setSbUid(session.user.id);\n      } else if (!session) {\n        setAuthed(false); setSbUid(null); setPerfilLoad(false);\n      }\n    });\n    return function() { sub.data && sub.data.subscription && sub.data.subscription.unsubscribe(); };\n  }, []);\n\n  async function carregarPerfilSb(uid) {\n    setPerfilLoad(true);\n    const sb = window._sb;\n    if (!sb) { setPerfilLoad(false); return; }\n    try {\n      const { data } = await sb.from(\"profiles\").select(\"*\").eq(\"id\", uid).single();\n      if (!data) { setPerfilLoad(false); return; }\n      setProfile({ nome: data.nome || \"\", foto: data.foto_url || \"\", genero: data.genero || \"\", nascimento: data.nascimento || \"\", nicho: data.nicho || \"\", plataformas: data.plataformas || [], formato: data.formatos || [], objetivo: data.objetivos || [], tom: data.tons || [], freq: data.frequencia || \"\", seguidores: data.seguidores || \"\", publico: data.publico || \"\", handles: data.handles || {}, portfolio_links: data.portfolio_links || [] });\n      if (data.papel) setPapel(data.papel);\n      if (data.plano && data.plano !== \"Gr\u00e1tis\") {\n        const vence = data.plano_vence ? new Date(data.plano_vence) : null;\n        const ativo = vence && vence > new Date();\n        setPlano(ativo ? data.plano : \"Gr\u00e1tis\");\n        if (!ativo && data.plano !== \"Gr\u00e1tis\") await sb.from(\"profiles\").update({ plano: \"Gr\u00e1tis\" }).eq(\"id\", uid);\n      }\n      if (data.marca_data) {\n        try {\n          const md = JSON.parse(data.marca_data);\n          setMarcaProfile(md);\n          // Restaurar produtos salvos da marca\n          if (md._produtos && md._produtos.length > 0) {\n            setProdutos(prev => {\n              const outros = prev.filter(p => p.dono !== md.nome);\n              return [...md._produtos, ...outros];\n            });\n          }\n        } catch(e) {}\n      }\n      if (data.indicados) setIndicados(data.indicados);\n      if (data.sacado) setSacado(data.sacado);\n    } catch(e) {\n      console.error(\"Erro ao carregar perfil:\", e);\n    } finally {\n      setPerfilLoad(false);\n    }\n  }\n\n  async function salvarPerfilSb(novoProfile) {\n    const sb = window._sb;\n    if (!sb || !sbUid) return;\n    // colunas base \u2014 existem no schema original\n    const dados = {\n      papel,\n      nome: novoProfile.nome || null,\n      foto_url: novoProfile.foto || null,\n      genero: novoProfile.genero || null,\n      nascimento: novoProfile.nascimento || null,\n      nicho: novoProfile.nicho || null,\n      plataformas: novoProfile.plataformas || [],\n      formatos: novoProfile.formato || [],\n      objetivos: novoProfile.objetivo || [],\n      tons: novoProfile.tom || [],\n      frequencia: novoProfile.freq || null,\n      seguidores: novoProfile.seguidores || null,\n      publico: novoProfile.publico || null,\n      updated_at: new Date().toISOString(),\n    };\n    // colunas extras (da migra\u00e7\u00e3o) \u2014 adiciona se existirem\n    if (novoProfile.handles) dados.handles = novoProfile.handles;\n    if (novoProfile.portfolio_links) dados.portfolio_links = novoProfile.portfolio_links;\n    if (novoProfile.loja_banner !== undefined) dados.loja_banner = novoProfile.loja_banner;\n    if (novoProfile.loja_descricao !== undefined) dados.loja_descricao = novoProfile.loja_descricao;\n\n    const { error } = await sb.from(\"profiles\").update(dados).eq(\"id\", sbUid);\n    if (error) console.error(\"Erro ao salvar perfil:\", error.message);\n    else console.log(\"\u2705 Perfil salvo no Supabase\");\n  }\n\n  async function salvarLojasSb(novoMarcaProfile) {\n    const sb = window._sb;\n    if (!sb || !sbUid) return;\n    await sb.from(\"profiles\").update({ marca_data: JSON.stringify(novoMarcaProfile) }).eq(\"id\", sbUid);\n    localStorage.setItem(\"cria_draft_marca\", JSON.stringify(novoMarcaProfile));\n  }\n  async function setPlanoComSync(p) {\n    setPlano(p);\n    const sb = window._sb;\n    if (!sb || !sbUid) return;\n    await sb.from(\"profiles\").update({ plano: p }).eq(\"id\", sbUid);\n  }\n  const [menuOpen, setMenuOpen] = useState(false);\n  const [tema, setTema] = useState(\"dark\");\n  const [plano, setPlano] = useState(\"Gr\u00e1tis\");\n  const [uso, setUso] = useState({ semana: chaveSemana(), n: 0 });\n  const [indicados, setIndicados] = useState(0);\n  const [sacado, setSacado] = useState(0);\n  const [arquivados, setArquivados] = useState([]); // hist\u00f3rico de todas as pautas geradas\n  const [colabs, setColabs] = useState([]);\n  const [produtos, setProdutos] = useState([]);\n  const [vendas, setVendas] = useState([]);\n  const hoje = new Date().getDay();\n  const planoAtual = PLANOS.find((p) => p.id === plano) || PLANOS[0];\n  const limiteSemana = planoAtual.limiteSemana;\n  const planoNivel = planoAtual.nivel;\n  const usosSemana = uso.semana === chaveSemana() ? uso.n : 0;\n  const datasSemana = datasDaSemana();\n\n  const jaFez = chat.filter((m) => m.role === \"user\").slice(-4).map((m) => m.text).join(\"; \");\n\n  function resumoDesempenho() {\n    const bom = [], ruim = [];\n    Object.entries(desempenho).forEach(([k, r]) => {\n      const [d, ix] = k.split(\"|\");\n      const post = dias[d]?.data?.posts?.[Number(ix)];\n      if (!post) return;\n      const label = `${post.formato}: ${post.tema}`;\n      if (r === \"bombou\") bom.push(label);\n      else if (r === \"fraco\") ruim.push(label);\n    });\n    return { bom, ruim };\n  }\n  const dp = resumoDesempenho();\n  const formatosTop = [...new Set(dp.bom.map((s) => s.split(\":\")[0]))];\n\n  function perfilTexto() {\n    return `- Nicho: ${profile.nicho}\n- Redes: ${profile.plataformas.join(\", \")}\n- Formatos que produz: ${profile.formato.join(\", \")}\n- Objetivos (MESCLE todos no mesmo dia): ${profile.objetivo.join(\", \")}\n- Tom (mescle os escolhidos): ${profile.tom.join(\", \")}\n- Frequ\u00eancia: ${profile.freq}\n- Tamanho da audi\u00eancia: ${profile.seguidores}\n- Idade do criador: ${idadeDe(profile.nascimento) || \"?\"} anos\n- P\u00fablico principal: ${profile.publico || \"n\u00e3o informado\"}`;\n  }\n\n  const pautasGeradas = Object.values(dias).filter((v) => v?.data).length;\n  const bombouCount = Object.values(desempenho).filter((r) => r === \"bombou\").length;\n  const xp = pautasGeradas * 10 + bombouCount * 25;\n  const nivel = Math.floor(xp / 100) + 1;\n  const xpNoNivel = xp % 100;\n\n  const meuNome = profile.nome || \"Criador\";\n  const isDisponivel = (data) => {\n    if (!data) return false;\n    const d = new Date(data); d.setDate(d.getDate() + HOLD_DIAS);\n    return d <= new Date();\n  };\n  let ganhoLiberado = 0, ganhoPendente = 0, ganhoEmAnalise = 0;\n  ofertas.forEach((of) => (of.candidatos || []).forEach((c) => {\n    if (c.nome !== meuNome) return;\n    const base = (of.valor || 0) * (1 - TAXA_PLATAFORMA);\n    const bonusLiq = (of.bonus || 0) * (1 - TAXA_PLATAFORMA);\n    if (c.status === \"concluido\") {\n      if (isDisponivel(c.concluido_em)) {\n        ganhoLiberado += base;\n        if (c.bonusLiberado) ganhoLiberado += bonusLiq;\n        else if (of.meta > 0 && c.resultado == null) ganhoPendente += bonusLiq;\n      } else {\n        ganhoEmAnalise += base + (c.bonusLiberado ? bonusLiq : 0);\n      }\n    } else if (c.status === \"aprovado\" || c.status === \"entregue\") {\n      ganhoPendente += base + (of.meta > 0 ? bonusLiq : 0);\n    }\n  }));\n  const liquido = (v) => v.preco * (1 - TAXA_PRODUTO);\n  const ganhoAfiliado = (vendas || []).filter((v) => v.afiliado === meuNome).reduce((s, v) => s + liquido(v) * v.comissao / 100, 0);\n  const ganhoDonoProd = (vendas || []).filter((v) => v.dono === meuNome).reduce((s, v) => s + (v.afiliado ? liquido(v) * (1 - v.comissao / 100) : liquido(v)), 0);\n  const ganhoProdutos = ganhoAfiliado + ganhoDonoProd;\n  const ganhoIndicacao = indicados * (99.9 * 0.40);\n  const totalGanho = ganhoLiberado + ganhoProdutos + ganhoIndicacao;\n  const totalEmAnalise = ganhoEmAnalise + (ganhoProdutos > 0 ? 0 : 0); // produtos s\u00e3o liberados imediatamente (sem escrow)\n\n  async function gerarDia(diaIdx) {\n    const nome = DIAS[diaIdx];\n    const atual = dias[nome] || {};\n    const existe = !!atual.data;\n    const refeitos = atual.refeitos || 0;\n    const ehRedoGratis = existe && refeitos < 1; // 1 refa\u00e7\u00e3o gr\u00e1tis por pauta\n    // dia que j\u00e1 passou nesta semana n\u00e3o gera\n    if (diaIdx < hoje) {\n      setDias((o) => ({ ...o, [nome]: { loading: false, erro: `${nome} j\u00e1 passou nesta semana. Gere para hoje ou os pr\u00f3ximos dias.`, data: null } }));\n      return;\n    }\n    // limite semanal do plano (n\u00e3o acumula \u2014 zera toda semana). Refa\u00e7\u00e3o gr\u00e1tis n\u00e3o consome uso.\n    if (!ehRedoGratis && usosSemana >= limiteSemana) {\n      setDias((o) => ({ ...o, [nome]: { loading: false, erro: `LIMITE`, data: null, refeitos } }));\n      return;\n    }\n    setDias((o) => ({ ...o, [nome]: { loading: true, erro: null, data: null } }));\n    const qtdPosts = planoNivel >= 2 ? \"3 a 4\" : planoNivel >= 1 ? \"2 a 3\" : \"exatamente 2\";\n    const dicaExtra = planoNivel >= 2 ? `Para cada post, inclua tamb\u00e9m o campo \"dica\" com uma dica curta de distribui\u00e7\u00e3o/algoritmo.` : \"\";\n\n    const outros = Object.entries(dias)\n      .filter(([k, v]) => k !== nome && v?.data?.posts?.length)\n      .flatMap(([, v]) => v.data.posts.map((p) => p.tema))\n      .join(\"; \");\n\n    const prompt = `Perfil do criador:\n${perfilTexto()}\n\nMonte a PAUTA DE ${nome.toUpperCase()}. Pense no que costuma bombar nesse nicho e no que pode estar em alta por volta desse dia (tend\u00eancias sazonais, lan\u00e7amentos, e como o p\u00fablico se comporta nesse dia da semana). Respeite a frequ\u00eancia: em dias de menor produ\u00e7\u00e3o, sugira formatos leves (story, enquete).\n\nListe TUDO que a pessoa deve postar nesse dia \u2014 pode misturar formatos (Reels, Story, V\u00eddeo longo, etc.) \u2014 sempre alinhado aos objetivos dela.\n${outros ? `N\u00c3O repita estes temas j\u00e1 planejados: ${outros}.` : \"\"}\n${jaFez ? `O criador j\u00e1 fez recentemente (n\u00e3o repita): ${jaFez}.` : \"\"}\n${dp.bom.length ? `O que BOMBOU pra esse criador (priorize formatos/abordagens parecidos): ${dp.bom.join(\"; \")}.` : \"\"}\n${dp.ruim.length ? `O que foi FRACO (evite esse tipo): ${dp.ruim.join(\"; \")}.` : \"\"}\n${ajustes.length ? `AJUSTES que o criador pediu \u2014 siga \u00e0 risca em TODAS as pautas: ${ajustes.join(\"; \")}.` : \"\"}\n\nResponda APENAS com JSON v\u00e1lido, sem texto extra e sem markdown. Seja CONCISO (frases curtas, roteiro at\u00e9 3 passos). Para cada post inclua um \"storyboard\" de 2 a 3 quadros descrevendo o que mostrar na tela em cada cena (N\u00c3O gere imagens, s\u00f3 a descri\u00e7\u00e3o visual). ${dicaExtra} Gere ${qtdPosts} posts:\n{\n  \"foco_do_dia\": \"1 frase com a inten\u00e7\u00e3o do dia\",\n  \"posts\": [\n    { \"formato\": \"Reels\", \"tema\": \"...\", \"gancho\": \"...\", \"roteiro\": [\"passo 1\", \"passo 2\", \"passo 3\"], \"storyboard\": [{\"tipo\": \"ex: close / gameplay / rea\u00e7\u00e3o\", \"cena\": \"o que aparece na tela\", \"texto_tela\": \"texto sobreposto na cena\"}], \"cta\": \"...\", \"melhor_horario\": \"ex: 19h\", \"hashtags\": [\"#...\"] }\n  ]\n}`;\n\n    try {\n      const txt = await chamarIA({\n        system: \"Voc\u00ea \u00e9 um estrategista de conte\u00fado que entrega pautas prontas. Sempre responde s\u00f3 com JSON v\u00e1lido, sem markdown.\",\n        messages: [{ role: \"user\", content: prompt }],\n      });\n      const data = lerJSON(txt);\n      if (!data.posts || data.posts.length === 0) throw new Error(\"N\u00e3o veio nenhum post completo. Toca em gerar outro.\");\n      setDias((o) => ({ ...o, [nome]: { loading: false, erro: null, data, refeitos: existe ? refeitos + 1 : 0 } }));\n      setArquivados((a) => [{ id: Date.now(), dia: nome, data: new Date().toISOString(), foco: data.foco_do_dia, posts: data.posts }, ...a]);\n      if (!ehRedoGratis) setUso((u) => { const wk = chaveSemana(); const base = u.semana === wk ? u.n : 0; return { semana: wk, n: base + 1 }; });\n    } catch (e) {\n      const msg = String(e.message || e);\n      const erroFinal = msg === \"RATE_LIMIT\" ? \"RATE_LIMIT\"\n        : msg === \"SOBRECARGA\" ? \"A IA est\u00e1 sobrecarregada agora. Aguarde 1 minuto e tente de novo.\"\n        : msg;\n      setDias((o) => ({ ...o, [nome]: { loading: false, erro: erroFinal, data: null, refeitos } }));\n    }\n  }\n\n  function selecionarDia(idx) {\n    setSelectedDay(idx);\n    const nome = DIAS[idx];\n    if (!dias[nome]) gerarDia(idx);\n  }\n\n  return (\n    <div data-theme={tema} style={{ minHeight: \"100vh\", background: C.bg, color: C.ink, fontFamily: \"'DM Sans', sans-serif\", transition: \"background .3s\" }}>\n      <button onClick={() => setTema((t) => t === \"dark\" ? \"light\" : \"dark\")} title=\"Alternar tema\"\n        style={{ position: \"fixed\", left: 16, bottom: 18, zIndex: 50, width: 38, height: 38, borderRadius: \"50%\", border: `1px solid ${C.line}`, background: C.card, color: C.mute, cursor: \"pointer\", display: \"flex\", alignItems: \"center\", justifyContent: \"center\", opacity: .85 }}><Icon name={tema === \"dark\" ? \"sol\" : \"lua\"} size={18} stroke={1.7} /></button>\n      <style>{`\n        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');\n        [data-theme=\"dark\"]{\n          --bg:#0e0a1a; --card:#191230; --soft:#150f28; --line:#2c2348;\n          --ink:#f2efff; --mute:#9a90bf;\n          --accent:#a855f7; --accent2:#7c3aed; --rose:#ff5d8f; --green:#3ee0a3; --onAccent:#ffffff;\n        }\n        [data-theme=\"light\"]{\n          --bg:#f6f3fc; --card:#ffffff; --soft:#f1ecfa; --line:#e6dff5;\n          --ink:#1b1430; --mute:#6c6390;\n          --accent:#7c3aed; --accent2:#9333ea; --rose:#e0356f; --green:#10a877; --onAccent:#ffffff;\n        }\n        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\n        @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}\n        @keyframes spin{to{transform:rotate(360deg)}}\n        @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}\n        .rise{animation:rise .4s ease both}\n        .disp{font-family:'Bricolage Grotesque',sans-serif}\n        .noscroll::-webkit-scrollbar{display:none}\n      `}</style>\n\n      {(sbLoad || perfilLoad) ? (\n        <div style={{ minHeight: \"100dvh\", display: \"flex\", flexDirection: \"column\", alignItems: \"center\", justifyContent: \"center\", background: \"var(--bg)\", gap: 16 }}>\n          <div style={{ width: 40, height: 40, borderRadius: \"50%\", border: `3px solid ${C.line}`, borderTopColor: C.amber, animation: \"spin .8s linear infinite\" }} />\n          <p style={{ color: C.mute, fontSize: 13 }}>Carregando...</p>\n        </div>\n      ) : !authed ? (\n        <AuthScreen onAuth={(p) => { setAuthed(true); setPapel(p); if (p === \"marca\") setTab(\"marcas\"); }} />\n      ) : papel === \"marca\" ? (\n        <BrandApp profile={profile} plano={plano} ofertas={ofertas} setOfertas={setOfertas} marcaProfile={marcaProfile} setMarcaProfile={setMarcaProfile} mensagens={mensagens} addMsg={addMsg} notify={notify} notificacoes={notificacoes} setNotificacoes={setNotificacoes} produtos={produtos} setProdutos={setProdutos} vendas={vendas} onSalvarLoja={salvarLojasSb} onTrocar={() => { window._sb?.auth.signOut(); setAuthed(false); setPapel(null); setMenuOpen(false); }} onSair={() => { window._sb?.auth.signOut(); setAuthed(false); setMenuOpen(false); }} />\n      ) : !setupOk ? (\n        <div style={{ maxWidth: 640, margin: \"0 auto\", padding: \"30px 18px 60px\",\n          backgroundImage: `radial-gradient(circle at 80% -5%, rgba(168,85,247,.12), transparent 50%)` }}>\n          <Marca />\n          <h2 className=\"disp\" style={{ fontSize: 26, margin: \"22px 0 4px\", fontWeight: 700 }}>Bora montar seu perfil</h2>\n          <Sub>\u00c9 com isso que o app entrega tudo mastigado pra voc\u00ea.</Sub>\n          <ProfileForm value={profile} onSave={(d) => { setProfile(d); salvarPerfilSb(d); setTab(\"dashboard\"); }} modo=\"setup\" />\n        </div>\n      ) : (\n        <div style={{ maxWidth: 640, margin: \"0 auto\", padding: \"26px 18px 96px\",\n          backgroundImage: `radial-gradient(circle at 80% -5%, rgba(168,85,247,.12), transparent 50%)` }}>\n          <div style={{ display: \"flex\", alignItems: \"center\", gap: 10, justifyContent: \"space-between\" }}>\n            <div style={{ display: \"flex\", alignItems: \"center\", gap: 10 }}>\n              <button onClick={() => setMenuOpen(true)} style={{ background: \"none\", border: \"none\", color: C.ink, fontSize: 24, cursor: \"pointer\", padding: \"4px 6px 4px 0\", lineHeight: 1 }}>\u2630</button>\n              <Marca />\n            </div>\n            <NotifBell items={notificacoes} para=\"criador\" open={notifOpen} setOpen={setNotifOpen} onRead={() => setNotificacoes((ns) => ns.map((x) => x.para === \"criador\" ? { ...x, lida: true } : x))} />\n          </div>\n          {menuOpen && (\n            <>\n              <div onClick={() => setMenuOpen(false)} style={{ position: \"fixed\", inset: 0, background: \"rgba(0,0,0,.55)\", zIndex: 30 }} />\n              <div className=\"rise\" style={{ position: \"fixed\", top: 0, left: 0, bottom: 0, width: 260, maxWidth: \"80%\", zIndex: 31, background: \"var(--bg)\", borderRight: `1px solid ${C.line}`, padding: \"22px 0\", overflowY: \"auto\", boxShadow: \"8px 0 30px rgba(0,0,0,.5)\" }}>\n                <div style={{ padding: \"0 18px 14px\", display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\" }}>\n                  <Marca />\n                  <button onClick={() => setMenuOpen(false)} style={{ background: \"none\", border: \"none\", color: C.mute, fontSize: 22, cursor: \"pointer\", lineHeight: 1 }}>\u00d7</button>\n                </div>\n                <div onClick={() => { setTab(\"perfil\"); setMenuOpen(false); }} style={{ display: \"flex\", alignItems: \"center\", gap: 10, padding: \"0 18px 14px\", margin: \"0 0 6px\", cursor: \"pointer\", borderBottom: `1px solid ${C.line}` }}>\n                  {profile.foto ? <img src={profile.foto} alt=\"\" style={{ width: 42, height: 42, borderRadius: \"50%\", objectFit: \"cover\" }} />\n                    : <div style={{ width: 42, height: 42, borderRadius: \"50%\", background: `linear-gradient(135deg, ${C.amber}, ${C.rose})`, display: \"flex\", alignItems: \"center\", justifyContent: \"center\", color: \"#fff\", fontWeight: 700, fontFamily: \"'Space Grotesk', sans-serif\", fontSize: 18 }}>{(meuNome || \"C\").charAt(0).toUpperCase()}</div>}\n                  <div style={{ minWidth: 0 }}>\n                    <div className=\"disp\" style={{ fontSize: 14.5, fontWeight: 700, whiteSpace: \"nowrap\", overflow: \"hidden\", textOverflow: \"ellipsis\" }}>{meuNome}</div>\n                    <div style={{ fontSize: 11.5, color: C.amber }}>Ver perfil</div>\n                  </div>\n                </div>\n                {[[\"dashboard\", \"Dashboard\"], [\"plano\", \"Plano\"], [\"chat\", \"Chat\"], [\"marcas\", \"Marcas\"], [\"colabs\", \"Colabs\"], [\"produtos\", \"Produtos\"], [\"carteira\", \"Carteira\"], [\"arquivados\", \"Arquivados\"], [\"perfil\", \"Perfil\"], [\"config\", \"Configura\u00e7\u00f5es\"]].map(([id, lb]) => (\n                  <button key={id} onClick={() => { setTab(id); setMenuOpen(false); }} style={{\n                    display: \"flex\", alignItems: \"center\", gap: 13, width: \"100%\", textAlign: \"left\", padding: \"13px 18px\", background: tab === id ? \"rgba(168,85,247,.12)\" : \"transparent\",\n                    border: \"none\", borderLeft: `3px solid ${tab === id ? C.amber : \"transparent\"}`, color: tab === id ? C.amber : C.ink, fontFamily: \"'DM Sans', sans-serif\", fontSize: 15, fontWeight: 600, cursor: \"pointer\" }}>\n                    <Icon name={id} size={19} color={tab === id ? \"var(--accent)\" : \"var(--mute)\"} />{lb}</button>\n                ))}\n                <button onClick={() => { window._sb?.auth.signOut(); setAuthed(false); setPapel(null); setMenuOpen(false); }} style={{\n                  display: \"flex\", alignItems: \"center\", gap: 13, width: \"100%\", textAlign: \"left\", padding: \"13px 18px\", marginTop: 8, borderTop: `1px solid ${C.line}`, background: \"transparent\", border: \"none\", color: C.ink, fontFamily: \"'DM Sans', sans-serif\", fontSize: 15, fontWeight: 600, cursor: \"pointer\" }}>\n                  <Icon name=\"swap\" size={19} color=\"var(--mute)\" />Trocar de conta</button>\n                <button onClick={() => { window._sb?.auth.signOut(); setAuthed(false); setMenuOpen(false); }} style={{\n                  display: \"flex\", alignItems: \"center\", gap: 13, width: \"100%\", textAlign: \"left\", padding: \"13px 18px\", background: \"transparent\", border: \"none\", color: C.rose, fontFamily: \"'DM Sans', sans-serif\", fontSize: 15, fontWeight: 600, cursor: \"pointer\" }}>\n                  <Icon name=\"sair\" size={19} color=\"var(--rose)\" />Sair</button>\n              </div>\n            </>\n          )}\n\n          {tab === \"dashboard\" && (\n            <DashboardScreen\n              profile={profile} plano={plano} usosSemana={usosSemana} limiteSemana={limiteSemana}\n              ganhoMarcas={ganhoLiberado} ganhoProdutos={ganhoProdutos} ganhoIndicacao={ganhoIndicacao}\n              totalGanho={totalGanho} sacado={sacado} ganhoPendente={ganhoPendente}\n              ofertas={ofertas} vendas={vendas} colabs={colabs} arquivados={arquivados} produtos={produtos}\n              onIr={(t) => setTab(t)}\n            />\n          )}\n          {tab === \"plano\" && (\n            <div className=\"rise\">\n              <h2 className=\"disp\" style={{ fontSize: 24, margin: \"16px 0 2px\", fontWeight: 700 }}>Sua semana</h2>\n              <Sub>Toque num dia \u2014 o app gera a pauta completa dele na hora.</Sub>\n\n              <div style={{ borderRadius: 16, padding: 16, marginBottom: 16, border: `1px solid ${C.line}`, background: `linear-gradient(135deg, rgba(168,85,247,.1), rgba(255,107,107,.06))` }}>\n                <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\" }}>\n                  <span className=\"disp\" style={{ fontSize: 17, fontWeight: 700 }}>\u26a1 N\u00edvel {nivel}</span>\n                  <span style={{ fontSize: 12.5, color: C.amber, fontWeight: 600 }}>\ud83d\udcb0 {ganhoLiberado.toLocaleString(\"pt-BR\", { style: \"currency\", currency: \"BRL\" })}</span>\n                </div>\n                <div style={{ height: 8, borderRadius: 8, background: C.line, marginTop: 10, overflow: \"hidden\" }}>\n                  <div style={{ height: \"100%\", width: `${xpNoNivel}%`, background: `linear-gradient(90deg, ${C.amber}, ${C.rose})`, transition: \"width .4s\" }} />\n                </div>\n                <div style={{ display: \"flex\", justifyContent: \"space-between\", marginTop: 8, fontSize: 11.5, color: C.mute }}>\n                  <span>{pautasGeradas} pautas \u00b7 {bombouCount} bombaram</span>\n                  <span>{xpNoNivel}/100 XP</span>\n                </div>\n                <p style={{ fontSize: 11, color: C.mute, margin: \"10px 0 0\", opacity: .75 }}>\n                  {ganhoPendente > 0 ? `${ganhoPendente.toLocaleString(\"pt-BR\", { style: \"currency\", currency: \"BRL\" })} a receber (entregas em andamento).` : \"Feche campanhas com marcas pra come\u00e7ar a faturar.\"}\n                </p>\n              </div>\n\n              <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", padding: \"11px 14px\", borderRadius: 12, marginBottom: 14, background: C.card, border: `1px solid ${C.line}` }}>\n                <span style={{ fontSize: 13, color: C.ink }}>Pautas desta semana <span style={{ color: C.mute }}>\u00b7 plano {plano}</span></span>\n                <span style={{ fontSize: 13.5, fontWeight: 700, color: usosSemana >= limiteSemana ? C.rose : C.green }}>{usosSemana}/{limiteSemana === Infinity ? \"\u221e\" : limiteSemana}</span>\n              </div>\n\n              {formatosTop.length > 0 && (\n                <div style={{ padding: \"10px 14px\", borderRadius: 12, marginBottom: 14, background: \"rgba(168,85,247,.08)\", border: `1px solid ${C.line}` }}>\n                  <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.amber, textTransform: \"uppercase\" }}>\ud83d\udcca T\u00e1 funcionando pra voc\u00ea</span>\n                  <p style={{ margin: \"5px 0 0\", fontSize: 13.5, lineHeight: 1.4 }}>{formatosTop.join(\", \")} \u2014 o app vai priorizar isso nas pr\u00f3ximas pautas.</p>\n                </div>\n              )}\n\n              {/* abas dos dias */}\n              <div className=\"noscroll\" style={{ display: \"flex\", gap: 8, overflowX: \"auto\", paddingBottom: 6, margin: \"4px -2px 16px\" }}>\n                {DIAS.map((d, i) => {\n                  const on = selectedDay === i;\n                  const pronto = !!dias[d]?.data;\n                  const passou = i < hoje;\n                  return (\n                    <button key={d} onClick={() => selecionarDia(i)} style={{\n                      flex: \"0 0 auto\", padding: \"8px 12px\", borderRadius: 12, cursor: \"pointer\", position: \"relative\", textAlign: \"center\", minWidth: 50,\n                      border: `1px solid ${on ? C.amber : C.line}`, fontFamily: \"'DM Sans', sans-serif\", fontWeight: 700, fontSize: 13,\n                      background: on ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : \"transparent\",\n                      color: on ? \"var(--onAccent)\" : C.ink, opacity: passou && !on ? .4 : 1,\n                    }}>\n                      <div>{ABREV[i]}</div>\n                      <div style={{ fontSize: 11, fontWeight: 600, opacity: .8 }}>{datasSemana[i].getDate()}</div>\n                      {i === hoje && <span style={{ position: \"absolute\", top: -6, right: -3, fontSize: 8, background: C.rose, color: \"#fff\", padding: \"1px 4px\", borderRadius: 6 }}>hoje</span>}\n                      {pronto && i !== hoje && <span style={{ position: \"absolute\", top: 5, right: 6, width: 5, height: 5, borderRadius: 5, background: on ? \"var(--onAccent)\" : C.amber }} />}\n                    </button>\n                  );\n                })}\n              </div>\n\n              <DiaConteudo\n                dia={DIAS[selectedDay]}\n                estado={dias[DIAS[selectedDay]]}\n                onGerar={() => gerarDia(selectedDay)}\n                onUpgrade={() => { setTab(\"config\"); }}\n                desempenho={desempenho}\n                onRate={(idx, r) => setDesempenho((o) => {\n                  const key = `${DIAS[selectedDay]}|${idx}`;\n                  return { ...o, [key]: o[key] === r ? null : r };\n                })}\n              />\n            </div>\n          )}\n\n          {tab === \"chat\" && (\n            <ChatScreen\n              chat={chat} setChat={setChat} perfilTexto={perfilTexto}\n              ajustes={ajustes}\n              addAjuste={(a) => setAjustes((p) => (p.includes(a) ? p : [...p, a]))}\n              removeAjuste={(a) => setAjustes((p) => p.filter((x) => x !== a))}\n              onNovoNicho={(n) => { setProfile((p) => ({ ...p, nicho: n })); setDias({}); setDesempenho({}); }}\n            />\n          )}\n\n          {tab === \"perfil\" && (\n            <div className=\"rise\">\n              <h2 className=\"disp\" style={{ fontSize: 24, margin: \"16px 0 2px\", fontWeight: 700 }}>Seu perfil</h2>\n              <Sub>Mudou de estrat\u00e9gia? Edite aqui \u2014 isso atualiza as pr\u00f3ximas pautas.</Sub>\n              <ProfileForm value={profile} onSave={(d) => { setProfile(d); salvarPerfilSb(d); setDias({}); }} modo=\"editar\" />\n            </div>\n          )}\n\n          {tab === \"marcas\" && (planoNivel >= 1 ? <MarcasScreen profile={profile} plano={plano} ofertas={ofertas} setOfertas={setOfertas} mensagens={mensagens} addMsg={addMsg} notify={notify} /> : <BloqueioPlano titulo=\"\ud83d\udd12 Apenas para assinantes\" sub=\"As parcerias com marcas s\u00e3o exclusivas dos planos pagos. Assine pra se candidatar \u00e0s campanhas e faturar.\" onIr={() => setTab(\"config\")} />)}\n\n          {tab === \"carteira\" && <CarteiraScreen disponivel={totalGanho - sacado} pendente={ganhoPendente} total={totalGanho} sacado={sacado} ganhoMarcas={ganhoLiberado} ganhoProdutos={ganhoProdutos} ganhoIndicacao={ganhoIndicacao} emAnalise={totalEmAnalise} holdDias={HOLD_DIAS} onSacar={(v) => setSacado((s) => s + v)} />}\n\n          {tab === \"produtos\" && <AfiliadosScreen profile={profile} produtos={produtos} setProdutos={setProdutos} vendas={vendas} setVendas={setVendas} />}\n\n          {tab === \"colabs\" && (planoNivel >= 1 ? <ColabsScreen profile={profile} colabs={colabs} setColabs={setColabs} /> : <BloqueioPlano titulo=\"Colabs\" sub=\"Dispon\u00edvel a partir do plano Criador. Fa\u00e7a upgrade pra colaborar com outros criadores.\" onIr={() => setTab(\"config\")} />)}\n\n          {tab === \"arquivados\" && <ArquivadosScreen itens={arquivados} />}\n\n          {tab === \"config\" && <ConfigScreen profile={profile} plano={plano} setPlano={setPlanoComSync} usosSemana={usosSemana} limiteSemana={limiteSemana} indicados={indicados} setIndicados={setIndicados} />}\n        </div>\n      )}\n    </div>\n  );\n}\n\n// ---------- conte\u00fado do dia ----------\nfunction DiaConteudo({ dia, estado, onGerar, desempenho, onRate, onUpgrade }) {\n  const [verEx, setVerEx] = useState({});\n  if (!estado) {\n    return (\n      <div style={{ textAlign: \"center\", padding: \"40px 10px\" }}>\n        <p style={{ color: C.mute, fontSize: 14 }}>Nenhuma pauta gerada pra {dia} ainda.</p>\n        <Botao onClick={onGerar} style={{ maxWidth: 240, margin: \"16px auto 0\" }}>\u26a1 Gerar pauta de {dia}</Botao>\n      </div>\n    );\n  }\n  if (estado.loading) {\n    return (\n      <div style={{ display: \"flex\", flexDirection: \"column\", alignItems: \"center\", gap: 14, padding: \"50px 0\" }}>\n        <div style={{ width: 34, height: 34, border: `3px solid ${C.line}`, borderTopColor: C.amber, borderRadius: \"50%\", animation: \"spin .9s linear infinite\" }} />\n        <p style={{ color: C.amber, animation: \"glow 2s ease infinite\" }}>Montando a pauta de {dia}...</p>\n      </div>\n    );\n  }\n  if (estado.erro === \"RATE_LIMIT\") {\n    return (\n      <div style={{ padding: 18, borderRadius: 14, background: \"rgba(255,180,0,.08)\", border: \"1px solid rgba(255,180,0,.35)\", textAlign: \"center\" }}>\n        <div style={{ fontSize: 30 }}>\u23f3</div>\n        <strong className=\"disp\" style={{ display: \"block\", fontSize: 16, marginTop: 6 }}>Muitas gera\u00e7\u00f5es simult\u00e2neas</strong>\n        <p style={{ fontSize: 13, color: C.mute, margin: \"8px 0 14px\", lineHeight: 1.5 }}>O servi\u00e7o de IA atingiu o limite de requisi\u00e7\u00f5es por hora. Aguarde alguns minutos e tente de novo \u2014 seus outros dias n\u00e3o s\u00e3o afetados.</p>\n        <Botao onClick={onGerar} style={{ maxWidth: 220, marginLeft: \"auto\", marginRight: \"auto\" }}>Tentar de novo</Botao>\n      </div>\n    );\n  }\n  if (estado.erro === \"LIMITE\") {\n    return (\n      <div style={{ padding: 18, borderRadius: 14, background: \"rgba(168,85,247,.1)\", border: \"1px solid rgba(168,85,247,.4)\", textAlign: \"center\" }}>\n        <div style={{ fontSize: 30 }}>\ud83d\udd12</div>\n        <strong className=\"disp\" style={{ display: \"block\", fontSize: 17, marginTop: 6 }}>Voc\u00ea usou todas as pautas da semana</strong>\n        <p style={{ fontSize: 13, color: C.mute, margin: \"8px 0 0\", lineHeight: 1.5 }}>Seu limite zera no pr\u00f3ximo domingo. Pra gerar mais agora, fa\u00e7a upgrade do plano.</p>\n        {onUpgrade && <Botao onClick={onUpgrade} style={{ marginTop: 14, maxWidth: 220, marginLeft: \"auto\", marginRight: \"auto\" }}>Ver planos</Botao>}\n      </div>\n    );\n  }\n  if (estado.erro) {\n    return (\n      <div style={{ padding: 14, borderRadius: 12, background: \"#2a1414\", border: \"1px solid #4a2020\" }}>\n        <strong style={{ color: C.rose }}>Opa.</strong>\n        <p style={{ fontSize: 12.5, color: \"#ffb3b3\", margin: \"8px 0 0\", wordBreak: \"break-word\" }}>{estado.erro}</p>\n        <Botao onClick={onGerar} style={{ marginTop: 14 }}>Tentar de novo</Botao>\n      </div>\n    );\n  }\n  const { foco_do_dia, posts } = estado.data;\n  return (\n    <div className=\"rise\">\n      {foco_do_dia && (\n        <div style={{ padding: \"12px 15px\", borderRadius: 12, marginBottom: 16, background: \"rgba(168,85,247,.08)\", borderLeft: `3px solid ${C.amber}` }}>\n          <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.amber, textTransform: \"uppercase\" }}>Foco de {dia}</span>\n          <p style={{ margin: \"5px 0 0\", fontSize: 14, lineHeight: 1.5 }}>{foco_do_dia}</p>\n        </div>\n      )}\n      {posts.map((post, i) => (\n        <div key={i} className=\"rise\" style={{ animationDelay: `${i * 0.07}s`, marginBottom: 14, borderRadius: 16, border: `1px solid ${C.line}`, background: C.card, overflow: \"hidden\" }}>\n          <div style={{ padding: \"14px 16px 0\", display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", gap: 8 }}>\n            <span style={{ fontSize: 11, padding: \"3px 10px\", borderRadius: 20, background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: \"var(--onAccent)\", fontWeight: 700 }}>{post.formato}</span>\n            {post.melhor_horario && <span style={{ fontSize: 12, color: C.mute }}>\ud83d\udd50 {post.melhor_horario}</span>}\n          </div>\n          <div style={{ padding: \"8px 16px 16px\" }}>\n            <h3 className=\"disp\" style={{ fontSize: 19, margin: \"4px 0 0\", lineHeight: 1.15, fontWeight: 700 }}>{post.tema}</h3>\n            <Bloco rotulo=\"\ud83e\ude9d Gancho\" texto={post.gancho} cor={C.amber} />\n            {post.roteiro?.length > 0 && (\n              <div style={{ marginTop: 11 }}>\n                <Rot>\ud83c\udfac Roteiro</Rot>\n                <ol style={{ margin: \"6px 0 0\", padding: 0, listStyle: \"none\" }}>\n                  {post.roteiro.map((b, k) => (\n                    <li key={k} style={{ display: \"flex\", gap: 9, marginBottom: 6, fontSize: 13.5, lineHeight: 1.45 }}>\n                      <span style={{ flex: \"0 0 auto\", width: 20, height: 20, borderRadius: 6, background: C.line, color: C.amber, fontSize: 11, display: \"flex\", alignItems: \"center\", justifyContent: \"center\", fontWeight: 700 }}>{k + 1}</span>\n                      <span>{b}</span>\n                    </li>\n                  ))}\n                </ol>\n              </div>\n            )}\n            {post.storyboard?.length > 0 && (\n              <div style={{ marginTop: 12 }}>\n                <Rot>\ud83d\udcf1 Storyboard (o que filmar)</Rot>\n                <div className=\"noscroll\" style={{ display: \"flex\", gap: 8, overflowX: \"auto\", marginTop: 8, paddingBottom: 4 }}>\n                  {post.storyboard.map((q, k) => (\n                    <div key={k} style={{ flex: \"0 0 auto\", width: 124, borderRadius: 12, border: `1px solid ${C.line}`, background: C.soft, overflow: \"hidden\" }}>\n                      <div style={{ height: 86, display: \"flex\", flexDirection: \"column\", alignItems: \"center\", justifyContent: \"center\", padding: 8, textAlign: \"center\", background: \"linear-gradient(160deg, rgba(168,85,247,.12), rgba(255,107,107,.06))\", position: \"relative\" }}>\n                        <span style={{ position: \"absolute\", top: 5, left: 6, fontSize: 9, color: C.amber, fontWeight: 700 }}>{k + 1}</span>\n                        <span style={{ fontSize: 18 }}>{iconeCena(q.tipo)}</span>\n                        {q.texto_tela && <span style={{ fontSize: 9.5, color: C.ink, fontWeight: 700, marginTop: 4, lineHeight: 1.2 }}>\"{q.texto_tela}\"</span>}\n                      </div>\n                      <div style={{ padding: \"7px 8px\" }}>\n                        <span style={{ fontSize: 9, color: C.amber, textTransform: \"uppercase\", letterSpacing: .5, fontWeight: 700 }}>{q.tipo}</span>\n                        <p style={{ fontSize: 11, color: C.ink, margin: \"3px 0 0\", lineHeight: 1.3 }}>{q.cena}</p>\n                      </div>\n                    </div>\n                  ))}\n                </div>\n              </div>\n            )}\n            {post.cta && (\n              <div style={{ marginTop: 11, padding: \"8px 12px\", borderRadius: 9, background: \"rgba(255,107,107,.1)\", borderLeft: `3px solid ${C.rose}`, fontSize: 13 }}>\n                <strong style={{ color: C.rose }}>CTA:</strong> {post.cta}\n              </div>\n            )}\n            {post.hashtags?.length > 0 && (\n              <div style={{ marginTop: 10, display: \"flex\", flexWrap: \"wrap\", gap: 6 }}>\n                {post.hashtags.map((h, k) => <span key={k} style={{ fontSize: 11.5, color: C.amber, background: \"rgba(168,85,247,.1)\", padding: \"2px 8px\", borderRadius: 6 }}>{h}</span>)}\n              </div>\n            )}\n            <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.line}`, display: \"flex\", alignItems: \"center\", gap: 7, flexWrap: \"wrap\" }}>\n              <span style={{ fontSize: 11.5, color: C.mute }}>J\u00e1 postou? Como foi?</span>\n              {[[\"bombou\", \"\ud83d\udd25 Bombou\"], [\"medio\", \"\ud83d\udc4d M\u00e9dio\"], [\"fraco\", \"\ud83d\udc4e Fraco\"]].map(([v, lb]) => {\n                const sel = desempenho[`${dia}|${i}`] === v;\n                return (\n                  <button key={v} onClick={() => onRate(i, v)} style={{\n                    padding: \"5px 10px\", borderRadius: 8, cursor: \"pointer\", fontSize: 12, fontWeight: 600, fontFamily: \"'DM Sans', sans-serif\",\n                    border: `1px solid ${sel ? C.amber : C.line}`, background: sel ? \"rgba(168,85,247,.15)\" : \"transparent\", color: sel ? C.amber : C.mute,\n                  }}>{lb}</button>\n                );\n              })}\n            </div>\n\n            <button onClick={() => setVerEx((o) => ({ ...o, [i]: !o[i] }))} style={{\n              width: \"100%\", marginTop: 10, padding: \"9px\", borderRadius: 9, cursor: \"pointer\", background: \"transparent\",\n              border: `1px dashed ${C.line}`, color: C.amber, fontFamily: \"'DM Sans', sans-serif\", fontSize: 12.5, fontWeight: 600 }}>\n              {verEx[i] ? \"Ocultar exemplo visual\" : \"\ud83d\udcf1 Ver exemplo visual\"}\n            </button>\n            {verEx[i] && (\n              <div className=\"noscroll\" style={{ display: \"flex\", gap: 8, overflowX: \"auto\", marginTop: 10, paddingBottom: 4 }}>\n                {[{ tag: \"Abertura\", txt: post.gancho }, ...(post.roteiro || []).map((b, k) => ({ tag: `Cena ${k + 1}`, txt: b })), { tag: \"Final / CTA\", txt: post.cta }]\n                  .filter((f) => f.txt).map((f, k) => (\n                    <div key={k} style={{ flex: \"0 0 auto\", width: 112, height: 200, borderRadius: 12, padding: 10, display: \"flex\", flexDirection: \"column\", justifyContent: \"space-between\",\n                      background: `linear-gradient(160deg, rgba(168,85,247,${0.22 - k * 0.02}), rgba(255,107,107,.12)), ${C.soft}`, border: `1px solid ${C.line}` }}>\n                      <span style={{ fontSize: 9.5, fontWeight: 700, color: \"var(--onAccent)\", background: C.amber, alignSelf: \"flex-start\", padding: \"2px 7px\", borderRadius: 6 }}>{f.tag}</span>\n                      <span style={{ fontSize: 11, lineHeight: 1.35, color: C.ink, fontWeight: 600 }}>{f.txt}</span>\n                      <span style={{ fontSize: 8.5, color: C.mute, textAlign: \"right\" }}>{post.formato}</span>\n                    </div>\n                  ))}\n              </div>\n            )}\n          </div>\n        </div>\n      ))}\n      <button onClick={onGerar} style={{ width: \"100%\", padding: \"12px\", borderRadius: 12, cursor: \"pointer\", background: \"transparent\",\n        border: `1px solid ${C.line}`, color: C.mute, fontFamily: \"'DM Sans', sans-serif\", fontSize: 14, fontWeight: 600, marginTop: 4 }}>\n        \ud83d\udd04 {(estado.refeitos || 0) < 1 ? \"N\u00e3o curtiu? Refazer essa pauta (gr\u00e1tis)\" : \"Refazer de novo (usa 1 pauta da semana)\"}\n      </button>\n      <p style={{ fontSize: 11, color: C.mute, textAlign: \"center\", marginTop: 14, opacity: .7 }}>\n        Tend\u00eancias estimadas pela IA. Feed ao vivo entra na vers\u00e3o com backend.\n      </p>\n    </div>\n  );\n}\n\n// ---------- chat / \u00e1rea de ajustes ----------\nfunction ChatScreen({ chat, setChat, perfilTexto, ajustes, addAjuste, removeAjuste, onNovoNicho }) {\n  const [input, setInput] = useState(\"\");\n  const [loading, setLoading] = useState(false);\n\n  async function enviar() {\n    const msg = input.trim();\n    if (!msg || loading) return;\n    const novo = [...chat, { role: \"user\", text: msg }];\n    setChat(novo);\n    setInput(\"\");\n    setLoading(true);\n    try {\n      const txt = await chamarIA({\n        system: `Voc\u00ea \u00e9 o assistente do Cria. Perfil atual do criador:\n${perfilTexto()}\nAjustes j\u00e1 ativos: ${ajustes.length ? ajustes.join(\"; \") : \"nenhum\"}.\n\nO criador pode pedir pra voc\u00ea dar mais \u00eanfase em algo, mudar o foco do conte\u00fado, ou avisar que trocou de nicho. Quando ele pedir um ajuste, transforme em uma instru\u00e7\u00e3o curta e imperativa pra valer nas pr\u00f3ximas pautas.\n\nResponda SEMPRE apenas com JSON v\u00e1lido, sem markdown:\n{\n  \"resposta\": \"resposta curta e pr\u00e1tica (m\u00e1x 3 frases), confirmando o que ser\u00e1 ajustado\",\n  \"ajuste\": \"instru\u00e7\u00e3o curta e imperativa pra guardar, OU null se n\u00e3o for um pedido de ajuste\",\n  \"novo_nicho\": \"o novo nicho SE ele disse que mudou de nicho, sen\u00e3o null\"\n}`,\n        messages: novo.map((m) => ({ role: m.role, content: m.text })),\n      });\n\n      // parse tolerante: se falhar, mostra o texto cru como resposta\n      let resposta = txt.trim(), ajuste = null, novoNicho = null;\n      try {\n        const obj = JSON.parse(txt.slice(txt.indexOf(\"{\"), txt.lastIndexOf(\"}\") + 1));\n        resposta = obj.resposta || resposta;\n        ajuste = obj.ajuste && obj.ajuste !== \"null\" ? obj.ajuste : null;\n        novoNicho = obj.novo_nicho && obj.novo_nicho !== \"null\" ? obj.novo_nicho : null;\n      } catch (_) {}\n\n      const extras = [];\n      if (ajuste) { addAjuste(ajuste); extras.push({ role: \"sys\", text: `\u2713 Ajuste salvo: ${ajuste}` }); }\n      if (novoNicho) { onNovoNicho(novoNicho); extras.push({ role: \"sys\", text: `\ud83d\udd04 Nicho atualizado para \"${novoNicho}\". As pautas foram resetadas.` }); }\n\n      setChat([...novo, { role: \"assistant\", text: resposta }, ...extras]);\n    } catch (e) {\n      setChat([...novo, { role: \"assistant\", text: \"Deu um erro aqui: \" + String(e.message || e) }]);\n    } finally { setLoading(false); }\n  }\n\n  return (\n    <div className=\"rise\">\n      <h2 className=\"disp\" style={{ fontSize: 24, margin: \"16px 0 2px\", fontWeight: 700 }}>Assistente</h2>\n      <Sub>Pe\u00e7a melhorias (\"d\u00e1 mais \u00eanfase em dribles\") ou avise se mudou de nicho \u2014 o app aplica nas pr\u00f3ximas pautas.</Sub>\n\n      {ajustes.length > 0 && (\n        <div style={{ marginBottom: 14, padding: \"10px 12px\", borderRadius: 12, border: `1px solid ${C.line}`, background: \"rgba(168,85,247,.06)\" }}>\n          <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.amber, textTransform: \"uppercase\" }}>\u2699\ufe0f Ajustes ativos</span>\n          <div style={{ display: \"flex\", flexWrap: \"wrap\", gap: 6, marginTop: 8 }}>\n            {ajustes.map((a) => (\n              <span key={a} style={{ display: \"flex\", alignItems: \"center\", gap: 6, fontSize: 12.5, background: C.card, border: `1px solid ${C.line}`, padding: \"4px 6px 4px 10px\", borderRadius: 8 }}>\n                {a}\n                <button onClick={() => removeAjuste(a)} style={{ background: \"none\", border: \"none\", color: C.mute, cursor: \"pointer\", fontSize: 14, lineHeight: 1 }}>\u00d7</button>\n              </span>\n            ))}\n          </div>\n        </div>\n      )}\n\n      <div style={{ minHeight: 180, display: \"flex\", flexDirection: \"column\", gap: 10, marginBottom: 14 }}>\n        {chat.length === 0 && <p style={{ color: C.mute, fontSize: 13.5, textAlign: \"center\", padding: \"26px 0\" }}>Ex: \"foca mais em v\u00eddeos curtos e d\u00e1 \u00eanfase em humor\"</p>}\n        {chat.map((m, i) => {\n          if (m.role === \"sys\") return (\n            <div key={i} style={{ alignSelf: \"center\", fontSize: 12, color: C.amber, background: \"rgba(168,85,247,.1)\", padding: \"6px 12px\", borderRadius: 10, textAlign: \"center\" }}>{m.text}</div>\n          );\n          return (\n            <div key={i} style={{ alignSelf: m.role === \"user\" ? \"flex-end\" : \"flex-start\", maxWidth: \"85%\",\n              padding: \"10px 13px\", borderRadius: 14, fontSize: 14, lineHeight: 1.5,\n              background: m.role === \"user\" ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : C.card,\n              color: m.role === \"user\" ? \"var(--onAccent)\" : C.ink, border: m.role === \"user\" ? \"none\" : `1px solid ${C.line}` }}>\n              {m.text}\n            </div>\n          );\n        })}\n        {loading && <div style={{ alignSelf: \"flex-start\", color: C.mute, fontSize: 13, padding: \"6px 4px\" }}>digitando...</div>}\n      </div>\n      <div style={{ display: \"flex\", gap: 8 }}>\n        <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === \"Enter\" && enviar()}\n          placeholder=\"Pe\u00e7a uma melhoria...\" style={{ flex: 1, padding: \"13px 14px\", borderRadius: 12, border: `1px solid ${C.line}`, background: C.soft, color: C.ink, fontSize: 14.5, fontFamily: \"'DM Sans', sans-serif\", outline: \"none\" }} />\n        <button onClick={enviar} disabled={loading} style={{ padding: \"0 18px\", borderRadius: 12, border: \"none\", cursor: \"pointer\", fontSize: 18,\n          background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: \"var(--onAccent)\" }}>\u2191</button>\n      </div>\n    </div>\n  );\n}\n\n// ---------- configura\u00e7\u00f5es ----------\nconst MP_LINKS = { \"Criador\": \"https://mpago.la/2ke2UT6\", \"Pro\": \"https://mpago.la/1zzuT3q\" };\nfunction PagamentoModal({ plano: pl, onFechar, onConfirmar }) {\n  const link = MP_LINKS[pl.id];\n  const valor = pl.id === \"Pro\" ? \"R$ 99,90\" : \"R$ 59,90\";\n  return (\n    <div style={{ position: \"fixed\", inset: 0, background: \"rgba(0,0,0,.88)\", zIndex: 9999, display: \"flex\", alignItems: \"flex-end\", justifyContent: \"center\" }}>\n      <div style={{ width: \"100%\", maxWidth: 480, background: \"#0d0d14\", borderRadius: \"20px 20px 0 0\", padding: \"24px 22px 40px\", border: \"1px solid #2a2a40\" }}>\n        <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: 18 }}>\n          <span style={{ fontSize: 19, fontWeight: 800, color: \"#f0eeff\", fontFamily: \"'Space Grotesk',sans-serif\" }}>Assinar plano {pl.id}</span>\n          <button onClick={onFechar} style={{ background: \"none\", border: \"none\", color: \"#6b6a80\", fontSize: 26, cursor: \"pointer\", lineHeight: 1, padding: \"0 4px\" }}>\u00d7</button>\n        </div>\n        <div style={{ padding: 16, borderRadius: 14, background: \"#1a1a2e\", border: \"1px solid #2a2a40\", marginBottom: 18, textAlign: \"center\" }}>\n          <div style={{ fontSize: 13, color: \"#6b6a80\", marginBottom: 6 }}>Valor mensal</div>\n          <div style={{ fontSize: 38, fontWeight: 800, color: \"#a855f7\", fontFamily: \"'Space Grotesk',sans-serif\" }}>{valor}</div>\n          <div style={{ fontSize: 12, color: \"#6b6a80\", marginTop: 6 }}>{pl.linha}</div>\n        </div>\n        <p style={{ fontSize: 13.5, color: \"#6b6a80\", lineHeight: 1.6, margin: \"0 0 18px\", textAlign: \"center\" }}>\n          Pague pelo Mercado Pago \u2014 PIX, cart\u00e3o ou boleto.<br/>Plano ativado em at\u00e9 1 hora ap\u00f3s a confirma\u00e7\u00e3o.\n        </p>\n        <a href={link} target=\"_blank\" rel=\"noreferrer\"\n          style={{ display: \"block\", width: \"100%\", padding: \"16px\", borderRadius: 12, textAlign: \"center\", background: \"linear-gradient(135deg, #009ee3, #00b1ea)\", color: \"#fff\", fontFamily: \"'DM Sans',sans-serif\", fontWeight: 700, fontSize: 16, textDecoration: \"none\", boxSizing: \"border-box\", marginBottom: 12 }}>\n          \ud83d\udcb3 Pagar pelo Mercado Pago\n        </a>\n        <button onClick={() => { onConfirmar(pl.id); onFechar(); }}\n          style={{ width: \"100%\", padding: \"13px\", borderRadius: 12, border: \"1px solid #2a2a40\", background: \"transparent\", color: \"#6b6a80\", cursor: \"pointer\", fontFamily: \"'DM Sans',sans-serif\", fontWeight: 600, fontSize: 14 }}>\n          J\u00e1 paguei \u2014 aguardando ativa\u00e7\u00e3o\n        </button>\n      </div>\n    </div>\n  );\n}\n\nfunction ConfigScreen({ profile, plano, setPlano, usosSemana, limiteSemana, indicados, setIndicados }) {\n  const [aviso, setAviso] = useState(\"\");\n  const [modalPlano, setModalPlano] = useState(null);\n  const [pendente, setPendente] = useState(null);\n  const COMISSAO = 0.40
