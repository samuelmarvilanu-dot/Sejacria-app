<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cria</title>
<style>
:root,[data-theme=dark]{--bg:#0e0a1a;--card:#191230;--soft:#150f28;--line:#2c2348;--ink:#f2efff;--mute:#9a90bf;--accent:#a855f7;--accent2:#7c3aed;--rose:#ff5d8f;--green:#3ee0a3;--amber:#f59e0b;--onAccent:#fff}
[data-theme=light]{--bg:#f6f3fc;--card:#fff;--soft:#f1ecfa;--line:#e6dff5;--ink:#1b1430;--mute:#6c6390;--accent:#7c3aed;--accent2:#9333ea;--rose:#e0356f;--green:#10a877;--amber:#d97706;--onAccent:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{background:var(--bg);min-height:100dvh;color:var(--ink)}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg);z-index:9999;padding:20px}
.bspin{width:40px;height:40px;border-radius:50%;border:3px solid #2c2348;border-top-color:#a855f7;animation:bsp .8s linear infinite}
@keyframes bsp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="boot"><div class="bspin"></div><p id="bm" style="font-family:sans-serif;font-size:13px;color:#9a90bf">Carregando v13...</p></div>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./app.js?v=13"></script>
<script>
(function(){
  var b=document.getElementById('boot');
  function erro(m){if(b)b.innerHTML='<div style="padding:24px;text-align:center;font-family:sans-serif;max-width:340px"><p style="font-size:24px">!<\/p><p style="color:#ff5d8f;font-size:13px;font-weight:700;margin:12px 0 8px">Erro<\/p><p style="color:#9a90bf;font-size:11px;word-break:break-word;margin-bottom:16px">'+String(m).slice(0,300)+'<\/p><button onclick="location.reload()" style="padding:10px 20px;border-radius:10px;border:none;background:#a855f7;color:#fff;font-weight:700">Recarregar<\/button><\/div>';}
  function go(tries){
    tries = tries || 0;
    if(typeof React==='undefined'||typeof ReactDOM==='undefined'||typeof supabase==='undefined'){
      if(tries>50){erro('Bibliotecas nao carregaram (React/ReactDOM/Supabase). Verifique a conexao.');return;}
      setTimeout(function(){go(tries+1);},100);return;
    }
    if(typeof window.iniciarApp!=='function'){
      if(tries>50){erro('app.js nao carregou. Confirme que o arquivo app.js esta no GitHub.');return;}
      setTimeout(function(){go(tries+1);},100);return;
    }
    try{ window.iniciarApp(); }catch(e){ erro('App: '+e.message); }
  }
  go();
})();
</script>
</body>
</html>
