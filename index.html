<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cria</title>
<style>
:root,[data-theme=dark]{--bg:#0e0a1a;--card:#191230;--soft:#150f28;--line:#2c2348;--ink:#f2efff;--mute:#9a90bf;--accent:#a855f7;--accent2:#7c3aed;--rose:#ff5d8f;--green:#3ee0a3;--amber:#f59e0b;--onAccent:#fff}
[data-theme=light]{--bg:#f6f3fc;--card:#fff;--soft:#f1ecfa;--line:#e6dff5;--ink:#1b1430;--mute:#6c6390;--accent:#7c3aed;--accent2:#9333ea;--rose:#e0356f;--green:#10a877;--amber:#d97706;--onAccent:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{background:var(--bg);min-height:100dvh;color:var(--ink)}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg);z-index:9999;padding:20px}
.bspin{width:40px;height:40px;border-radius:50%;border:3px solid #2c2348;border-top-color:#a855f7;animation:bsp .8s linear infinite}
@keyframes bsp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="boot"><div class="bspin"></div><p id="bm" style="font-family:sans-serif;font-size:13px;color:#9a90bf">Carregando...</p></div>
<div id="root"></div>
<script>
window.onerror=function(msg,src,line){var b=document.getElementById('boot');if(b)b.innerHTML='<div style="padding:24px;text-align:center;font-family:sans-serif;max-width:340px"><p style="font-size:24px">!<\/p><p style="color:#ff5d8f;font-size:13px;font-weight:700;margin:12px 0 8px">Erro<\/p><p style="color:#9a90bf;font-size:11px;word-break:break-word;margin-bottom:16px">'+String(msg)+' (L'+line+')<\/p><button onclick="location.reload()" style="padding:10px 20px;border-radius:10px;border:none;background:#a855f7;color:#fff;font-weight:700">Recarregar<\/button><\/div>';return true;};
document.documentElement.setAttribute('data-theme','dark');
function bmsg(t){var e=document.getElementById('bm');if(e)e.textContent=t;}
function carrega(urls,glob,cb){var i=0;function go(){if(i>=urls.length){cb(false);return;}var s=document.createElement('script');s.src=urls[i];s.onload=function(){window[glob]?cb(true):(i++,go());};s.onerror=function(){i++;go();};document.head.appendChild(s);}go();}
bmsg('1/4 React...');
carrega(['https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js','https://unpkg.com/react@18.3.1/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js'],'React',function(ok){
  if(!ok){window.onerror('React nao carregou',0,0);return;}
  bmsg('2/4 ReactDOM...');
  carrega(['https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js','https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js'],'ReactDOM',function(ok2){
    if(!ok2){window.onerror('ReactDOM nao carregou',0,0);return;}
    bmsg('3/4 Supabase...');
    carrega(['https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js','https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js'],'supabase',function(ok3){
      if(!ok3){window.onerror('Supabase nao carregou',0,0);return;}
      bmsg('4/4 Iniciando...');
      carrega(['./app.js?v=11'],'iniciarApp',function(ok4){
        if(!ok4){window.onerror('app.js nao carregou ou tem erro',0,0);return;}
        window.iniciarApp();
      });
    });
  });
});
</script>
</body>
</html>
