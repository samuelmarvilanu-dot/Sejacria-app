                    {i>0 && <button onClick={() => setMarcaProfile(o=>{const c=[...o.categorias];c.splice(i-1,2,c[i],c[i-1]);return{...o,categorias:c};})} style={{background:"none",border:"none",color:"var(--mute)",cursor:"pointer",padding:"0 2px",fontSize:12}}>↑</button>}
                    {cat}
                    <button onClick={() => setMarcaProfile(o=>({...o,categorias:o.categorias.filter((_,k)=>k!==i)}))} style={{background:"none",border:"none",color:"var(--rose)",cursor:"pointer",fontSize:15,padding:0,lineHeight:1}}>×</button>
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* Filtros */}
          <div style={{display:"flex",gap:7,marginBottom:12,overflowX:"auto"}}>
            {[["ativos","Ativos"],["inativos","Pausados"],["privados","Privados"],["todos","Todos"]].map(([v,lb]) => {
              const count = v==="todos"?meusProdutosMarca.length:v==="ativos"?meusProdutosMarca.filter(p=>p.ativo!==false).length:v==="inativos"?meusProdutosMarca.filter(p=>p.ativo===false).length:meusProdutosMarca.filter(p=>p.privado).length;
              return <button key={v} onClick={() => setFiltroStatus(v)} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:12.5,border:`1px solid ${filtroStatus===v?"var(--accent)":"var(--line)"}`,background:filtroStatus===v?"rgba(168,85,247,.15)":"transparent",color:filtroStatus===v?"var(--accent)":"var(--mute)"}}>{lb} ({count})</button>;
            })}
          </div>

          {prodsFiltrados.length===0 ? <p style={{color:"var(--mute)",fontSize:13.5,textAlign:"center",padding:"24px 0"}}>Nenhum produto aqui ainda.</p>
          : prodsFiltrados.map(p => (
            <div key={p.id} style={{borderRadius:14,border:`1px solid ${p.ativo===false?"rgba(255,93,143,.25)":"var(--line)"}`,background:"var(--card)",marginBottom:10,overflow:"hidden"}}>
              <div style={{display:"flex",gap:10,padding:"12px 14px",alignItems:"center"}}>
                {p.foto ? <img src={p.foto} alt="" style={{width:50,height:50,borderRadius:9,objectFit:"cover",flexShrink:0}} /> : <div style={{width:50,height:50,borderRadius:9,background:"var(--soft)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🛍️</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nome}</div>
                  <div style={{fontSize:13,color:"var(--accent)",fontWeight:700}}>{brl(p.preco)} <span style={{color:"var(--mute)",fontWeight:400,fontSize:12}}>· {p.comissao}% comissão</span></div>
                  <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,background:p.ativo===false?"rgba(255,93,143,.2)":"rgba(126,224,138,.2)",color:p.ativo===false?"var(--rose)":"var(--green)"}}>{p.ativo===false?"Pausado":"Ativo"}</span>
                    {p.privado && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,background:"rgba(168,85,247,.15)",color:"var(--accent)"}}>Privado</span>}
                    {p.temAfiliados!==false && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"rgba(126,224,138,.1)",color:"var(--green)"}}>✓ Afiliados</span>}
                    {p.temAfiliados===false && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"rgba(255,180,0,.1)",color:"#ffb300"}}>🔒 Só loja</span>}
                    {p.categoria && <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"var(--soft)",color:"var(--mute)"}}>{p.categoria}</span>}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",borderTop:"1px solid var(--line)"}}>
                {[["✏️ Editar",()=>setModalProd({...p,preco:String(p.preco),comissao:String(p.comissao)}),"var(--ink)"],
                  [p.ativo===false?"▶ Ativar":"⏸ Pausar",()=>toggleProd(p.id,"ativo"),"var(--amber)"],
                  [p.privado?"🌐 Público":"🔒 Privar",()=>toggleProd(p.id,"privado"),"var(--mute)"],
                  ["🗑 Excluir",()=>deleteProd(p.id),"var(--rose)"]].map(([lb,fn,cor]) => (
                  <button key={lb} onClick={fn} style={{flex:1,padding:"9px 2px",border:"none",background:"transparent",cursor:"pointer",fontSize:11.5,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:cor,borderRight:"1px solid var(--line)"}}>
                    {lb}
                  </button>
                ))}
              </div>
              <div style={{padding:"6px 14px 8px"}}>
                <span style={{fontSize:11,color:"var(--mute)"}}>{vendasDeProd(p.id)} venda{vendasDeProd(p.id)!==1?"s":""}</span>
                {p.descricao && <p style={{fontSize:12,color:"var(--mute)",margin:"3px 0 0",lineHeight:1.4}}>{p.descricao}</p>}
              </div>
            </div>
          ))}

          <button onClick={salvarLoja} disabled={salvando} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,background:"var(--card)",border:"1px solid var(--accent)",color:"var(--accent)",marginTop:8}}>
            {salvando ? "Salvando..." : "💾 Salvar alterações da loja"}
          </button>
          {savedMsg && <p style={{color:"var(--green)",textAlign:"center",fontWeight:700,fontSize:14,marginTop:8}}>{savedMsg}</p>}
        </div>
      )}
    </div>
  );
}

function BuscarCriadoresView({ ofertas, profile, plano, convidar, notify }) {
  const [criadores, setCriadores] = useState([]);
  const [loading, setLoading] = useState(false);
  const [busca, setBusca] = useState("");
  const [segMin, setSegMin] = useState(0);
  const [nichoFiltro, setNichoFiltro] = useState("");
  const [convMsg, setConvMsg] = useState("");
  const [convSel, setConvSel] = useState({});
  const brl = (n) => Number(n||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

  useEffect(() => {
    const sb = window._sb;
    if (!sb) return;
    setLoading(true);
    sb.from("profiles").select("id, nome, nicho, plataformas, publico, handles, foto_url, plano").eq("papel", "criador").not("nome", "is", null)
      .then(({ data }) => {
        if (data) setCriadores(data.map(c => ({
          id: c.id, nome: c.nome, nicho: c.nicho||"",
          seguidores: Number((c.handles||{}).seguidores_num)||0,
          alcance: Number((c.handles||{}).alcance_num)||0,
          eng: Number((c.handles||{}).eng_num)||0,
          publico: c.publico||"", plataformas: c.plataformas||[],
          foto: c.foto_url||"", pro: c.plano==="Pro",
        })));
        setLoading(false);
      });
  }, []);

  const [criadoresFiltro, setCriadoresFiltro] = useState(false);
  const filtrados = criadores
    .filter(c => {
      if (busca) {
        const b = busca.toLowerCase();
        const nome = (c.nome||"").toLowerCase();
        const nicho = (c.nicho||"").toLowerCase();
        // busca parcial: nome contém, começa com, ou palavras similares
        if (!nome.includes(b) && !nicho.includes(b)) return false;
      }
      if (nichoFiltro && c.nicho !== nichoFiltro) return false;
      if (Number(segMin) > 0 && c.seguidores < Number(segMin)) return false;
      return true;
    })
    .sort((a,b) => (b.pro?1:0)-(a.pro?1:0));

  const nichos = [...new Set(criadores.map(c => c.nicho).filter(Boolean))];

  function convidarCriador(cr, ofId) {
    if (!ofId) return;
    convidar(cr, ofId);
    setConvMsg("Convite enviado para "+cr.nome+"!");
    setTimeout(() => setConvMsg(""), 2500);
  }

  return (
    <div style={{marginTop:12}}>
      <Sub>Encontre criadores cadastrados e convide para suas campanhas.</Sub>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="Buscar por nome..." style={{flex:1,padding:"11px 14px",borderRadius:11,border:"1px solid var(--line)",background:"var(--soft)",color:"var(--ink)",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none"}} />
        <button onClick={() => setCriadoresFiltro(o=>!o)} style={{padding:"11px 14px",borderRadius:11,border:`1px solid ${(nichoFiltro||Number(segMin)>0)?"var(--accent)":"var(--line)"}`,background:(nichoFiltro||Number(segMin)>0)?"rgba(168,85,247,.12)":"transparent",cursor:"pointer",color:(nichoFiltro||Number(segMin)>0)?"var(--accent)":"var(--mute)",fontWeight:700,fontFamily:"'DM Sans',sans-serif",fontSize:13,flexShrink:0}}>
          ⚙️ {(nichoFiltro||Number(segMin)>0)?"Filtros ✓":"Filtros"}
        </button>
      </div>
      {criadoresFiltro && (
        <div style={{borderRadius:12,border:"1px solid var(--line)",background:"var(--card)",padding:14,marginBottom:12}}>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"var(--mute)",fontWeight:600,marginBottom:6}}>Nicho</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["", ...nichos].map(n => <button key={n||"td"} onClick={() => setNichoFiltro(n)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:12.5,fontWeight:600,fontFamily:"'DM Sans',sans-serif",border:`1px solid ${nichoFiltro===n?"var(--accent)":"var(--line)"}`,background:nichoFiltro===n?"rgba(168,85,247,.14)":"transparent",color:nichoFiltro===n?"var(--accent)":"var(--mute)"}}>{n||"Todos"}</button>)}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,color:"var(--mute)",fontWeight:600,marginBottom:6}}>Seguidores mínimos</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[[0,"Qualquer"],[1000,"1k+"],[10000,"10k+"],[50000,"50k+"],[100000,"100k+"]].map(([v,lb]) => <button key={v} onClick={() => setSegMin(v)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:12.5,fontWeight:600,fontFamily:"'DM Sans',sans-serif",border:`1px solid ${segMin===v?"var(--accent)":"var(--line)"}`,background:segMin===v?"rgba(168,85,247,.14)":"transparent",color:segMin===v?"var(--accent)":"var(--mute)"}}>{lb}</button>)}
            </div>
          </div>
          {(nichoFiltro||Number(segMin)>0) && <button onClick={() => {setNichoFiltro("");setSegMin(0);}} style={{marginTop:10,padding:"6px 14px",borderRadius:9,border:"1px solid var(--rose)",background:"transparent",color:"var(--rose)",cursor:"pointer",fontSize:12.5,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>✕ Limpar filtros</button>}
        </div>
      )}
      {convMsg && <p style={{fontSize:13,color:"var(--green)",textAlign:"center",marginBottom:10,fontWeight:600}}>✓ {convMsg}</p>}
      <div style={{marginTop:4}}>
        {loading ? <p style={{color:"var(--mute)",fontSize:13,textAlign:"center",padding:"20px"}}>Carregando criadores...</p>
        : filtrados.length===0 ? <p style={{color:"var(--mute)",fontSize:13.5,textAlign:"center",padding:"20px"}}>{criadores.length===0 ? "Nenhum criador cadastrado ainda." : "Nenhum criador com esses filtros."}</p>
        : filtrados.map(cr => (
          <div key={cr.id||cr.nome} style={{borderRadius:14,border:`1px solid ${cr.pro ? "rgba(168,85,247,.5)" : "var(--line)"}`,background:"var(--card)",padding:14,marginBottom:12,position:"relative"}}>
            {cr.pro && <span style={{position:"absolute",top:12,right:12,fontSize:10,fontWeight:700,color:"var(--onAccent)",background:`linear-gradient(135deg,var(--accent),var(--rose))`,padding:"2px 8px",borderRadius:20}}>⭐ RECOMENDADO</span>}
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:6}}>
              {cr.foto ? <img src={cr.foto} alt="" style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",flexShrink:0}} />
                : <div style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,var(--accent),var(--rose))`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,flexShrink:0}}>{(cr.nome||"?")[0]}</div>}
              <div>
                <span className="disp" style={{fontSize:15,fontWeight:700,display:"block"}}>{cr.nome}</span>
                <span style={{fontSize:12,color:"var(--mute)"}}>{cr.nicho}{cr.publico?" · "+cr.publico:""}</span>
              </div>
            </div>
            {cr.seguidores>0 && <p style={{fontSize:12.5,color:"var(--mute)",margin:"4px 0 0"}}>{cr.seguidores.toLocaleString("pt-BR")} seg{cr.eng>0?" · "+cr.eng+"% eng":""}</p>}
            {cr.plataformas.length>0 && <p style={{fontSize:11.5,color:"var(--accent)",margin:"4px 0 8px"}}>{cr.plataformas.join(", ")}</p>}
            {ofertas.length===0 ? <p style={{fontSize:11.5,color:"var(--mute)"}}>Crie uma campanha para convidar.</p> : (
              <div style={{marginTop:8}}>
                <select value={convSel[cr.nome]||""} onChange={e => setConvSel(o=>({...o,[cr.nome]:e.target.value}))}
                  style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1px solid var(--line)",background:"var(--soft)",color:"var(--ink)",fontSize:13,fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>
                  <option value="">Selecionar campanha...</option>
                  {ofertas.filter(o=>o.status!=="aguardando_deposito").map(o=><option key={o.id} value={o.id}>{o.titulo}</option>)}
                </select>
                <button onClick={() => convidarCriador(cr, convSel[cr.nome])} disabled={!convSel[cr.nome]}
                  style={{width:"100%",padding:"9px",borderRadius:9,border:"none",cursor:!convSel[cr.nome]?"default":"pointer",fontWeight:700,fontSize:13,fontFamily:"'DM Sans',sans-serif",background:!convSel[cr.nome] ? "var(--line)" : `linear-gradient(135deg,var(--accent),var(--accent2))`,color:"var(--onAccent)"}}>
                  Convidar para campanha
                </button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}


function BrandApp({ profile, plano, ofertas, setOfertas, onSair, onTrocar, marcaProfile, setMarcaProfile, mensagens, addMsg, notify, notificacoes, setNotificacoes, produtos, setProdutos, vendas, onSalvarLoja }) {
  const temPerfil = !!marcaProfile.nome;
  const [view, setView] = useState(temPerfil ? "dashboard" : "perfil");
  const [showForm, setShowForm] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);
  const [depositoModal, setDepositoModal] = useState({ aberto: false, valor: 0 });
  const [salvandoPerfil, setSalvandoPerfil] = useState(false);
  const [perfilSalvo, setPerfilSalvo] = useState("");
  const brl = (n) => Number(n||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  const vazio = { titulo:"", valor:0, bonus:0, meta:0, plataforma:[], nicho:"", seguidoresMin:0, alcanceMin:0, briefing:"", entregaveis:{reels:0,stories:0,longos:0}, prazo:"", qtd:1, anexo:"" };
  const [f, setF] = useState(vazio);
  const set = (k,v) => setF(o => ({...o, [k]:v}));
  const setEnt = (k,v) => setF(o => ({...o, entregaveis:{...o.entregaveis, [k]:Math.max(0,Number(v)||0)}}));
  const meusProdutosMarca = (produtos||[]).filter(p => p.dono === (marcaProfile.nome||"Marca"));
  const vendasDeProd = (pid) => (vendas||[]).filter(v => v.produtoId===pid).length;
  const [fprod, setFprod] = useState({nome:"",foto:"",preco:"",comissao:"40",descricao:""});
  const setFp = (k,v) => setFprod(o => ({...o, [k]:v}));

  async function salvarPerfilMarca() {
    if (!marcaProfile.nome?.trim()) return;
    setSalvandoPerfil(true);
    if (onSalvarLoja) await onSalvarLoja(marcaProfile);
    setSalvandoPerfil(false);
    setPerfilSalvo("✓ Perfil salvo!");
    setTimeout(() => setPerfilSalvo(""), 2500);
    if (!temPerfil) setView("dashboard");
  }

  function publicar() {
    if (!f.titulo.trim() || !f.valor) return;
    const qtd = Number(f.qtd)||1;
    const valor = Number(f.valor), bonus = Number(f.bonus)||0;
    const totalEscrow = (valor+bonus)*qtd;
    setOfertas(arr => [{id:Date.now(), marca:marcaProfile.nome, logo:marcaProfile.logo||"🏢", ...f, valor, bonus, meta:Number(f.meta)||0, seguidoresMin:Number(f.seguidoresMin)||0, alcanceMin:Number(f.alcanceMin)||0, qtd, escrow:totalEscrow, status:"aguardando_deposito", candidatos:[]}, ...arr]);
    setF(vazio); setShowForm(false);
    setDepositoModal({aberto:true, valor:totalEscrow});
  }

  function decidir(ofId, nome, status) {
    setOfertas(arr => arr.map(x => x.id!==ofId ? x : {...x, candidatos:x.candidatos.map(c => c.nome===nome ? {...c, status, ...(status==="concluido"?{concluido_em:new Date().toISOString()}:{})} : c)}));
    const of = ofertas.find(o => o.id===ofId);
    const t = of ? of.titulo : "uma campanha";
    if (status==="aprovado") notify&&notify("criador",`🎉 Aprovado em "${t}"! Envie sua entrega.`);
    else if (status==="concluido") notify&&notify("criador",`💰 Entrega aprovada em "${t}" — pagamento liberado!`);
    else if (status==="disputa") notify&&notify("criador",`⚠️ Sua entrega em "${t}" foi contestada. Aguarde análise.`);
    else if (status==="estornado") notify&&notify("criador",`❌ Contestação aceita em "${t}". Valor estornado à marca.`);
    else if (status==="recusado") notify&&notify("criador",`Candidatura em "${t}" não selecionada.`);
  }

  function convidar(cr, ofId) {
    setOfertas(arr => arr.map(of => of.id!==Number(ofId) ? of : {...of, candidatos:[...of.candidatos, {nome:cr.nome, status:"convidado", foto:cr.foto}]}));
    notify&&notify("criador",`📨 ${marcaProfile.nome||"Uma marca"} convidou você para uma campanha!`);
  }

  function registrarResultado(ofId, nome, of, val) {
    const bateu = of.meta>0 && Number(val)>=of.meta;
    setOfertas(arr => arr.map(x => x.id!==ofId ? x : {...x, candidatos:x.candidatos.map(c => c.nome===nome ? {...c, resultado:Number(val), bonusLiberado:bateu} : c)}));
    if (bateu) notify&&notify("criador",`💎 Meta batida! Bônus liberado.`);
  }

  function avaliarCriador(ofId, nome, n) {
    setOfertas(arr => arr.map(x => x.id!==ofId ? x : {...x, candidatos:x.candidatos.map(c => c.nome===nome ? {...c, notaCriador:n} : c)}));
  }

  const reputacaoCriador = (nome) => mediaNota(ofertas.flatMap(o => (o.candidatos||[]).filter(c => c.nome===nome).map(c => c.notaCriador||0)));
  const mediaNota = (ns) => { const vs=ns.filter(n=>n>0); return vs.length ? vs.reduce((a,b)=>a+b,0)/vs.length : 0; };
  const statusCampanha = (of) => {
    const cs = (of.candidatos||[]);
    const nc = cs.filter(c=>c.status==="candidato").length, na=cs.filter(c=>["aprovado","entregue"].includes(c.status)).length, nd=cs.filter(c=>c.status==="concluido").length;
    if (of.status==="aguardando_deposito") return {txt:"⏳ Aguardando depósito",bg:"rgba(255,180,0,.1)",cor:"#ffb300"};
    if (nd>0) return {txt:`✓ ${nd} concluído(s)`,bg:"rgba(126,224,138,.1)",cor:C.green};
    if (na>0) return {txt:`${na} em andamento`,bg:"rgba(168,85,247,.1)",cor:C.amber};
    if (nc>0) return {txt:`${nc} candidato(s)`,bg:"rgba(168,85,247,.06)",cor:C.mute};
    return {txt:"Sem candidatos ainda",bg:C.soft,cor:C.mute};
  };

  const navTabs = [["dashboard","📊"],["campanhas","📣"],["buscar","🔍"],["loja","🏪"],["perfil","👤"]];

  return (
    <div style={{maxWidth:640,margin:"0 auto",padding:"0 0 80px",backgroundImage:`radial-gradient(circle at 80% -5%,rgba(168,85,247,.12),transparent 50%)`}}>

      {/* HEADER */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"var(--bg)",padding:"14px 18px 0",borderBottom:"1px solid var(--line)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {marcaProfile.logo && marcaProfile.logo.startsWith("data:")
              ? <img src={marcaProfile.logo} style={{width:34,height:34,borderRadius:8,objectFit:"cover"}} alt="" />
              : <span style={{fontSize:24}}>{marcaProfile.logo||"🏢"}</span>}
            <div>
              <div className="disp" style={{fontSize:16,fontWeight:700}}>{marcaProfile.nome||"Minha marca"}</div>
              {marcaProfile.segmento && <div style={{fontSize:11,color:"var(--mute)"}}>{marcaProfile.segmento}</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:4}}>
            <NotifBell items={notificacoes} para="marca" open={notifOpen} setOpen={setNotifOpen} onRead={() => setNotificacoes(ns => ns.map(x => x.para==="marca" ? {...x,lida:true} : x))} />
            <button onClick={onTrocar} style={{background:"none",border:"none",color:"var(--mute)",cursor:"pointer",padding:4,display:"flex"}}><Icon name="swap" size={20} stroke={1.7}/></button>
            <button onClick={onSair} style={{background:"none",border:"none",color:"var(--mute)",cursor:"pointer",padding:4,display:"flex"}}><Icon name="sair" size={19} stroke={1.7}/></button>
          </div>
        </div>
        {/* Nav bar */}
        <div style={{display:"flex",gap:0,overflowX:"auto",paddingBottom:0}}>
          {navTabs.map(([v,emoji]) => (
            <button key={v} onClick={() => setView(v)} style={{flex:"0 0 auto",padding:"10px 16px",borderRadius:0,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,background:"transparent",color:view===v ? "var(--accent)" : "var(--mute)",borderBottom:`2px solid ${view===v ? "var(--accent)" : "transparent"}`,transition:"all .15s"}}>
              {emoji} {v.charAt(0).toUpperCase()+v.slice(1)}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 18px"}}>

      {/* MODAL DEPÓSITO */}
      {depositoModal.aberto && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{width:"100%",maxWidth:480,background:"var(--bg)",borderRadius:"20px 20px 0 0",padding:"24px 22px 40px",border:"1px solid var(--line)"}}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:32}}>💳</div>
              <h3 className="disp" style={{fontSize:18,fontWeight:800,margin:"8px 0 6px"}}>Confirmar depósito</h3>
              <p style={{color:"var(--mute)",fontSize:13,lineHeight:1.6,margin:0}}>Para ativar a campanha, faça o depósito abaixo.<br/>Liberado aos criadores após cada entrega aprovada.</p>
            </div>
            <div style={{padding:16,borderRadius:12,background:"var(--card)",textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:12,color:"var(--mute)"}}>Total a depositar (escrow)</div>
              <div className="disp" style={{fontSize:32,fontWeight:800,color:"var(--accent)"}}>{brl(depositoModal.valor)}</div>
            </div>
            <button onClick={() => setDepositoModal({aberto:false,valor:0})}
              style={{width:"100%",padding:"14px",borderRadius:12,border:"none",cursor:"pointer",background:`linear-gradient(135deg,var(--accent),var(--accent2))`,color:"var(--onAccent)",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:15,marginBottom:10}}>
              OK — farei o depósito
            </button>
            <p style={{fontSize:11,color:"var(--mute)",textAlign:"center"}}>Sua campanha fica visível aos criadores após confirmação do depósito.</p>
          </div>
        </div>
      )}

      {/* DASHBOARD */}
      {view==="dashboard" && <DashboardMarca marcaProfile={marcaProfile} ofertas={ofertas} produtos={produtos} vendas={vendas} onIr={v => setView(v)} />}

      {/* PERFIL DA MARCA */}
      {view==="perfil" && (
        <div>
          <h2 className="disp" style={{fontSize:22,fontWeight:800,margin:"8px 0 4px"}}>Perfil da marca</h2>
          <Sub>Essas informações aparecem nas campanhas e para os criadores.</Sub>

          <div style={{borderRadius:14,border:"1px solid var(--line)",background:"var(--card)",padding:16,marginBottom:12}}>
            <Label>Logo da marca</Label>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <FotoUpload value={marcaProfile.logo && marcaProfile.logo.startsWith("data:") ? marcaProfile.logo : ""} onChange={v => setMarcaProfile(o=>({...o,logo:v}))} redondo size={60} rotulo="Upload de logo" />
              <div>
                <div style={{fontSize:12.5,color:"var(--mute)",marginBottom:6}}>Ou escolha um emoji:</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {["🏢","🎯","⚡","🚀","💎","🔥","🌟","🎮","👗","🍕","💪","🎵"].map(e => (
                    <button key={e} onClick={() => setMarcaProfile(o=>({...o,logo:e}))} style={{width:36,height:36,borderRadius:8,fontSize:18,cursor:"pointer",border:`1px solid ${marcaProfile.logo===e ? "var(--accent)" : "var(--line)"}`,background:marcaProfile.logo===e ? "rgba(168,85,247,.15)" : "var(--soft)"}}>{e}</button>
                  ))}
                </div>
              </div>
            </div>
            <Label>Nome da marca *</Label>
            <Input value={marcaProfile.nome||""} onChange={v => setMarcaProfile(o=>({...o,nome:v}))} placeholder="Nome da sua empresa ou marca" />
            <Label>Segmento</Label>
            <Input value={marcaProfile.segmento||""} onChange={v => setMarcaProfile(o=>({...o,segmento:v}))} placeholder="ex: Moda, Tecnologia, Gastronomia, eSports..." />
            <Label>Sobre a marca</Label>
            <textarea value={marcaProfile.sobre||""} onChange={e => setMarcaProfile(o=>({...o,sobre:e.target.value}))} placeholder="Conte o que a marca faz, seus valores e público-alvo..." rows={3}
              style={{width:"100%",padding:"12px 14px",borderRadius:11,border:"1px solid var(--line)",background:"var(--soft)",color:"var(--ink)",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}} />
            <Label>Site / Rede social</Label>
            <Input value={marcaProfile.site||""} onChange={v => setMarcaProfile(o=>({...o,site:v}))} placeholder="instagram.com/suamarca ou suamarca.com.br" />
          </div>

          <button onClick={salvarPerfilMarca} disabled={!marcaProfile.nome?.trim()||salvandoPerfil}
            style={{width:"100%",padding:"15px",borderRadius:12,border:"none",cursor:marcaProfile.nome?.trim()?"pointer":"default",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:15,background:marcaProfile.nome?.trim() ? `linear-gradient(135deg,var(--accent),var(--accent2))` : "var(--line)",color:marcaProfile.nome?.trim() ? "var(--onAccent)" : "var(--mute)",marginBottom:8}}>
            {salvandoPerfil ? "Salvando..." : !temPerfil ? "Criar meu perfil de marca" : "💾 Salvar alterações"}
          </button>
          {perfilSalvo && <p style={{color:"var(--green)",textAlign:"center",fontWeight:700,fontSize:14,marginBottom:8}}>{perfilSalvo}</p>}

          {!temPerfil && <p style={{fontSize:12,color:"var(--mute)",textAlign:"center",lineHeight:1.5}}>Após salvar, você terá acesso ao dashboard, campanhas e loja.</p>}
        </div>
      )}

      {/* CAMPANHAS */}
      {view==="campanhas" && !temPerfil && (
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:40,marginBottom:12}}>📋</div>
          <h3 className="disp" style={{fontSize:20,fontWeight:700,margin:"0 0 8px"}}>Complete seu perfil primeiro</h3>
          <p style={{color:"var(--mute)",fontSize:14,marginBottom:16}}>Para criar campanhas, preencha o perfil da marca.</p>
          <Botao onClick={() => setView("perfil")} style={{maxWidth:220,margin:"0 auto"}}>Ir para Perfil</Botao>
        </div>
      )}

      {view==="campanhas" && temPerfil && (
        <div>
          {depositoModal.aberto && null /* já renderizado acima */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"12px 0"}}>
            <h2 className="disp" style={{fontSize:20,fontWeight:800,margin:0}}>Campanhas</h2>
            <button onClick={() => setShowForm(f => !f)} style={{padding:"9px 16px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13.5,background:`linear-gradient(135deg,var(--accent),var(--accent2))`,color:"var(--onAccent)"}}>
              {showForm ? "Cancelar" : "+ Nova campanha"}
            </button>
          </div>

          {showForm && (
            <div style={{borderRadius:14,border:"1px solid var(--line)",background:"var(--card)",padding:16,marginBottom:16}}>
              <Label>Título da campanha *</Label>
              <Input value={f.titulo} onChange={v => set("titulo",v)} placeholder="ex: Review do novo produto" />
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}><Label>Valor base (R$) *</Label><NumberField value={f.valor} onChange={v => set("valor",v)} placeholder="500" /></div>
                <div style={{flex:1}}><Label>Bônus por meta (R$)</Label><NumberField value={f.bonus} onChange={v => set("bonus",v)} placeholder="200" /></div>
              </div>
              <Label>Meta pra bônus (ex: 10.000 views)</Label>
              <NumberField value={f.meta} onChange={v => set("meta",v)} placeholder="10000" />
              <Label>Briefing / descrição</Label>
              <textarea value={f.briefing} onChange={e => set("briefing",e.target.value)} placeholder="Descreva o que o criador deve entregar..." rows={3}
                style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid var(--line)",background:"var(--soft)",color:"var(--ink)",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}} />
              <Label>Entregáveis</Label>
              <div style={{display:"flex",gap:8}}>
                {[["reels","Reels"],["stories","Stories"],["longos","Vídeos longos"]].map(([k,lb]) => (
                  <div key={k} style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:11,color:"var(--mute)",marginBottom:4}}>{lb}</div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <button onClick={() => setEnt(k,f.entregaveis[k]-1)} style={{width:28,height:28,borderRadius:7,border:"1px solid var(--line)",background:"var(--soft)",color:"var(--accent)",cursor:"pointer",fontSize:16}}>−</button>
                      <span style={{flex:1,textAlign:"center",fontWeight:700}}>{f.entregaveis[k]||0}</span>
                      <button onClick={() => setEnt(k,f.entregaveis[k]+1)} style={{width:28,height:28,borderRadius:7,border:"1px solid var(--line)",background:"var(--soft)",color:"var(--accent)",cursor:"pointer",fontSize:16}}>+</button>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <div style={{flex:1}}><Label>Prazo</Label><Input value={f.prazo} onChange={v => set("prazo",v)} placeholder="DD/MM/AAAA" /></div>
                <div style={{flex:1}}><Label>Qtd. criadores</Label><NumberField value={f.qtd} onChange={v => set("qtd",v)} placeholder="1" /></div>
              </div>
              <div style={{marginTop:10}}>
                <label style={{display:"block",width:"100%",padding:"11px",borderRadius:10,cursor:"pointer",boxSizing:"border-box",textAlign:"center",border:`1px dashed ${f.anexo ? "var(--green)" : "var(--line)"}`,background:"transparent",color:f.anexo ? "var(--green)" : "var(--mute)",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:13}}>
                  {f.anexo ? "📎 Arte anexada (toque pra trocar)" : "📎 Anexar arte / material de referência"}
                  <input type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={e => { const file=e.target.files?.[0]; if(!file) return; const r=new FileReader(); r.onload=()=>set("anexo",r.result); r.readAsDataURL(file); }} />
                </label>
                {f.anexo && f.anexo.startsWith("data:image") && (
                  <div style={{marginTop:6,position:"relative"}}>
                    <img src={f.anexo} alt="" style={{width:"100%",maxHeight:100,objectFit:"cover",borderRadius:8}} />
                    <button onClick={() => set("anexo","")} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,.6)",border:"none",color:"#fff",borderRadius:20,padding:"2px 8px",cursor:"pointer",fontSize:12}}>✕</button>
                  </div>
                )}
              </div>
              <Botao onClick={publicar} disabled={!f.titulo.trim()||!f.valor} style={{marginTop:12}}>
                Publicar campanha e depositar
              </Botao>
            </div>
          )}

          {ofertas.length===0
            ? <div style={{textAlign:"center",padding:"40px 0",color:"var(--mute)"}}>Nenhuma campanha criada ainda.<br/>Clique em "+ Nova campanha" para começar.</div>
            : ofertas.map(of => {
              const st = statusCampanha(of);
              return (
                <div key={of.id} style={{borderRadius:14,border:`1px solid ${of.status==="aguardando_deposito" ? "rgba(255,180,0,.4)" : "var(--line)"}`,background:"var(--card)",marginBottom:14}}>
                  <div style={{padding:"14px 14px 10px"}}>
                    {of.status==="aguardando_deposito" && (
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:9,background:"rgba(255,180,0,.1)",border:"1px solid rgba(255,180,0,.3)",marginBottom:10}}>
                        <span style={{fontSize:12.5,color:"#ffb300",fontWeight:700}}>⏳ Aguardando depósito</span>
                        <button onClick={() => setOfertas(arr => arr.map(o => o.id===of.id ? {...o,status:"ativa"} : o))}
                          style={{padding:"4px 10px",borderRadius:7,border:"none",cursor:"pointer",background:"var(--green)",color:"#0b2010",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:11.5}}>✓ Confirmar</button>
                      </div>
                    )}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <span className="disp" style={{fontSize:16,fontWeight:700}}>{of.titulo}</span>
                        <div style={{marginTop:4}}>
                          <span style={{display:"inline-block",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:st.bg,color:st.cor,marginTop:4}}>{st.txt}</span>
                        </div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                        <div style={{fontWeight:700,color:"var(--accent)"}}>{brl(of.valor)}</div>
                        {of.bonus>0 && <div style={{fontSize:11.5,color:"var(--mute)"}}>+{brl(of.bonus)} bônus</div>}
                        <div style={{fontSize:11,color:"var(--mute)"}}>×{of.qtd} criador{of.qtd>1?"es":""}</div>
                      </div>
                    </div>
                  </div>
                  {(of.candidatos||[]).length>0 && (
                    <div style={{borderTop:"1px solid var(--line)",padding:"10px 14px"}}>
                      <div style={{fontSize:12,color:"var(--mute)",marginBottom:8}}>Candidatos ({of.candidatos.length})</div>
                      {(of.candidatos||[]).map(c => (
                        <div key={c.nome} style={{borderRadius:10,background:"var(--soft)",border:"1px solid var(--line)",padding:"10px 12px",marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                            <span style={{fontWeight:700,fontSize:14}}>{c.nome}</span>
                            <span style={{fontSize:11,padding:"3px 9px",borderRadius:20,fontWeight:700,background:c.status==="concluido"?"rgba(126,224,138,.2)":c.status==="disputa"?"rgba(255,93,143,.2)":"rgba(168,85,247,.1)",color:c.status==="concluido"?"var(--green)":c.status==="disputa"?"var(--rose)":"var(--accent)"}}>{c.status}</span>
                          </div>
                          {c.status==="candidato" && (
                            <div style={{display:"flex",gap:8}}>
                              <button onClick={() => decidir(of.id,c.nome,"aprovado")} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12.5,fontFamily:"'DM Sans',sans-serif",background:"var(--green)",color:"#0b2010"}}>✓ Aprovar</button>
                              <button onClick={() => decidir(of.id,c.nome,"recusado")} style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid var(--line)",cursor:"pointer",fontWeight:700,fontSize:12.5,fontFamily:"'DM Sans',sans-serif",background:"transparent",color:"var(--rose)"}}>✕ Recusar</button>
                            </div>
                          )}
                          {c.status==="entregue" && (
                            <div>
                              {c.entrega && <p style={{fontSize:12.5,color:"var(--amber)",margin:"0 0 8px"}}>📎 Entrega: {typeof c.entrega==="string"&&c.entrega.startsWith("data:image")?<img src={c.entrega} style={{width:60,height:40,objectFit:"cover",borderRadius:6,verticalAlign:"middle"}} alt=""/>:c.entrega}</p>}
                              <div style={{display:"flex",gap:8}}>
                                <button onClick={() => decidir(of.id,c.nome,"concluido")} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12.5,fontFamily:"'DM Sans',sans-serif",background:"var(--green)",color:"#0b2010"}}>✓ Aprovar {brl(of.valor*(1-TAXA_PLATAFORMA))}</button>
                                <button onClick={() => decidir(of.id,c.nome,"aprovado")} style={{flex:"0 0 auto",padding:"8px 10px",borderRadius:8,border:"1px solid var(--line)",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'DM Sans',sans-serif",background:"transparent",color:"var(--mute)"}}>Ajustar</button>
                              </div>
                              <button onClick={() => decidir(of.id,c.nome,"disputa")} style={{width:"100%",marginTop:7,padding:"7px",borderRadius:8,border:`1px solid var(--rose)`,background:"transparent",color:"var(--rose)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:12}}>⚠️ Contestar entrega</button>
                            </div>
                          )}
                          {c.status==="disputa" && (
                            <div style={{padding:10,borderRadius:9,background:"rgba(255,93,143,.08)",border:"1px solid var(--rose)"}}>
                              <p style={{fontSize:12.5,fontWeight:700,color:"var(--rose)",margin:"0 0 8px"}}>🔍 Em análise pela equipe Cria</p>
                              <div style={{display:"flex",gap:8}}>
                                <button onClick={() => decidir(of.id,c.nome,"concluido")} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:11.5,fontFamily:"'DM Sans',sans-serif",background:"var(--green)",color:"#0b2010"}}>Foi entregue → liberar</button>
                                <button onClick={() => decidir(of.id,c.nome,"estornado")} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:11.5,fontFamily:"'DM Sans',sans-serif",background:"var(--rose)",color:"#fff"}}>Não foi → estornar</button>
                              </div>
                            </div>
                          )}
                          {c.status==="concluido" && (
                            <div>
                              <p style={{fontSize:12.5,color:"var(--green)",fontWeight:700,margin:"0 0 6px"}}>✓ Pago: {brl(of.valor*(1-TAXA_PLATAFORMA))}</p>
                              {of.meta>0&&c.resultado==null&&(
                                <div style={{display:"flex",gap:6}}>
                                  <NumberField value={c._res||""} onChange={v => setOfertas(arr => arr.map(x => x.id!==of.id?x:{...x,candidatos:x.candidatos.map(cc => cc.nome!==c.nome?cc:{...cc,_res:v})}))} placeholder={`Meta: ${of.meta}`} />
                                  <button onClick={() => registrarResultado(of.id,c.nome,of,c._res||0)} style={{flexShrink:0,padding:"0 12px",borderRadius:9,border:"none",cursor:"pointer",background:"var(--accent)",color:"#fff",fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>✓</button>
                                </div>
                              )}
                              {c.bonusLiberado&&<p style={{fontSize:12,color:"var(--amber)",margin:"6px 0 0"}}>🎉 Bônus {brl(of.bonus*(1-TAXA_PLATAFORMA))} liberado!</p>}
                              {!c.notaCriador&&(
                                <div style={{marginTop:8}}>
                                  <div style={{fontSize:11.5,color:"var(--mute)",marginBottom:4}}>Avalie o criador:</div>
                                  <div style={{display:"flex",gap:4}}>
                                    {[1,2,3,4,5].map(n=><button key={n} onClick={() => avaliarCriador(of.id,c.nome,n)} style={{flex:1,padding:"6px",borderRadius:7,border:"1px solid var(--line)",cursor:"pointer",background:"transparent",color:"#ffcf4d",fontSize:18}}>★</button>)}
                                  </div>
                                </div>
                              )}
                              {c.notaCriador&&<p style={{fontSize:12,color:"#ffcf4d",margin:"6px 0 0"}}>{"★".repeat(c.notaCriador)} Avaliado</p>}
                            </div>
                          )}
                          {c.status==="estornado"&&<p style={{fontSize:12.5,fontWeight:700,color:"var(--rose)",margin:0}}>↩ Valor estornado</p>}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
        </div>
      )}

      {/* BUSCAR CRIADORES */}
      {view==="buscar" && <BuscarCriadoresView ofertas={ofertas} profile={profile} plano={plano} convidar={convidar} marcaProfile={marcaProfile} mensagens={mensagens} addMsg={addMsg} />}

      {/* LOJA */}
      {view==="loja" && <LojaView marcaProfile={marcaProfile} setMarcaProfile={setMarcaProfile} produtos={produtos} setProdutos={setProdutos} meusProdutosMarca={meusProdutosMarca} vendasDeProd={vendasDeProd} brl={brl} onSalvarLoja={onSalvarLoja} />}

      </div>
    </div>
  );
}


function Tag({ children }) {

// ---------- carteira do criador ----------
function CarteiraScreen({ disponivel, pendente, total, sacado, ganhoMarcas, ganhoProdutos, ganhoIndicacao, emAnalise, holdDias, onSacar }) {
  const [chave, setChave] = useState("");
  const [valor, setValor] = useState("");
  const [ok, setOk] = useState(0);
  const [erro, setErro] = useState("");
  const brl = (n) => Number(n || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  const v = Number(String(valor).replace(",", "."));
  async function sacar() {
    setErro("");
    if (!chave.trim()) { setErro("Informe sua chave Pix."); return; }
    if (!v || v <= 0) { setErro("Digite quanto você quer sacar."); return; }
    if (v > disponivel) { setErro(`Você só tem ${brl(disponivel)} disponível.`); return; }
    // Salva solicitação no Supabase
    const sb = window._sb;
    if (sb) {
      const { data: { user } } = await sb.auth.getUser();
      if (user) await sb.from("saques").insert({ user_id: user.id, valor: v, chave_pix: chave.trim(), status: "pendente" });
    }
    setOk(v); onSacar(v); setValor("");
  }
  return (
    <div className="rise">
      <h2 className="disp" style={{ fontSize: 24, margin: "16px 0 2px", fontWeight: 700 }}>Carteira</h2>
      <Sub>Tudo que você ganha — campanhas, produtos e indicações. Saque quando quiser.</Sub>

      <div style={{ borderRadius: 16, padding: 18, background: `linear-gradient(135deg, rgba(126,224,138,.14), rgba(168,85,247,.08))`, border: "1px solid rgba(126,224,138,.4)" }}>
        <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.mute, textTransform: "uppercase" }}>Disponível pra saque</span>
        <div className="disp" style={{ fontSize: 34, fontWeight: 800, color: C.green, lineHeight: 1.1, marginTop: 2 }}>{brl(disponivel)}</div>
        <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
          <div><div style={{ fontSize: 10.5, color: C.mute, textTransform: "uppercase" }}>A receber</div><div className="disp" style={{ fontSize: 15, fontWeight: 700, color: C.amber }}>{brl(pendente)}</div></div>
          <div><div style={{ fontSize: 10.5, color: C.mute, textTransform: "uppercase" }}>Total ganho</div><div className="disp" style={{ fontSize: 15, fontWeight: 700 }}>{brl(total)}</div></div>
          <div><div style={{ fontSize: 10.5, color: C.mute, textTransform: "uppercase" }}>Já sacado</div><div className="disp" style={{ fontSize: 15, fontWeight: 700, color: C.mute }}>{brl(sacado)}</div></div>
        </div>
        {emAnalise > 0 && (
          <div style={{ marginTop: 12, padding: "12px 14px", borderRadius: 11, background: "rgba(255,180,0,.08)", border: "1px solid rgba(255,180,0,.25)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 12, color: "#ffb300", fontWeight: 700 }}>⏳ Em análise — aguardando {holdDias} dias</div>
              <div style={{ fontSize: 11, color: C.mute, marginTop: 2 }}>Período de proteção contra reembolso</div>
            </div>
            <div className="disp" style={{ fontSize: 16, fontWeight: 800, color: "#ffb300" }}>{brl(emAnalise)}</div>
          </div>
        )}
      </div>

      <div style={{ marginTop: 14, borderRadius: 13, border: `1px solid ${C.line}`, background: C.card, padding: "6px 14px" }}>
        {[["🤝 Campanhas com marcas", ganhoMarcas], ["🛒 Produtos e afiliados", ganhoProdutos], ["🎁 Indicações", ganhoIndicacao]].map(([lb, v]) => (
          <div key={lb} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: lb !== "🎁 Indicações" ? `1px solid ${C.line}` : "none", fontSize: 13 }}>
            <span style={{ color: C.mute }}>{lb}</span><span style={{ fontWeight: 700, color: C.ink }}>{brl(v)}</span>
          </div>
        ))}
      </div>

      <div style={{ marginTop: 16 }}>
        <Label>Chave Pix pra receber</Label>
        <Input value={chave} onChange={setChave} placeholder="CPF, e-mail, telefone ou chave aleatória" />
        <Label>Quanto você quer sacar?</Label>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}><NumberField value={valor} onChange={setValor} placeholder={`Até ${brl(disponivel)}`} /></div>
          <button onClick={() => setValor(String(disponivel.toFixed(2)))} disabled={disponivel <= 0} style={{ flex: "0 0 auto", padding: "0 14px", borderRadius: 11, border: `1px solid ${C.line}`, background: "transparent", color: disponivel > 0 ? C.amber : C.mute, cursor: disponivel > 0 ? "pointer" : "default", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 13 }}>Tudo</button>
        </div>
        {erro && <p style={{ fontSize: 12.5, color: C.rose, margin: "6px 0 0" }}>{erro}</p>}
        <Botao onClick={sacar} disabled={disponivel <= 0}>{disponivel > 0 ? `Sacar via Pix` : "Sem saldo disponível"}</Botao>
      </div>

      {ok > 0 && (
        <p style={{ marginTop: 14, fontSize: 13.5, color: C.green, textAlign: "center", fontWeight: 600 }}>✓ Solicitação de {brl(ok)} enviada! Você receberá na chave PIX informada em até 2 dias úteis.</p>
      )}

      {total === 0 && <p style={{ color: C.mute, fontSize: 13, textAlign: "center", marginTop: 18 }}>Você ainda não fechou campanhas. Vá em 🤝 Marcas, candidate-se e entregue pra começar a faturar.</p>}

      <p style={{ fontSize: 11, color: C.mute, textAlign: "center", marginTop: 18, opacity: .7, lineHeight: 1.5 }}>
        Simulação. No app real, o saque cai via Pix pelo intermediário de pagamento.
      </p>
    </div>
  );
}

// ---------- afiliados de produtos + dashboard ----------
function LojaScreen({ profile, produtos, setProdutos, vendas, setVendas }) {
  const brl = (n) => Number(n || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  const meuNome = profile.nome || "Criador";
  const [catAtiva, setCatAtiva] = useState("Todos");
  const [abaLoja, setAbaLoja] = useState("vitrine"); // vitrine | editar | cadastrar
  const [form, setForm] = useState({ banner: profile.loja_banner || "", descricao: profile.loja_descricao || "" });
  const [fp, setFp] = useState({ nome: "", foto: "", preco: "", comissao: "40", categoria: "", descricao: "" });
  const meusProd = (produtos || []).filter((p) => p.dono === meuNome);
  const cats = ["Todos", ...new Set(meusProd.map((p) => p.categoria).filter(Boolean))];
  const filtrados = catAtiva === "Todos" ? meusProd : meusProd.filter((p) => p.categoria === catAtiva);

  function salvarLoja() {
    const novo = { ...profile, loja_banner: form.banner, loja_descricao: form.descricao };
    setProdutos(p => p); // trigger re-render
    profile.loja_banner = form.banner;
    profile.loja_descricao = form.descricao;
    setAbaLoja("vitrine");
  }
  function cadastrar() {
    if (!fp.nome.trim() || !fp.preco) return;
    setProdutos((a) => [{ id: "p" + Date.now(), dono: meuNome, nome: fp.nome, foto: fp.foto, preco: Number(fp.preco), comissao: Number(fp.comissao) || 40, categoria: fp.categoria || "Geral", descricao: fp.descricao, promotores: [] }, ...a]);
    setFp({ nome: "", foto: "", preco: "", comissao: "40", categoria: "", descricao: "" });
    setAbaLoja("vitrine");
  }

  return (
    <div style={{ paddingBottom: 24 }}>
      {/* Banner da loja */}
      <div style={{ position: "relative", borderRadius: 14, overflow: "hidden", marginBottom: 0 }}>
        {profile.loja_banner
          ? <img src={profile.loja_banner} alt="" style={{ width: "100%", height: 130, objectFit: "cover", display: "block" }} />
          : <div style={{ width: "100%", height: 100, background: `linear-gradient(135deg, ${C.amber}, ${C.rose})`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ color: "rgba(255,255,255,.5)", fontSize: 13 }}>Adicione um banner da sua loja</span>
            </div>}
      </div>

      {/* Info da loja */}
      <div style={{ display: "flex", alignItems: "flex-end", gap: 12, padding: "0 2px 10px", marginTop: -28, position: "relative", zIndex: 1 }}>
        {profile.foto
          ? <img src={profile.foto} alt="" style={{ width: 64, height: 64, borderRadius: "50%", border: `3px solid ${C.bg}`, objectFit: "cover", flexShrink: 0 }} />
          : <div style={{ width: 64, height: 64, borderRadius: "50%", border: `3px solid ${C.bg}`, background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <span style={{ color: "#fff", fontSize: 24, fontWeight: 700 }}>{(meuNome || "C")[0]}</span>
            </div>}
        <div style={{ flex: 1, minWidth: 0, paddingBottom: 4 }}>
          <div className="disp" style={{ fontSize: 17, fontWeight: 800, color: C.ink }}>{meuNome}</div>
          {profile.loja_descricao && <div style={{ fontSize: 12.5, color: C.mute, marginTop: 2, lineHeight: 1.4 }}>{profile.loja_descricao}</div>}
        </div>
        <button onClick={() => setAbaLoja(abaLoja === "editar" ? "vitrine" : "editar")} style={{ flexShrink: 0, padding: "7px 12px", borderRadius: 9, border: `1px solid ${C.line}`, background: "transparent", color: C.mute, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", fontSize: 12.5, fontWeight: 600 }}>
          {abaLoja === "editar" ? "Cancelar" : "✏️ Editar loja"}
        </button>
      </div>

      {/* Editar loja */}
      {abaLoja === "editar" && (
        <div style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, padding: 15, marginBottom: 14 }}>
          <Label>Banner da loja</Label>
          <FotoUpload value={form.banner} onChange={(v) => setForm(f => ({ ...f, banner: v }))} rotulo="Adicionar banner (retangular)" size={60} />
          <Label>Descrição da loja</Label>
          <textarea value={form.descricao} onChange={(e) => setForm(f => ({ ...f, descricao: e.target.value }))}
            placeholder="Fale sobre você, seu nicho e o que você vende..."
            style={{ width: "100%", padding: "12px 14px", borderRadius: 11, border: `1px solid ${C.line}`, background: C.soft, color: C.ink, fontSize: 14, fontFamily: "'DM Sans',sans-serif", outline: "none", minHeight: 80, resize: "vertical", boxSizing: "border-box" }} />
          <Botao onClick={salvarLoja}>Salvar</Botao>
        </div>
      )}

      {/* Ações */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <button onClick={() => setAbaLoja(abaLoja === "cadastrar" ? "vitrine" : "cadastrar")} style={{ flex: 1, padding: "11px", borderRadius: 11, border: `1px solid ${C.amber}`, background: "transparent", color: C.amber, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 13.5 }}>
          {abaLoja === "cadastrar" ? "✕ Cancelar" : "+ Adicionar produto"}
        </button>
        <span style={{ display: "flex", alignItems: "center", fontSize: 13, color: C.mute, padding: "0 8px" }}>{meusProd.length} produto{meusProd.length !== 1 ? "s" : ""}</span>
      </div>

      {/* Form de cadastro */}
      {abaLoja === "cadastrar" && (
        <div style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, padding: 15, marginBottom: 14 }}>
          <Label>Foto do produto</Label>
          <FotoUpload value={fp.foto} onChange={(v) => setFp(f => ({ ...f, foto: v }))} rotulo="Foto do produto" />
          <Label>Nome *</Label>
          <Input value={fp.nome} onChange={(v) => setFp(f => ({ ...f, nome: v }))} placeholder="Nome do produto" />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}><Label>Preço (R$) *</Label><NumberField value={fp.preco} onChange={(v) => setFp(f => ({ ...f, preco: v }))} placeholder="49,90" /></div>
            <div style={{ flex: 1 }}><Label>Comissão (%)</Label><NumberField value={fp.comissao} onChange={(v) => setFp(f => ({ ...f, comissao: v }))} placeholder="40" /></div>
          </div>
          <Label>Categoria</Label>
          <Input value={fp.categoria} onChange={(v) => setFp(f => ({ ...f, categoria: v }))} placeholder="ex: Cursos, E-books, Físico..." />
          <Label>Descrição</Label>
          <Input value={fp.descricao} onChange={(v) => setFp(f => ({ ...f, descricao: v }))} placeholder="O que o cliente leva" />
          <Botao onClick={cadastrar} disabled={!fp.nome.trim() || !fp.preco}>Publicar na loja</Botao>
        </div>
      )}

      {/* Abas de categoria */}
      {meusProd.length > 0 && (
        <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4, marginBottom: 14 }}>
          {cats.map((cat) => (
            <button key={cat} onClick={() => setCatAtiva(cat)} style={{
              flexShrink: 0, padding: "8px 14px", borderRadius: 20, cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "'DM Sans',sans-serif",
              border: `1px solid ${catAtiva === cat ? C.amber : C.line}`,
              background: catAtiva === cat ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : "transparent",
              color: catAtiva === cat ? "var(--onAccent)" : C.ink,
            }}>{cat}</button>
          ))}
        </div>
      )}

      {/* Grid de produtos */}
      {filtrados.length === 0
        ? <div style={{ textAlign: "center", padding: "40px 20px", color: C.mute }}>
            <div style={{ fontSize: 36, marginBottom: 10 }}>🛍️</div>
            <p style={{ fontSize: 14 }}>Nenhum produto nessa categoria ainda.<br/>Clique em "Adicionar produto" pra começar.</p>
          </div>
        : <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {filtrados.map((p) => (
              <div key={p.id} style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, overflow: "hidden" }}>
                {p.foto
                  ? <img src={p.foto} alt="" style={{ width: "100%", height: 100, objectFit: "cover" }} />
                  : <div style={{ width: "100%", height: 80, background: `linear-gradient(135deg, ${C.amber}22, ${C.rose}22)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ fontSize: 28 }}>📦</span>
                    </div>}
                <div style={{ padding: "10px 10px 12px" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.ink, lineHeight: 1.3, marginBottom: 4 }}>{p.nome}</div>
                  {p.descricao && <div style={{ fontSize: 11, color: C.mute, marginBottom: 6, lineHeight: 1.4 }}>{p.descricao.slice(0, 50)}{p.descricao.length > 50 ? "…" : ""}</div>}
                  <div style={{ fontSize: 14, fontWeight: 800, color: C.amber }}>{brl(p.preco)}</div>
                  {p.comissao > 0 && <div style={{ fontSize: 10.5, color: C.green, marginTop: 2 }}>{p.comissao}% pra afiliados</div>}
                </div>
              </div>
            ))}
          </div>}
    </div>
  );
}

function AfiliadosScreen({ profile, produtos, setProdutos, vendas, setVendas }) {
  const [aba, setAba] = useState("mercado");
  const [modalProd, setModalProd] = useState(null);
  const [buscaMarca, setBuscaMarca] = useState("");
  const [marcasSb, setMarcasSb] = useState([]);
  const brl = (n) => Number(n||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

  // Buscar lojas de marcas no Supabase
  useEffect(() => {
    const sb = window._sb;
    if (!sb || aba !== "mercado") return;
    sb.from("profiles").select("id,nome,logo,segmento,marca_data").eq("papel","marca").not("nome","is",null).then(({data}) => {
      if (data) setMarcasSb(data.filter(m => {
        try { const md = JSON.parse(m.marca_data||"{}"); return (md._produtos||[]).some(p=>p.ativo!==false&&!p.privado&&p.temAfiliados!==false); } catch(e){return false;}
      }).map(m => {
        try { const md = JSON.parse(m.marca_data||"{}"); return {...m, produtos: (md._produtos||[]).filter(p=>p.ativo!==false&&!p.privado&&p.temAfiliados!==false)}; } catch(e){return null;}
      }).filter(Boolean));
    });
  }, [aba]);

  const meusProdutos = produtos.filter(p => p.dono === (profile.nome||"eu"));

  function addMeuProduto(d) {
    const novo = {id:"mp"+Date.now(), dono:profile.nome||"eu", nome:d.nome, foto:d.foto, preco:Number(d.preco), comissao:Number(d.comissao)||30, categoria:d.categoria||"Geral", descricao:d.descricao||"", ativo:d.ativo!==false, privado:!!d.privado, temAfiliados:d.temAfiliados!==false, promotores:[]};
    setProdutos(a => [novo,...a]);
    setModalProd(null);
  }
  function editMeuProduto(d) {
    setProdutos(a => a.map(p => p.id===d.id ? {...p,...d,preco:Number(d.preco),comissao:Number(d.comissao)||30} : p));
    setModalProd(null);
  }
  function toggleMeuProd(id, campo) { setProdutos(a => a.map(p => p.id===id ? {...p,[campo]:!p[campo]} : p)); }
  function deleteMeuProd(id) { if(window.confirm("Excluir?")) setProdutos(a => a.filter(p=>p.id!==id)); }

  function simularVenda(p) {
    const comissaoValor = p.preco * (p.comissao/100) * (1-0.05);
    setVendas(vs => [{id:"v"+Date.now(),produtoId:p.id,nome:p.nome,dono:p.dono,preco:p.preco,comissao:p.comissao,afiliado:profile.nome},...vs]);
  }

  const marcasFiltradas = marcasSb.filter(m => !buscaMarca || (m.nome||"").toLowerCase().includes(buscaMarca.toLowerCase()));

  return (
    <div className="rise">
      <h2 className="disp" style={{fontSize:24,margin:"16px 0 2px",fontWeight:700}}>Produtos & Afiliados</h2>
      <Sub>Venda seus próprios produtos ou ganhe comissão divulgando produtos de marcas.</Sub>

      <div style={{display:"flex",background:"var(--soft)",borderRadius:12,padding:4,marginBottom:16}}>

                    <button key={lb} onClick={fn} style={{flex:1,padding:"9px",border:"none",background:"transparent",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:cor,borderRight:"1px solid var(--line)"}}>

      )}

  );
}


// ---------- colabs entre criadores ----------
function ColabsScreen({ profile, colabs, setColabs }) {
  const nichoMatch = (n) => {
    const a = (n || "").toLowerCase().trim(); const b = (profile.nicho || "").toLowerCase().trim();
    return !!a && !!b && (a.includes(b) || b.includes(a));
  };
  function enviarColab(cr, msg) {
    setColabs((arr) => arr.some((c) => c.com === cr.nome) ? arr : [{ id: Date.now(), com: cr.nome, nicho: cr.nicho, status: "enviado", mensagem: msg || "Bora colaborar?" }, ...arr]);
  }
  function responderColab(id, aceitar) {
    setColabs((arr) => arr.map((c) => c.id === id ? { ...c, status: aceitar ? "aceito" : "recusado" } : c));
  }
  function mandarColab(id, text) {
    setColabs((arr) => arr.map((c) => c.id === id ? { ...c, msgs: [...(c.msgs || []), { from: "criador", text }] } : c));
    setTimeout(() => setColabs((arr) => arr.map((c) => {
      if (c.id !== id || (c.msgs || []).some((m) => m.from === "parceiro")) return c;
      return { ...c, msgs: [...(c.msgs || []), { from: "parceiro", text: "Fechou! Bora marcar a gravação então 🎬" }] };
    })), 900);
  }
  const labelStatus = { recebido: { t: "Convite recebido", cor: C.amber }, enviado: { t: "Aguardando resposta", cor: C.mute }, aceito: { t: "✅ Colab ativa", cor: C.green }, recusado: { t: "Recusado", cor: C.rose } };
  const pool = CRIADORES_EXEMPLO.filter((c) => c.nicho); // parceiros sugeridos
  return (
    <div className="rise">
      <h2 className="disp" style={{ fontSize: 24, margin: "16px 0 2px", fontWeight: 700 }}>Colabs</h2>
      <Sub>Ache parceiros do seu nicho pra produzir junto e crescer mais rápido.</Sub>

      <h3 className="disp" style={{ fontSize: 15, fontWeight: 700, margin: "18px 0 8px", color: C.amber }}>Suas colabs</h3>
      {colabs.length === 0 ? (
        <p style={{ color: C.mute, fontSize: 13, padding: "4px 0 8px" }}>Nenhuma colab ainda. Convide alguém abaixo.</p>
      ) : colabs.map((c) => {
        const st = labelStatus[c.status] || labelStatus.enviado;
        return (
          <div key={c.id} style={{ borderRadius: 13, border: `1px solid ${C.line}`, background: C.card, padding: 13, marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span className="disp" style={{ fontSize: 14.5, fontWeight: 700 }}>{c.com}</span>
              <span style={{ fontSize: 11.5, fontWeight: 700, color: st.cor }}>{st.t}</span>
            </div>
            {c.nicho && <p style={{ fontSize: 12, color: C.mute, margin: "3px 0 0" }}>{c.nicho}</p>}
            {c.mensagem && <p style={{ fontSize: 12.5, color: C.ink, margin: "6px 0 0", lineHeight: 1.4 }}>“{c.mensagem}”</p>}
            {c.status === "recebido" && (
              <div style={{ display: "flex", gap: 8, marginTop: 9 }}>
                <button onClick={() => responderColab(c.id, true)} style={{ flex: 1, padding: "9px", borderRadius: 9, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, fontFamily: "'DM Sans', sans-serif", background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: "var(--onAccent)" }}>Aceitar</button>
                <button onClick={() => responderColab(c.id, false)} style={{ flex: "0 0 auto", padding: "9px 13px", borderRadius: 9, border: `1px solid ${C.line}`, cursor: "pointer", fontWeight: 700, fontSize: 13, fontFamily: "'DM Sans', sans-serif", background: "transparent", color: C.rose }}>Recusar</button>
              </div>
            )}
            {c.status === "aceito" && (
              <div style={{ marginTop: 8 }}>
                <p style={{ fontSize: 12, color: C.green, margin: "0 0 4px" }}>Colab ativa — combinem os detalhes da gravação aqui. 🚀</p>
                <ChatThread eu="criador" msgs={c.msgs} onSend={(t) => mandarColab(c.id, t)} />
              </div>
            )}
          </div>
        );
      })}

      <h3 className="disp" style={{ fontSize: 15, fontWeight: 700, margin: "20px 0 8px", color: C.amber }}>Encontre parceiros</h3>
      {pool.map((cr) => {
        const jaTem = colabs.some((c) => c.com === cr.nome);
        return (
          <div key={cr.nome} style={{ borderRadius: 13, border: `1px solid ${nichoMatch(cr.nicho) ? "rgba(126,224,138,.5)" : C.line}`, background: C.card, padding: 13, marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span className="disp" style={{ fontSize: 14.5, fontWeight: 700 }}>{cr.nome}</span>
              {nichoMatch(cr.nicho) && <span style={{ fontSize: 10.5, fontWeight: 700, color: C.green }}>⭐ mesmo nicho</span>}
            </div>
            <p style={{ fontSize: 12, color: C.mute, margin: "3px 0 0" }}>{cr.nicho} · {(cr.seguidores || 0).toLocaleString("pt-BR")} seg. · {cr.eng}% eng.</p>
            {jaTem ? (
              <p style={{ fontSize: 12, color: C.mute, marginTop: 9, fontWeight: 600 }}>Convite já enviado ✓</p>
            ) : (
              <div style={{ display: "flex", gap: 8, marginTop: 9 }}>
                <input id={`colab-${cr.nome}`} placeholder="Sua proposta..." style={{ flex: 1, padding: "9px 11px", borderRadius: 9, border: `1px solid ${C.line}`, background: C.soft, color: C.ink, fontSize: 12.5, outline: "none", fontFamily: "'DM Sans', sans-serif" }} />
                <button onClick={() => { const el = document.getElementById(`colab-${cr.nome}`); enviarColab(cr, el ? el.value : ""); }} style={{ padding: "0 14px", borderRadius: 9, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 12.5, fontFamily: "'DM Sans', sans-serif", background: `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`, color: "var(--onAccent)" }}>Convidar</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ---------- arquivados (histórico de pautas) ----------
function ArquivadosScreen({ itens }) {
  const [aberto, setAberto] = useState(null);
  const fmt = (iso) => { try { return new Date(iso).toLocaleDateString("pt-BR", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }); } catch (_) { return ""; } };
  return (
    <div className="rise">
      <h2 className="disp" style={{ fontSize: 24, margin: "16px 0 2px", fontWeight: 700 }}>Arquivados</h2>
      <Sub>Todas as pautas que você já gerou ficam guardadas aqui.</Sub>
      {itens.length === 0 ? (
        <p style={{ color: C.mute, fontSize: 13.5, textAlign: "center", padding: "30px 10px" }}>Nada arquivado ainda. Gere pautas em 📅 Plano e elas aparecem aqui.</p>
      ) : itens.map((it) => {
        const open = aberto === it.id;
        return (
          <div key={it.id} style={{ borderRadius: 14, border: `1px solid ${C.line}`, background: C.card, marginBottom: 12, overflow: "hidden" }}>
            <button onClick={() => setAberto(open ? null : it.id)} style={{ width: "100%", textAlign: "left", padding: 15, background: "transparent", border: "none", cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span className="disp" style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>{it.dia}</span>
                <span style={{ fontSize: 11.5, color: C.mute }}>{fmt(it.data)} · {open ? "▾" : "▸"}</span>
              </div>
              {it.foco && <p style={{ fontSize: 12.5, color: C.mute, margin: "5px 0 0", lineHeight: 1.4 }}>{it.foco}</p>}
              {!open && <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>{(it.posts || []).map((p, k) => <Tag key={k}>{p.formato}</Tag>)}</div>}
            </button>
            {open && (
              <div style={{ padding: "0 15px 15px" }}>
                {(it.posts || []).map((p, k) => (
                  <div key={k} style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.line}` }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "rgba(168,85,247,.15)", color: C.amber, fontWeight: 700 }}>{p.formato}</span>
                      <span className="disp" style={{ fontSize: 14, fontWeight: 700 }}>{p.tema}</span>
                    </div>
                    {p.gancho && <p style={{ fontSize: 12.5, color: C.mute, margin: "5px 0 0" }}>🪝 {p.gancho}</p>}
                    {(p.roteiro || []).length > 0 && <p style={{ fontSize: 12.5, color: C.ink, margin: "5px 0 0", lineHeight: 1.5 }}>{p.roteiro.map((r, i) => `${i + 1}. ${r}`).join("  ")}</p>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

}

function BarChart({ data }) {
  if (!data || !data.length) return null;
  const max = Math.max(1, ...data.map((d) => d.value));
  const W = 300, H = 140, padX = 14, padB = 26, padT = 16;
  const bw = (W - padX * 2) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block" }}>
      <defs>
        <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="var(--accent)" /><stop offset="1" stopColor="var(--rose)" />
        </linearGradient>
      </defs>
      <line x1={padX} y1={H - padB} x2={W - padX} y2={H - padB} stroke="var(--line)" strokeWidth="1" />
      {data.map((d, i) => {
        const h = (d.value / max) * (H - padB - padT);
        const w = Math.min(34, bw * 0.6);
        const x = padX + i * bw + (bw - w) / 2;
        const y = H - padB - h;
        return (
          <g key={i}>
            <rect x={x} y={y} width={w} height={Math.max(h, 1)} rx="5" fill="url(#barGrad)" />
            <text x={x + w / 2} y={y - 4} textAnchor="middle" fontSize="9.5" fontWeight="700" fill="var(--ink)">{d.value}</text>
            <text x={x + w / 2} y={H - 9} textAnchor="middle" fontSize="8.5" fill="var(--mute)">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

function DashboardScreen({ profile, plano, usosSemana, limiteSemana, ganhoMarcas, ganhoProdutos, ganhoIndicacao, totalGanho, sacado, ganhoPendente, ofertas, vendas, colabs, arquivados, produtos, onIr }) {

        {[
          { lb: "Disponível", v: disponivel, cor: C.green },
          { lb: "A receber", v: ganhoPendente, cor: C.amber },
          { lb: "Total ganho", v: totalGanho, cor: C.ink },

          </div>

      </div>

      {/* gráfico de tendência de receita */}

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 4px 8px" }}>

function LineChart({ data, cor = "var(--accent)" }) {
  if (!data || data.length < 2) return null;
  const W = 300, H = 100, padX = 10, padB = 20, padT = 12;
  const max = Math.max(1, ...data.map((d) => d.value));
  const xs = data.map((_, i) => padX + (i / (data.length - 1)) * (W - padX * 2));
  const ys = data.map((d) => H - padB - (d.value / max) * (H - padB - padT));
  const path = xs.map((x, i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area = `${path} L${xs[xs.length-1].toFixed(1)},${H-padB} L${xs[0].toFixed(1)},${H-padB} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block" }}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={cor} stopOpacity="0.25" />
          <stop offset="1" stopColor={cor} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#areaGrad)" />
      <path d={path} fill="none" stroke={cor} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />
      {data.map((d, i) => (
        <g key={i}>
          <circle cx={xs[i]} cy={ys[i]} r="3.2" fill={cor} />
          <text x={xs[i]} y={H - 5} textAnchor="middle" fontSize="8" fill="var(--mute)">{d.label}</text>
        </g>
      ))}
    </svg>
  );
}

function NumberField({ value, onChange, placeholder }) {

    </div>

}
function Chips({ options, value, onChange, multi }) {
  const toggle = (o) => {
    if (!multi) return onChange(o);
    onChange(value.includes(o) ? value.filter((x) => x !== o) : [...value, o]);
  };
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
      {options.map((o) => {
        const on = multi ? value.includes(o) : value === o;
        return (
          <button key={o} onClick={() => toggle(o)} style={{
            padding: "9px 14px", borderRadius: 11, cursor: "pointer", fontSize: 13.5, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", transition: "all .15s",
            border: `1px solid ${on ? C.amber : C.line}`,
            background: on ? `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})` : "transparent",
            color: on ? "var(--onAccent)" : C.ink,
          }}>{o}</button>
        );
      })}
    </div>
  );
}
function Botao({ children, onClick, disabled, style }) {

      fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 700, marginTop: 22, transition: "opacity .2s",
      background: disabled ? C.line : `linear-gradient(135deg, ${C.amber}, ${C.amberDeep})`,
      color: disabled ? C.mute : "var(--onAccent)", opacity: disabled ? 0.7 : 1, ...style,
    }}>{children}</button>
