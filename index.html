<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cria</title>
<meta name="description" content="Cria — onde criador vira negócio. Ideias de conteúdo com IA, parcerias com marcas e monetização pra criadores brasileiros.">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0613">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cria">
<link rel="apple-touch-icon" href="https://faydgottylbbuylowlxg.supabase.co/storage/v1/object/public/imagens/ChatGPT%20Image%2018%20de%20jun.%20de%202026,%2000_13_42.png">
<style>
:root,[data-theme=dark]{--bg:#0a0613;--card:#1a1235;--soft:#140d2b;--line:#332658;--ink:#f4f0ff;--mute:#a99cd0;--accent:#b366ff;--accent2:#8b3dff;--rose:#ff4d8d;--green:#3ee0a3;--amber:#f59e0b;--onAccent:#fff}
[data-theme=light]{--bg:#f6f3fc;--card:#fff;--soft:#f1ecfa;--line:#e6dff5;--ink:#1b1430;--mute:#6c6390;--accent:#7c3aed;--accent2:#9333ea;--rose:#e0356f;--green:#10a877;--amber:#d97706;--onAccent:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{background:var(--bg);min-height:100dvh;min-height:100vh;width:100%;max-width:100%;color:var(--ink);overflow-x:hidden}
body{display:flex;justify-content:center}
#root{width:100%}
@media(min-width:900px){
  body{background:radial-gradient(circle at 50% 0%,rgba(179,102,255,.08),transparent 60%),var(--bg)}
  #root{max-width:1000px;box-shadow:0 0 80px rgba(0,0,0,.25)}
}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg);z-index:9999;padding:20px}
.bspin{width:40px;height:40px;border-radius:50%;border:3px solid #2c2348;border-top-color:#a855f7;animation:bsp .8s linear infinite}
@keyframes bsp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="boot"><div class="bspin"></div><p id="bm" style="font-family:sans-serif;font-size:13px;color:#9a90bf">v20 iniciando...</p></div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  var b=document.getElementById('boot');
  function bmsg(t){var e=document.getElementById('bm');if(e)e.textContent=t;}
  function erro(m){if(b)b.innerHTML='<div style="padding:24px;text-align:center;font-family:sans-serif;max-width:340px"><p style="font-size:24px">!<\/p><p style="color:#ff5d8f;font-size:14px;font-weight:700;margin:12px 0 8px">Erro<\/p><p style="color:#9a90bf;font-size:11px;word-break:break-word;margin-bottom:16px">'+String(m).slice(0,350)+'<\/p><button onclick="location.reload()" style="padding:10px 20px;border-radius:10px;border:none;background:#a855f7;color:#fff;font-weight:700">Recarregar<\/button><\/div>';}
  var n=0;
  function esperaLibs(){
    n++;
    if(typeof React!=='undefined'&&typeof ReactDOM!=='undefined'&&typeof supabase!=='undefined'){
      baixarApp();return;
    }
    if(n>50){erro('Bibliotecas (React/Supabase) nao carregaram.');return;}
    bmsg('Carregando bibliotecas... ('+n+')');
    setTimeout(esperaLibs,150);
  }
  function baixarApp(){
    bmsg('Baixando app...');
    fetch('/cria.txt?v='+Date.now())
      .then(function(r){
        if(!r.ok) throw new Error('cria.txt status '+r.status);
        return r.text();
      })
      .then(function(code){
        bmsg('Iniciando...');
        try{
          (new Function('React','ReactDOM','supabase','window','document','localStorage','navigator', code))(React,ReactDOM,supabase,window,document,localStorage,navigator);
        }catch(e){ erro('Erro no app: '+e.message); }
      })
      .catch(function(e){ erro('Nao baixou o app: '+e.message); });
  }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }
  esperaLibs();
})();
</script>
</body>
</html>
